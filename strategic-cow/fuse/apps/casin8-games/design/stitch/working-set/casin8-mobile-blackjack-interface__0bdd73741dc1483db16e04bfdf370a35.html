<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Casin8 Mobile - Blackjack Interface</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f4c025",
                        "background-light": "#f8f8f5",
                        "background-dark": "#181611",
                        "navy-felt": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<!-- Main Container (Mobile Frame Simulation) -->
<div class="relative flex h-screen max-w-[390px] mx-auto flex-col bg-background-light dark:bg-background-dark overflow-hidden border-x border-slate-200 dark:border-slate-800 shadow-2xl">
<!-- Header Section -->
<header class="flex items-center justify-between px-4 py-4 border-b border-slate-200 dark:border-slate-800 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md z-20">
<div class="flex items-center gap-2">
<div class="text-primary">
<svg class="size-6" fill="currentColor" viewbox="0 0 48 48">
<path d="M24 45.8096C19.6865 45.8096 15.4698 44.5305 11.8832 42.134C8.29667 39.7376 5.50128 36.3314 3.85056 32.3462C2.19985 28.361 1.76794 23.9758 2.60947 19.7452C3.451 15.5145 5.52816 11.6284 8.57829 8.5783C11.6284 5.52817 15.5145 3.45101 19.7452 2.60948C23.9758 1.76795 28.361 2.19986 32.3462 3.85057C36.3314 5.50129 39.7376 8.29668 42.134 11.8833C44.5305 15.4698 45.8096 19.6865 45.8096 24L24 24L24 45.8096Z"></path>
</svg>
</div>
<h2 class="text-lg font-bold tracking-tight">Casin8</h2>
</div>
<div class="flex items-center gap-2">
<button class="flex items-center justify-center rounded-full h-8 px-3 bg-primary text-background-dark text-xs font-bold shadow-lg">
<span>$2,450.00</span>
</button>
<div class="flex items-center justify-center rounded-full h-8 w-8 bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined text-[18px]">signal_cellular_alt</span>
</div>
</div>
</header>
<!-- Main Game Stage (Felt Table) -->
<main class="flex-1 relative overflow-hidden bg-navy-felt flex flex-col items-center justify-center p-6">
<!-- Background Texture for Navy Felt -->
<div class="absolute inset-0 opacity-20 pointer-events-none bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-blue-400/20 via-transparent to-black"></div>
<!-- Dealer Hand Area -->
<div class="w-full flex flex-col items-center gap-4 mb-12">
<div class="text-slate-400 text-[10px] uppercase tracking-[0.2em] font-bold">Dealer</div>
<div class="flex -space-x-8">
<div class="w-20 h-28 rounded-lg bg-white shadow-xl flex flex-col p-2 border border-slate-200 transform -rotate-3">
<span class="text-red-600 font-bold text-lg leading-none">A</span>
<span class="text-red-600 material-symbols-outlined text-sm leading-none">favorite</span>
<div class="flex-1 flex items-center justify-center">
<span class="text-red-600 material-symbols-outlined text-3xl">favorite</span>
</div>
</div>
<div class="w-20 h-28 rounded-lg bg-primary border-4 border-white/20 shadow-xl flex items-center justify-center transform rotate-2 relative overflow-hidden" data-alt="Gold foiled card back pattern">
<div class="absolute inset-0 bg-[repeating-linear-gradient(45deg,transparent,transparent_10px,rgba(0,0,0,0.05)_10px,rgba(0,0,0,0.05)_20px)]"></div>
<span class="material-symbols-outlined text-white/40 text-4xl">diamond</span>
</div>
</div>
</div>
<!-- Hand Value & Status Notification -->
<div class="relative z-10 py-4 flex flex-col items-center gap-2">
<div class="bg-slate-900/80 backdrop-blur px-6 py-2 rounded-full border border-primary/30 flex flex-col items-center">
<span class="text-primary text-xs font-bold uppercase tracking-widest">Hand Value</span>
<span class="text-white text-3xl font-black">21</span>
</div>
<!-- Success Payout Badge -->
<div class="mt-4 bg-emerald-500/20 border border-emerald-500/50 rounded-lg px-4 py-2 flex items-center gap-2 ring-4 ring-primary/20">
<span class="material-symbols-outlined text-emerald-400 text-sm">stars</span>
<p class="text-emerald-400 text-xs font-bold uppercase tracking-wide">Blackjack Payout Pulse</p>
</div>
</div>
<!-- Player Hand Area -->
<div class="w-full flex flex-col items-center gap-4 mt-12">
<div class="flex -space-x-8">
<div class="w-24 h-32 rounded-lg bg-white shadow-2xl flex flex-col p-2 border border-slate-200 transform -rotate-6">
<span class="text-slate-900 font-bold text-xl leading-none">A</span>
<span class="text-slate-900 material-symbols-outlined text-base leading-none">poker_chip</span>
<div class="flex-1 flex items-center justify-center">
<span class="text-slate-900 material-symbols-outlined text-4xl">poker_chip</span>
</div>
</div>
<div class="w-24 h-32 rounded-lg bg-white shadow-2xl flex flex-col p-2 border border-slate-200 transform rotate-6 z-10">
<span class="text-red-600 font-bold text-xl leading-none">K</span>
<span class="text-red-600 material-symbols-outlined text-base leading-none">diamond</span>
<div class="flex-1 flex items-center justify-center">
<span class="text-red-600 material-symbols-outlined text-4xl">diamond</span>
</div>
</div>
</div>
<div class="text-primary text-[10px] uppercase tracking-[0.2em] font-bold">You</div>
</div>
</main>
<!-- Action Bar Section -->
<section class="bg-background-light dark:bg-background-dark p-4 flex flex-col gap-3 border-t border-slate-200 dark:border-slate-800 z-20">
<div class="flex gap-3">
<button class="flex-1 h-14 rounded-xl bg-slate-200 dark:bg-slate-800 text-slate-900 dark:text-white font-black text-sm tracking-widest uppercase hover:bg-slate-300 dark:hover:bg-slate-700 transition-colors">
                    HIT
                </button>
<button class="flex-1 h-14 rounded-xl bg-primary text-background-dark font-black text-sm tracking-widest uppercase shadow-lg shadow-primary/20 active:scale-95 transition-transform">
                    STAND
                </button>
</div>
<button class="w-full h-12 rounded-xl border-2 border-slate-200 dark:border-slate-800 text-slate-500 dark:text-slate-400 font-bold text-xs tracking-widest uppercase">
                DOUBLE DOWN
            </button>
</section>
<!-- Navigation Tab Bar -->
<nav class="bg-background-light dark:bg-background-dark border-t border-slate-200 dark:border-slate-800 h-20 flex items-center justify-around px-2 z-20">
<button class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-bold uppercase">Home</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">casino</span>
<span class="text-[10px] font-bold uppercase">Games</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="text-[10px] font-bold uppercase">Wallet</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-bold uppercase">Profile</span>
</button>
</nav>
<!-- Card textures via background image rules requirement -->
<div class="hidden">
<div data-alt="Navy blue felt fabric texture" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuB6RqkhFyz77KTnKAozKAC8eHM_z903dgC-I_yx2uczac9nLBouIR7nqiKi1GB4xCuOfNI3z7e4sgyv81qeZsZh9MmuGb_qUuHkMOb3CY_gH_49r5NtEaeZYi9jPCURvoPmsCwriWWRTbIRpUqO3qO-t6q4vjpb_4HzdeONNLFwjkCbJCd-2V8-7w7cWwvxHFmaLRzj0Xda_sKj0VYQT-qs0esQFk8kIpRxtQ9U0jvfRpKMrFqD82EW60iL22ViQskT2phwHYXFWp1-')"></div>
<div data-alt="Gold luxury poker card back pattern" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuB3NByCDiwqaiCTRX88f0B-ETbSo_1-IAN1yE7larxI05drS1Fdtvv_TvZAkUzFT-orS3_Ia2fPRnB6NoDbotcYwaiV6JZeNpInqP4wwqAFy9G-qse0etMUV2QH5LaCQxWoxVTqkA0bcmtHmqi5lhW19clNMW7Kd4n4C8ZrktgRP-QU8xs1g-_d8SkJPLmXTQE3Uu7iiyM91xbBpDm629VinV1f9ig7nWAbEqMFHhzLdOV9H4j8wBMNIBRjfjB1k6LboUORsFdGyiSE')"></div>
</div>
</div>
</body></html>
