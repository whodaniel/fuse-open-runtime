<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Poker Hero Turn State</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#f4c025",
              "background-light": "#f8f8f5",
              "background-dark": "#221e10",
              "surface-dark": "#2e291b",
              "accent-cyan": "#00f0ff",
            },
            fontFamily: {
              "display": ["Space Grotesk", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            boxShadow: {
              'glow': '0 0 15px rgba(244, 192, 37, 0.5)',
              'inner-glow': 'inset 0 0 10px rgba(255, 255, 255, 0.1)',
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display overflow-hidden select-none">
<!-- Top App Bar -->
<div class="flex items-center p-4 justify-between bg-surface-dark/90 backdrop-blur-md sticky top-0 z-20 border-b border-primary/20">
<div class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-white/10 transition-colors cursor-pointer">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<div class="flex flex-col items-center">
<h2 class="text-slate-900 dark:text-slate-100 text-base font-bold leading-tight tracking-wide">CASIN8 ELITE</h2>
<span class="text-primary text-xs font-medium tracking-widest uppercase">$5/$10 NL HOLD'EM</span>
</div>
<div class="flex size-10 items-center justify-center rounded-full hover:bg-white/10 transition-colors cursor-pointer">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100 text-2xl">settings</span>
</div>
</div>
<!-- Main Game Area -->
<div class="flex-1 flex flex-col relative w-full max-w-md mx-auto h-full justify-between pb-6">
<!-- Opponents Area (Visual representation) -->
<div class="grid grid-cols-3 gap-2 px-4 pt-4">
<!-- Opponent 1 -->
<div class="flex flex-col items-center gap-1 opacity-60">
<div class="relative">
<div class="w-12 h-12 rounded-full bg-slate-700 border-2 border-slate-600 overflow-hidden" data-alt="Cyberpunk avatar with neon visor" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDeQ5GtJ1N3LBZOzbWX-X2SV2xGPYrY6ABJexFeD8v976Wwntktm0mWp4vBdfBYiPFIM0UsVznhIhXykZoriqEPNGqlWkcjQg0jCSxrDjAjrx-TPPaeXx8VmpLcTv5vD_C3WwPWaOKVZaJJlNHQB0AV8SBEa8z62duKtI47zOP_lirGUYTPaY5vxB18PwRhcKGJPCIVxpcjwyqpGBjBqmRngVtgpDf-ZKkBoEUl7Uwyqn-XDlRF_yLJ9B1r8P5lPdgCRQDu6YFkSbg7'); background-size: cover;"></div>
<div class="absolute -bottom-1 -right-1 bg-slate-800 text-white text-[10px] px-1.5 py-0.5 rounded border border-slate-600">$420</div>
</div>
<span class="text-slate-400 text-xs">Viper</span>
</div>
<!-- Opponent 2 (Dealer) -->
<div class="flex flex-col items-center gap-1 opacity-60">
<div class="relative">
<div class="w-12 h-12 rounded-full bg-slate-700 border-2 border-slate-600 overflow-hidden" data-alt="Futuristic robot avatar" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuC1ClRHWvvudCpFnLaQEN7Ys-u1k3tZQZ0zePVIiB8bbw2yacFh9Vfyv3W5xHJqGYINC5TPQlPAILsgzKsgIs4FzWdLeSAruYuhiUwPUz5vLhwYzcTAhavJ9gzKbzFiqUxMGLxH83CgeewCzzr1AdBAfNLdNhSS7bIvCBUgWYYlG5s3aD-irfNoBi3U-bIo6_Lu2u15o1pjkLiSlEpM5sBmNmaO_WHT8hPSnEn_z582lq6rljfaCGTPAId0Uyz1rwU-ar_xhk8XX-8W'); background-size: cover;"></div>
<div class="absolute -top-1 -right-1 bg-white text-slate-900 text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">D</div>
<div class="absolute -bottom-1 -right-1 bg-slate-800 text-white text-[10px] px-1.5 py-0.5 rounded border border-slate-600">$1.2k</div>
</div>
<span class="text-slate-400 text-xs">NeonX</span>
</div>
<!-- Opponent 3 -->
<div class="flex flex-col items-center gap-1 opacity-60">
<div class="relative">
<div class="w-12 h-12 rounded-full bg-slate-700 border-2 border-slate-600 overflow-hidden" data-alt="Abstract digital avatar" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCwC4pOTqCWi6hmZUEEk5MMbiaat2t1CaiVnd90W351CTtIbhC1VIOWV_IKnt1RK3OBVWqOwIIE3WWoZI7dzlOUKlVoaiVZBY2wHJ7FxFPc17kW1RuFh9iLNBX0MUG4FKX7Ijgec2JQufrT55dSSbPhR1_uFw-r3YDnPrWMwMasRq6BGKkDGq0D1wATRLu7bcra44ZdFYZqCQp8CjysznjqpZXEKy-dM_PhVB6oUMSr3CyjTtdJ4OtYNGK_4aFg3X55F62_bAh-v_cA'); background-size: cover;"></div>
<div class="absolute -bottom-1 -right-1 bg-slate-800 text-white text-[10px] px-1.5 py-0.5 rounded border border-slate-600">$850</div>
</div>
<span class="text-slate-400 text-xs">Cipher</span>
</div>
</div>
<!-- Table Center / Pot & Community Cards -->
<div class="flex flex-col items-center justify-center flex-1 gap-6 my-4">
<!-- Pot Info -->
<div class="flex flex-col items-center animate-pulse">
<div class="flex items-center justify-center gap-2 bg-slate-900/80 px-6 py-2 rounded-full border border-primary/30 shadow-glow">
<span class="text-accent-cyan text-xs font-bold tracking-widest uppercase">CURRENT POT</span>
<span class="text-accent-cyan text-xl font-bold font-display">$1,420</span>
</div>
<div class="text-slate-500 text-[10px] mt-1">RAKE: $5</div>
</div>
<!-- Community Cards -->
<div class="flex items-center justify-center gap-3 perspective-1000">
<!-- Flop 1: Ace of Spades -->
<div class="relative w-16 h-24 bg-gradient-to-br from-slate-200 to-slate-400 rounded-lg shadow-lg flex flex-col items-center justify-between p-1 border border-slate-500 transform hover:-translate-y-2 transition-transform duration-300">
<span class="text-slate-900 font-bold text-lg leading-none self-start">A</span>
<span class="material-symbols-outlined text-slate-900 text-3xl">playing_cards</span>
<span class="text-slate-900 font-bold text-lg leading-none self-end rotate-180">A</span>
</div>
<!-- Flop 2: King of Hearts -->
<div class="relative w-16 h-24 bg-gradient-to-br from-slate-200 to-slate-400 rounded-lg shadow-lg flex flex-col items-center justify-between p-1 border border-slate-500 transform hover:-translate-y-2 transition-transform duration-300 delay-75">
<span class="text-red-600 font-bold text-lg leading-none self-start">K</span>
<span class="material-symbols-outlined text-red-600 text-3xl">favorite</span>
<span class="text-red-600 font-bold text-lg leading-none self-end rotate-180">K</span>
</div>
<!-- Flop 3: 2 of Diamonds -->
<div class="relative w-16 h-24 bg-gradient-to-br from-slate-200 to-slate-400 rounded-lg shadow-lg flex flex-col items-center justify-between p-1 border border-slate-500 transform hover:-translate-y-2 transition-transform duration-300 delay-150">
<span class="text-red-600 font-bold text-lg leading-none self-start">2</span>
<span class="material-symbols-outlined text-red-600 text-3xl">diamond</span>
<span class="text-red-600 font-bold text-lg leading-none self-end rotate-180">2</span>
</div>
<!-- Turn (Placeholder) -->
<div class="relative w-16 h-24 bg-slate-800/50 rounded-lg border border-slate-700/50 flex items-center justify-center opacity-50">
<div class="w-10 h-14 border border-dashed border-slate-600 rounded"></div>
</div>
<!-- River (Placeholder) -->
<div class="relative w-16 h-24 bg-slate-800/50 rounded-lg border border-slate-700/50 flex items-center justify-center opacity-50">
<div class="w-10 h-14 border border-dashed border-slate-600 rounded"></div>
</div>
</div>
</div>
<!-- Hero Area (Player) -->
<div class="flex flex-col items-center w-full px-4 gap-4">
<!-- Hero Info & Cards -->
<div class="relative flex flex-col items-center">
<!-- Action Timer Ring -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-32 h-32 rounded-full border-4 border-primary/30 animate-spin" style="border-top-color: #f4c025; animation-duration: 10s;"></div>
<div class="relative z-10 flex flex-col items-center">
<div class="w-20 h-20 rounded-full bg-slate-800 border-2 border-primary shadow-[0_0_20px_rgba(244,192,37,0.4)] overflow-hidden" data-alt="Player hero avatar futuristic" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCpajXol2GUr-dJRYKK2GHTgBgF1Qwq3AZMkXlT8EKC57T9YrszPP4QwEnR5bUOo3PjVsHLwxOQpSPoY4RuUGE-PyIJhZTc2uYqqSeuEp1VBDLnFuhJ2YSi4mZixdYlW3uF3AhO-RwUBypI4uzs9nBJEONB8JTv1VOof32ugL3zgkOakN2o3SAlbTMXMcNW4wllLaJrR-xRg3qOWkL2rG4glYwytsQlWc9f0LKsjvuye9SIsT1H2a__jUHaDbFXJgBhWV0lLsRFgl_p'); background-size: cover;"></div>
<div class="absolute -bottom-3 bg-primary text-slate-900 text-xs font-bold px-3 py-1 rounded-full border border-white shadow-lg z-20">HERO</div>
</div>
<!-- Hero Hole Cards -->
<div class="flex gap-1 -mt-4 z-0 translate-y-2">
<div class="w-12 h-16 bg-gradient-to-br from-slate-200 to-slate-300 rounded border border-slate-400 shadow-md flex items-center justify-center transform -rotate-6 origin-bottom-right">
<span class="text-slate-900 font-bold text-sm">10♠</span>
</div>
<div class="w-12 h-16 bg-gradient-to-br from-slate-200 to-slate-300 rounded border border-slate-400 shadow-md flex items-center justify-center transform rotate-6 origin-bottom-left">
<span class="text-slate-900 font-bold text-sm">J♠</span>
</div>
</div>
<div class="mt-4 text-center">
<div class="text-primary font-bold text-lg">$2,500</div>
<div class="text-slate-400 text-xs uppercase tracking-wider">Your Stack</div>
</div>
</div>
<!-- Controls -->
<div class="w-full flex flex-col gap-3 mt-2">
<!-- Quick Raise Slider / Inputs -->
<div class="flex items-center gap-2 w-full bg-surface-dark p-2 rounded-xl border border-slate-700">
<div class="flex-1">
<input class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-primary" max="2500" min="10" type="range" value="100"/>
</div>
<div class="flex gap-1">
<button class="bg-slate-700 hover:bg-slate-600 text-white text-xs font-bold py-1.5 px-3 rounded transition-colors">+100</button>
<button class="bg-slate-700 hover:bg-slate-600 text-white text-xs font-bold py-1.5 px-3 rounded transition-colors">+500</button>
</div>
</div>
<!-- Main Action Buttons -->
<div class="grid grid-cols-3 gap-3 w-full h-14">
<button class="bg-red-500/10 hover:bg-red-500/20 border border-red-500/50 text-red-500 rounded-xl font-bold tracking-wider uppercase transition-all flex flex-col items-center justify-center gap-1 active:scale-95">
<span class="material-symbols-outlined text-xl">close</span>
<span class="text-xs">Fold</span>
</button>
<button class="bg-slate-700/50 hover:bg-slate-600/50 border border-slate-500/50 text-slate-200 rounded-xl font-bold tracking-wider uppercase transition-all flex flex-col items-center justify-center gap-1 active:scale-95">
<span class="material-symbols-outlined text-xl">check</span>
<span class="text-xs">Check</span>
</button>
<button class="bg-primary hover:bg-yellow-400 text-slate-900 rounded-xl font-bold tracking-wider uppercase transition-all shadow-[0_0_15px_rgba(244,192,37,0.4)] flex flex-col items-center justify-center gap-1 active:scale-95 group">
<span class="material-symbols-outlined text-xl group-hover:scale-110 transition-transform">keyboard_double_arrow_up</span>
<span class="text-xs">Raise</span>
</button>
</div>
</div>
</div>
</div>
</body></html>
