<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Royal Red Cyber-HUD - Casin8</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-red": "#E61919",
                        "deep-crimson": "#2D0A0A",
                        "charcoal": "#121212",
                        "emerald-data": "#10B981",
                        "cyber-border": "rgba(230, 25, 25, 0.2)"
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        :root {
            --glass-bg: rgba(18, 18, 18, 0.85);
            --carbon-pattern: radial-gradient(circle, #1a1a1a 1px, transparent 1px);
        }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #050505;
        }
        .cyber-gradient {
            background: radial-gradient(circle at top, #3d0505 0%, #050505 100%);
        }
        .carbon-texture {
            background-color: #121212;
            background-image: var(--carbon-pattern);
            background-size: 4px 4px;
        }
        .glass-hud {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--cyber-border);
            box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 10px rgba(230, 25, 25, 0.1);
        }
        .neon-ring {
            box-shadow: 0 0 15px rgba(230, 25, 25, 0.5), inset 0 0 15px rgba(230, 25, 25, 0.5);
        }
        .emerald-glow {
            text-shadow: 0 0 8px rgba(16, 185, 129, 0.6);
        }
        .red-glow {
            text-shadow: 0 0 10px rgba(230, 25, 25, 0.8);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-slate-100 overflow-hidden">
<div class="relative flex h-screen w-full flex-col max-w-[430px] mx-auto shadow-2xl cyber-gradient border-x border-white/5">
<header class="flex items-center justify-between p-5 pt-8 z-20">
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-primary-red rounded-sm flex items-center justify-center rotate-45 border border-white/20">
<span class="material-symbols-outlined text-black font-bold -rotate-45">token</span>
</div>
<div class="flex flex-col">
<h1 class="text-xl font-bold tracking-widest text-white uppercase italic">Casin8</h1>
<div class="flex items-center gap-1.5">
<span class="size-1.5 bg-emerald-data rounded-full"></span>
<span class="text-[9px] font-bold uppercase tracking-widest text-emerald-data italic">Sync Active</span>
</div>
</div>
</div>
<div class="flex flex-col items-end">
<span class="text-[9px] text-primary-red/70 font-bold uppercase tracking-widest mb-1">Total Assets</span>
<div class="bg-black/40 border border-primary-red/30 px-3 py-1 rounded flex items-center gap-2">
<span class="text-primary-red font-black">$</span>
<p class="text-white font-bold text-lg tracking-tight">12,450.00</p>
</div>
</div>
</header>
<main class="flex-1 flex flex-col items-center justify-center relative px-6">
<div class="relative w-full aspect-square flex items-center justify-center">
<div class="relative w-72 h-72 flex items-center justify-center">
<div class="absolute inset-0 rounded-full border-2 border-primary-red/40 neon-ring"></div>
<div class="absolute inset-4 rounded-full border border-primary-red/20 border-dashed animate-[spin_20s_linear_infinite]"></div>
<div class="absolute inset-10 rounded-full border-t-2 border-emerald-data/40 animate-[spin_3s_linear_infinite]"></div>
<div class="absolute inset-8 rounded-full border border-white/5 flex items-center justify-center">
<div class="w-[85%] h-[85%] rounded-full carbon-texture border border-white/10 flex flex-col items-center justify-center relative shadow-2xl">
<span class="text-[10px] uppercase tracking-[0.2em] text-emerald-data/80 mb-1">Outcome Target</span>
<span class="text-7xl font-black text-white italic red-glow">32</span>
<div class="mt-2 px-3 py-0.5 bg-primary-red/20 border border-primary-red/50 rounded text-[10px] font-bold text-primary-red uppercase">Red • Even</div>
</div>
</div>
<div class="absolute -top-4 -left-4 glass-hud p-2 rounded flex items-center gap-2">
<span class="text-[8px] text-emerald-data font-bold">PRNG: 0.9412</span>
</div>
<div class="absolute -bottom-4 -right-4 glass-hud p-2 rounded flex items-center gap-2">
<span class="text-[8px] text-primary-red font-bold">VOLT: 1.22v</span>
</div>
</div>
<div class="absolute right-0 top-1/2 -translate-y-1/2 flex flex-col gap-3">
<div class="glass-hud w-10 h-10 flex items-center justify-center rounded-sm border-r-2 border-r-primary-red">
<span class="text-xs font-bold text-white">32</span>
</div>
<div class="glass-hud w-10 h-10 flex items-center justify-center rounded-sm border-r-2 border-r-white/20">
<span class="text-xs font-bold text-slate-400">15</span>
</div>
<div class="glass-hud w-10 h-10 flex items-center justify-center rounded-sm border-r-2 border-r-emerald-data">
<span class="text-xs font-bold text-emerald-data">0</span>
</div>
</div>
</div>
<div class="w-full mt-4 glass-hud p-3 rounded-sm relative overflow-hidden">
<div class="absolute top-0 left-0 w-full h-0.5 bg-gradient-to-r from-transparent via-primary-red to-transparent"></div>
<div class="grid grid-cols-6 gap-1.5">
<div class="col-span-1 h-12 carbon-texture border border-emerald-data/30 flex items-center justify-center text-emerald-data font-black italic">0</div>
<div class="col-span-5 grid grid-cols-5 gap-1.5">
<div class="h-12 bg-primary-red/20 border border-primary-red/40 flex items-center justify-center text-xs font-black">1</div>
<div class="h-12 carbon-texture border border-white/10 flex items-center justify-center text-xs font-black">2</div>
<div class="h-12 bg-primary-red/20 border border-primary-red/40 flex items-center justify-center text-xs font-black">3</div>
<div class="h-12 carbon-texture border border-white/10 flex items-center justify-center text-xs font-black">4</div>
<div class="h-12 bg-primary-red/20 border border-primary-red/40 flex items-center justify-center text-xs font-black">5</div>
</div>
</div>
<div class="grid grid-cols-3 gap-1.5 mt-1.5">
<div class="h-10 carbon-texture border border-primary-red/20 flex items-center justify-center text-[10px] font-bold uppercase tracking-tighter text-primary-red/80">1st 12</div>
<div class="h-10 bg-primary-red/10 border border-primary-red/30 flex items-center justify-center text-[10px] font-black uppercase tracking-widest text-primary-red">Red</div>
<div class="h-10 carbon-texture border border-white/10 flex items-center justify-center text-[10px] font-black uppercase tracking-widest text-slate-300">Black</div>
</div>
</div>
</main>
<div class="mx-6 mb-4 glass-hud p-3 rounded-sm carbon-texture flex items-center justify-between">
<div class="flex flex-col">
<div class="flex items-center gap-1">
<span class="text-[9px] font-black uppercase text-emerald-data tracking-[0.2em] emerald-glow">Hash ID</span>
<span class="size-1 bg-emerald-data rounded-full animate-pulse"></span>
</div>
<p class="text-[10px] font-mono text-emerald-data/60 truncate w-40">sha256:8f2a9c1e...d4b2</p>
</div>
<div class="flex flex-col items-end">
<span class="text-[9px] font-black uppercase text-white/40 tracking-[0.2em]">Nonce</span>
<span class="text-xs font-mono text-emerald-data font-bold">14,282</span>
</div>
</div>
<div class="bg-black/90 border-t border-primary-red/30 p-5 pb-8 relative">
<div class="flex items-center justify-between gap-6 relative z-10">
<div class="flex gap-2">
<button class="size-11 rounded-full carbon-texture border border-white/20 flex items-center justify-center text-[10px] font-black text-white shadow-xl">10</button>
<button class="size-11 rounded-full carbon-texture border-2 border-primary-red flex items-center justify-center text-[10px] font-black text-primary-red shadow-[0_0_15px_rgba(230,25,25,0.3)] scale-110">100</button>
<button class="size-11 rounded-full carbon-texture border border-white/20 flex items-center justify-center text-[10px] font-black text-white shadow-xl">500</button>
</div>
<button class="flex-1 bg-primary-red hover:bg-red-700 h-14 rounded-sm flex items-center justify-center gap-3 shadow-[0_0_30px_rgba(230,25,25,0.4)] transition-all">
<span class="text-black font-black uppercase tracking-[0.3em] text-sm italic">Initialize</span>
<span class="material-symbols-outlined text-black font-black">bolt</span>
</button>
</div>
<div class="absolute bottom-4 left-1/2 -translate-x-1/2 w-32 h-1 bg-primary-red/20 rounded-full"></div>
</div>
<nav class="flex justify-around items-center border-t border-white/5 bg-charcoal px-4 py-3 pb-8">
<a class="flex flex-col items-center gap-1 text-primary-red" href="#">
<span class="material-symbols-outlined fill-1">grid_view</span>
<span class="text-[8px] font-black uppercase tracking-widest">Console</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-600" href="#">
<span class="material-symbols-outlined">data_exploration</span>
<span class="text-[8px] font-black uppercase tracking-widest">Stats</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-600" href="#">
<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="text-[8px] font-black uppercase tracking-widest">Vault</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-600" href="#">
<span class="material-symbols-outlined">settings_input_component</span>
<span class="text-[8px] font-black uppercase tracking-widest">Tuning</span>
</a>
</nav>
</div>

</body></html>
