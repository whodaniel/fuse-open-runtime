
<!DOCTYPE html>
<html>
<head>
    <title>Create AG-UI Analysis Agent</title>
    <style>
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: #f7fafc;
            padding: 40px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2d3748;
            margin-bottom: 30px;
        }
        .field {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4a5568;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background: #5a67d8;
        }
        #result {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            display: none;
        }
        .success { background: #d1fae5; color: #065f46; }
        .error { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Create AG-UI Analysis Agent</h1>
        <form id="capabilityForm" onsubmit="handleSubmit(event)">
            
                <div class="field">
                    <label>Where to get data</label>
                    <input
                        type="text"
                        name="data_source"
                        placeholder="Enter data_source..."
                        required
                    />
                </div>
                
            <button type="submit">Generate</button>
        </form>
        <div id="result"></div>
    </div>

    <script>
        async function handleSubmit(event) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);

            const result = document.getElementById('result');
            result.style.display = 'block';
            result.className = '';
            result.textContent = '⏳ Processing...';

            try {
                const response = await fetch('/api/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        capability: 'Create AG-UI Analysis Agent',
                        parameters: data
                    })
                });

                const responseData = await response.json();

                if (responseData.success) {
                    result.className = 'success';
                    result.innerHTML = '✅ Successfully created Create AG-UI Analysis Agent!<br><br>' +
                        `<a href="${responseData.filePath}" target="_blank">View Result →</a>`;
                } else {
                    throw new Error(responseData.error);
                }
            } catch (error) {
                result.className = 'error';
                result.textContent = '❌ ' + error.message;
            }
        }
    </script>
</body>
</html>
