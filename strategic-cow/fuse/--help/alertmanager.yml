global:
  smtp_smarthost: localhost:587
  smtp_from: alerts@company.com
route:
  group_by:
  - alertname
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: default-receiver
  routes:
  - 
      match:
        severity: critical
      receiver: critical-alerts
      groupWait: 10s
      groupInterval: 5m
      repeatInterval: 12h
    - 
      match:
        severity: warning
      receiver: warning-alerts
      groupWait: 30s
      groupInterval: 10m
      repeatInterval: 24h
    - 
      match:
        service: database
      receiver: database-team
      groupWait: 5s
      groupInterval: 2m
      repeatInterval: 6h
  receivers:
- 
    name: critical-alerts
    email_configs:
    - 
        to: oncall@company.com
        subject: Alert: {{ .GroupLabels.alertname }}
        body: {{ range .Alerts }}{{ .Annotations.description }}{{ end }}
      slack_configs:
    - 
        api_url: https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK
        channel: #critical-alerts
        title: Alert: {{ .GroupLabels.alertname }}
        text: {{ range .Alerts }}{{ .Annotations.description }}{{ end }}
    - 
    name: warning-alerts
    email_configs:
    - 
        to: team@company.com
        subject: Alert: {{ .GroupLabels.alertname }}
        body: {{ range .Alerts }}{{ .Annotations.description }}{{ end }}
      slack_configs:
    - 
        api_url: https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK
        channel: #alerts
        title: Alert: {{ .GroupLabels.alertname }}
        text: {{ range .Alerts }}{{ .Annotations.description }}{{ end }}
    - 
    name: database-team
    email_configs:
    - 
        to: dba@company.com
        subject: Alert: {{ .GroupLabels.alertname }}
        body: {{ range .Alerts }}{{ .Annotations.description }}{{ end }}
      slack_configs:
    - 
        api_url: https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK
        channel: #database-alerts
        title: Alert: {{ .GroupLabels.alertname }}
        text: {{ range .Alerts }}{{ .Annotations.description }}{{ end }}
    inhibit_rules:
- 
    sourceMatch:
      severity: critical
    targetMatch:
      severity: warning
    equal:
    - service
    - instance
  