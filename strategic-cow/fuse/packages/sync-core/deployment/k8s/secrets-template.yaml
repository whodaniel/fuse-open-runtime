# IMPORTANT: This is a template file. Create the actual secrets using kubectl create secret
# DO NOT commit actual secrets to git

# Create the secret using:
# kubectl create secret generic sync-core-secrets \
#   --from-literal=database-url='postgresql://user:password@postgres-service:5432/tnf' \
#   --namespace=the-new-fuse

apiVersion: v1
kind: Secret
metadata:
  name: sync-core-secrets
  namespace: the-new-fuse
  labels:
    app: sync-core
type: Opaque
data:
  # Base64 encoded values (use: echo -n 'value' | base64)
  # database-url: <base64-encoded-postgresql-url>

  # Example (DO NOT USE IN PRODUCTION):
  # database-url: cG9zdGdyZXNxbDovL3VzZXI6cGFzc3dvcmRAcG9zdGdyZXMtc2VydmljZTo1NDMyL3RuZg==
