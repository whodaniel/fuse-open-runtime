<!doctype html>
<html>
  <head>
    <title>Quick Seed - The New Fuse</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
      }
      .container {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        padding: 3rem;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
        max-width: 400px;
        width: 90%;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
      h1 {
        margin: 0 0 1rem 0;
        font-size: 2rem;
        font-weight: 700;
      }
      p {
        font-size: 1.1rem;
        margin-bottom: 2rem;
        opacity: 0.9;
        line-height: 1.5;
      }
      .action-btn {
        background: white;
        color: #38a169;
        border: none;
        padding: 1rem 3rem;
        font-size: 1.2rem;
        font-weight: bold;
        border-radius: 50px;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        text-decoration: none;
        display: inline-block;
      }
      .action-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
      }
      .action-btn:active {
        transform: translateY(1px);
      }
      .status {
        margin-top: 1.5rem;
        font-size: 0.9rem;
        min-height: 1.5em;
      }
      .loader {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: white;
        animation: spin 1s ease-in-out infinite;
        margin-right: 10px;
        vertical-align: middle;
        display: none;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Seed Database</h1>
      <p>
        Populate your database with initial test data including users, organizations, and sample
        workflows.
      </p>

      <button id="seedBtn" class="action-btn">
        <span class="loader"></span>
        <span class="btn-text">🌱 Plant Seeds</span>
      </button>

      <div class="status" id="statusText">Ready to seed</div>
    </div>

    <script>
      document.getElementById('seedBtn').addEventListener('click', async () => {
        const btn = document.getElementById('seedBtn');
        const loader = btn.querySelector('.loader');
        const text = btn.querySelector('.btn-text');
        const status = document.getElementById('statusText');

        // Set loading state
        btn.disabled = true;
        btn.style.opacity = '0.9';
        btn.style.cursor = 'wait';
        loader.style.display = 'inline-block';
        text.textContent = 'Seeding...';
        status.textContent = 'Running database seed script...';

        try {
          const response = await fetch('http://localhost:5000/api/database/migrate', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ type: 'seed' }),
          });

          const result = await response.json();

          if (result.success) {
            text.textContent = 'Done!';
            status.textContent = '✅ Database seeded successfully!';
            setTimeout(() => {
              text.textContent = '🌱 Plant Seeds';
              btn.disabled = false;
              btn.style.opacity = '1';
              btn.style.cursor = 'pointer';
              loader.style.display = 'none';
            }, 2000);
          } else {
            throw new Error(result.error || result.message);
          }
        } catch (error) {
          text.textContent = 'Error';
          status.textContent = '❌ Failed: ' + error.message;
          setTimeout(() => {
            text.textContent = '🌱 Try Again';
            btn.disabled = false;
            btn.style.opacity = '1';
            btn.style.cursor = 'pointer';
            loader.style.display = 'none';
            status.textContent = 'Ready to seed';
          }, 3000);
        }
      });
    </script>
  </body>
</html>
