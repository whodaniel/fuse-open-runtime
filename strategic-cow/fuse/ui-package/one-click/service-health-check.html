<!DOCTYPE html>
<html>
<head>
    <title>The New Fuse - Service Health Check</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 40px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 60px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            margin: 0 0 10px 0;
            color: #2d3748;
            font-size: 28px;
        }
        .subtitle {
            color: #718096;
            margin-bottom: 40px;
            font-size: 14px;
        }
        button {
            width: 100%;
            font-size: 18px;
            padding: 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
        }
        #status {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }
        .status-loading {
            background: #fef3c7;
            color: #92400e;
            display: block;
        }
        .status-success {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }
        .status-error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }
        .service-list {
            margin-top: 20px;
        }
        .service-item {
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .service-healthy {
            background: #d1fae5;
            color: #065f46;
        }
        .service-unhealthy {
            background: #fee2e2;
            color: #991b1b;
        }
        .service-name {
            font-weight: 600;
        }
        .service-status {
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏥 Service Health Check</h1>
        <p class="subtitle">Check health of all The New Fuse services</p>

        <button id="checkBtn" onclick="checkHealth()">
            🚀 Check All Services
        </button>

        <div id="status"></div>
    </div>

    <script>
        async function checkHealth() {
            const btn = document.getElementById('checkBtn');
            const status = document.getElementById('status');

            btn.disabled = true;
            status.className = 'status-loading';
            status.style.display = 'block';
            status.innerHTML = '⏳ Checking services...';

            try {
                // Check each service
                const services = [
                    { name: 'Frontend', port: 3000, endpoint: 'http://localhost:3000' },
                    { name: 'Backend API', port: 3001, endpoint: 'http://localhost:3001/health' },
                    { name: 'API Gateway', port: 3005, endpoint: 'http://localhost:3005/health' },
                    { name: 'PostgreSQL', port: 5433, endpoint: 'http://localhost:3001/api/db/health' },
                    { name: 'Redis', port: 6380, endpoint: 'http://localhost:3001/api/cache/health' },
                ];

                let html = '<div class="service-list">';
                let allHealthy = true;

                for (const service of services) {
                    try {
                        const response = await fetch(service.endpoint, {
                            method: 'GET',
                            mode: 'no-cors', // For demo purposes
                        });

                        // Assume healthy if fetch doesn't throw
                        html += `
                            <div class="service-item service-healthy">
                                <span class="service-name">${service.name}</span>
                                <span class="service-status">✅ Healthy (Port ${service.port})</span>
                            </div>
                        `;
                    } catch (error) {
                        allHealthy = false;
                        html += `
                            <div class="service-item service-unhealthy">
                                <span class="service-name">${service.name}</span>
                                <span class="service-status">❌ Unhealthy (Port ${service.port})</span>
                            </div>
                        `;
                    }
                }

                html += '</div>';

                if (allHealthy) {
                    status.className = 'status-success';
                    status.innerHTML = '✅ All services are healthy!' + html;
                } else {
                    status.className = 'status-error';
                    status.innerHTML = '⚠️ Some services are unhealthy' + html;
                }

            } catch (error) {
                status.className = 'status-error';
                status.innerHTML = '❌ Error checking services: ' + error.message +
                    '<br><br>Make sure services are running:<br>' +
                    '<code>pnpm run docker:start && pnpm run dev</code>';
            } finally {
                btn.disabled = false;
            }
        }

        // Auto-check on load
        window.addEventListener('load', () => {
            setTimeout(checkHealth, 500);
        });
    </script>
</body>
</html>
