<!doctype html>
<html>
  <head>
    <title>Start Docker Services - The New Fuse</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #4299e1 0%, #3182ce 100%);
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
      }
      .container {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        padding: 3rem;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
        max-width: 400px;
        width: 90%;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
      .action-btn {
        background: white;
        color: #3182ce;
        border: none;
        padding: 1rem 3rem;
        font-size: 1.2rem;
        font-weight: bold;
        border-radius: 50px;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        margin-top: 2rem;
      }
      .action-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
      }
      .loader {
        display: none;
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: #3182ce;
        animation: spin 1s ease-in-out infinite;
        margin-right: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Start Services</h1>
      <p>Boot up Docker containers for all required microservices (DB, Redis, API).</p>
      <button id="actionBtn" class="action-btn">🚀 Launch Docker</button>
      <div id="status" style="margin-top: 1rem; min-height: 1.5rem"></div>
    </div>
    <script>
      document.getElementById('actionBtn').addEventListener('click', async () => {
        const btn = document.getElementById('actionBtn');
        const status = document.getElementById('status');
        btn.disabled = true;
        btn.textContent = 'Starting...';

        try {
          const response = await fetch('http://localhost:5000/api/services/check', {
            // Changing to check service as start might be complex via simplified api for now unless endpoint exists
            // Actually, let's use setup/complete which has docker start capability
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              installDeps: false,
              startDocker: true,
              runMigrations: false,
              syncAgents: false,
            }),
          });
          const result = await response.json();
          if (result.success) {
            status.textContent = '✅ Services Started!';
            btn.textContent = 'Done';
          } else {
            throw new Error(result.error || 'Failed');
          }
        } catch (e) {
          status.textContent = '❌ Error: ' + e.message;
          btn.disabled = false;
          btn.textContent = '🚀 Launch Docker';
        }
      });
    </script>
  </body>
</html>
