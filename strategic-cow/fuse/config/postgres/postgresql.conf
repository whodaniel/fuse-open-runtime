# PostgreSQL Configuration for Million-User Scalability
# Optimized for high-concurrency workloads

# Connection Settings
max_connections = 500
superuser_reserved_connections = 3

# Memory Settings
shared_buffers = 256MB                    # 25% of available RAM (assuming 1GB container)
effective_cache_size = 1GB                # 75% of available RAM
work_mem = 4MB                           # Per-operation memory
maintenance_work_mem = 64MB              # Maintenance operations
max_wal_size = 2GB                       # WAL size limit
min_wal_size = 80MB                      # Minimum WAL size

# Checkpoint Settings
checkpoint_completion_target = 0.9        # Spread checkpoints over 90% of interval
checkpoint_timeout = 10min               # Maximum time between checkpoints
checkpoint_warning = 30s                 # Warn if checkpoints happen too frequently

# WAL Settings
wal_buffers = 16MB                       # WAL buffer size
wal_writer_delay = 200ms                 # WAL writer sleep time
commit_delay = 0                         # Commit delay in microseconds
commit_siblings = 5                      # Minimum concurrent transactions for delay

# Query Planner Settings
random_page_cost = 1.1                   # Cost of random page access (SSD optimized)
effective_io_concurrency = 200           # Expected concurrent I/O operations
default_statistics_target = 100          # Statistics collection target

# Logging Settings
log_destination = 'stderr'
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_truncate_on_rotation = on
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 10MB
log_autovacuum_min_duration = 0
log_error_verbosity = default
log_min_messages = warning
log_min_error_statement = error
log_min_duration_statement = 1000        # Log queries taking longer than 1 second

# Autovacuum Settings
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.2
autovacuum_analyze_scale_factor = 0.1
autovacuum_freeze_max_age = 200000000
autovacuum_multixact_freeze_max_age = 400000000
autovacuum_vacuum_cost_delay = 20ms
autovacuum_vacuum_cost_limit = 200

# Lock Management
max_locks_per_transaction = 64
max_pred_locks_per_transaction = 64
deadlock_timeout = 1s

# Background Writer Settings
bgwriter_delay = 200ms
bgwriter_lru_maxpages = 100
bgwriter_lru_multiplier = 2.0
bgwriter_flush_after = 512kB

# Asynchronous Behavior
effective_io_concurrency = 200
max_worker_processes = 8
max_parallel_workers_per_gather = 2
max_parallel_workers = 8
max_parallel_maintenance_workers = 2

# Client Connection Defaults
search_path = '"$user", public'
default_tablespace = ''
temp_tablespaces = ''
check_function_bodies = on
default_transaction_isolation = 'read committed'
default_transaction_read_only = off
default_transaction_deferrable = off
session_replication_role = 'origin'
statement_timeout = 0
lock_timeout = 0
idle_in_transaction_session_timeout = 0
vacuum_freeze_min_age = 50000000
vacuum_freeze_table_age = 150000000
vacuum_multixact_freeze_min_age = 5000000
vacuum_multixact_freeze_table_age = 150000000
bytea_output = 'hex'
xmloption = 'content'
xmlbinary = 'base64'

# Locale and Formatting
datestyle = 'iso, mdy'
intervalstyle = 'postgres'
timezone = 'UTC'
timezone_abbreviations = 'Default'
extra_float_digits = 0
client_encoding = 'UTF8'

# Shared Library Preloading
shared_preload_libraries = 'pg_stat_statements'

# Statistics Settings
track_activities = on
track_counts = on
track_io_timing = on
track_functions = none
track_activity_query_size = 1024
stats_temp_directory = 'pg_stat_tmp'

# Error Reporting and Logging
client_min_messages = notice
log_min_messages = warning
log_min_error_statement = error

# Connection Pooling Preparation
listen_addresses = '*'
port = 5432
max_files_per_process = 1000
max_stack_depth = 2MB

# Security Settings
ssl = off
password_encryption = scram-sha-256
row_security = on

# Replication Settings (for future scaling)
wal_level = replica
max_wal_senders = 3
max_replication_slots = 3
hot_standby = on
hot_standby_feedback = off
wal_receiver_timeout = 60s
wal_sender_timeout = 60s

# Archive Settings (for backup)
archive_mode = off
archive_command = ''
archive_timeout = 0

# Recovery Settings
restore_command = ''
archive_cleanup_command = ''
recovery_end_command = ''

# Standby Server Settings
primary_conninfo = ''
primary_slot_name = ''
promote_trigger_file = ''
recovery_min_apply_delay = 0

# Performance Monitoring
log_statement_stats = off
log_parser_stats = off
log_planner_stats = off
log_executor_stats = off