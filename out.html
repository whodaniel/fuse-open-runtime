    <!-- CRITICAL: Custom Element Guard MUST be first to intercept browser extension scripts -->
    <script>
      (function () {
        let GUARD_DEBUG = false;
        try {
          GUARD_DEBUG =
            (window && window.__TNF_DEBUG_CUSTOM_ELEMENTS__) ||
            (window && window.localStorage && window.localStorage.getItem('TNF_DEBUG_CE') === '1');
        } catch (_e) {
          GUARD_DEBUG = false;
        }

        // AGGRESSIVE ERROR FILTER: Catch and swallow specific collision and module resolution errors
        const swallowError = function (message) {
          const msg = (message || '').toLowerCase();
          return (
            msg.includes('mce-autosize-textarea') ||
            msg.includes('already been defined') ||
            msg.includes('already been used') ||
            msg.includes('failed to resolve module') ||
            msg.includes('scheduler') ||
            (msg.includes('uncaught') && msg.includes('custom element'))
          );
        };

        // window.onerror for broad string-based errors
        const originalOnerror = window.onerror;
        window.onerror = function (message, source, lineno, colno, error) {
          if (swallowError(message)) {
            console.warn('[The New Fuse] Globally suppressed error:', message);
            return true; // Prevents error from appearing in console
          }
          if (originalOnerror) return originalOnerror.apply(this, arguments);
        };

        // addEventListener('error') for Event object errors
        window.addEventListener(
          'error',
          function (event) {
            if (swallowError(event.message)) {
              event.preventDefault();
              event.stopImmediatePropagation();
              return true;
            }
          },
          true
        );

        // Also catch unhandled promise rejections
        window.addEventListener(
          'unhandledrejection',
          function (event) {
            const reason = event.reason?.message || String(event.reason || '');
            if (swallowError(reason)) {
              event.preventDefault();
              return true;
            }
          },
          true
        );

        try {
          // Keep track of all registered elements
          const registeredElements = new Set();
          const definingElements = new Set();

          // Store original methods
          const registry = customElements;
          const originalDefine = registry.define.bind(registry);
          const originalGet = registry.get.bind(registry);

          // Create a safer define function
          const safeDefine = function (name, constructor, options) {
            // SPECIAL CASE: mce-autosize-textarea is notoriously problematic with polyfills
            if (name === 'mce-autosize-textarea') {
              if (customElements.get(name) || registeredElements.has(name)) {
                return;
              }
            }

            // Double-check if already registered in our tracker
            if (registeredElements.has(name)) {
              return;
            }

            // Check if already defined via native API
            try {
              const existing = originalGet(name);
              if (existing) {
                registeredElements.add(name);
                return;
              }
            } catch (e) {
              // Get failed, element doesn't exist - continue
            }

            // Check if currently being defined (race condition)
            if (definingElements.has(name)) {
              return;
            }

            // Final safety check: if already defined in the global registry, skip
            if (customElements.get(name)) {
              registeredElements.add(name);
              return;
            }

            // Mark as being defined
            definingElements.add(name);

            try {
              originalDefine(name, constructor, options);
              registeredElements.add(name);
            } catch (e) {
              const msg = (e && e.message) || String(e || '');
              if (
                msg.toLowerCase().includes('already') ||
                msg.toLowerCase().includes('defined') ||
                msg.toLowerCase().includes('used') ||
                msg.includes('NotSupportedError')
              ) {
                // Silently handle - element is already defined
                registeredElements.add(name);
                return;
              }
              // Re-throw unexpected errors
              console.error(`[The New Fuse] Error defining '${name}':`, e);
              // don't throw to prevent crashing the whole app
            } finally {
              // Remove from defining set
              definingElements.delete(name);
            }
          };

          // Mark as guarded so other scripts know
          safeDefine.__isSafeGuarded = true;

          // Bind the function to customElements to maintain context
          const boundSafeDefine = safeDefine.bind(registry);
          // Also mark the bound function
          boundSafeDefine.__isSafeGuarded = true;

          // Patch prototype AND instance so polyfills or wrappers calling either path are protected.
          const proto = window.CustomElementRegistry && window.CustomElementRegistry.prototype;
          if (proto && proto.define && !proto.define.__isSafeGuarded) {
            Object.defineProperty(proto, 'define', {
              value: boundSafeDefine,
              configurable: false,
              writable: false,
            });
          }
          if (!registry.define.__isSafeGuarded) {
            Object.defineProperty(registry, 'define', {
              value: boundSafeDefine,
              configurable: false,
              writable: false,
            });
          }

          // Lock the customElements object itself to prevent polyfills from replacing it
          try {
            const originalCustomElements = window.customElements;
            if (originalCustomElements) {
              Object.defineProperty(window, 'customElements', {
                get() {
                  return originalCustomElements;
                },
                set(v) {
                  console.warn(
                    '[The New Fuse] Prevented external script from overwriting window.customElements'
                  );
                },
                configurable: false,
              });
            }
          } catch (e) {
            // Ignore if already non-configurable
          }

          if (GUARD_DEBUG) {
            console.log('[The New Fuse] Custom Element Guard active');
          }
        } catch (e) {
          console.error('[The New Fuse] Custom Element Guard failed to initialize', e);
        }
      })();
    </script>

    <!-- Global CommonJS require() shim for bundled dependencies (ethers.js, bn.js, etc.) -->
    <script>
      // Shim for CommonJS require() calls that can't be polyfilled at build time
      // Some libraries use eval("require(...)") which bypasses Vite's transforms
      (function () {
        if (typeof window.require === 'undefined') {
          // Create a stub that returns empty modules for common Node.js modules
          const emptyModule = {};
          const bufferModule = {
            Buffer: typeof Buffer !== 'undefined' ? Buffer : { from: () => [], alloc: () => [] },
          };

          window.require = function (moduleName) {
            // Suppress warnings for expected browser-incompatible modules
            const ignoredModules = [
              'fs',
              'path',
              'os',
              'crypto',
              'buffer',
              '@emotion/is-prop-valid',
            ];
            if (!ignoredModules.includes(moduleName) && !moduleName.startsWith('node:')) {
              console.warn('[The New Fuse] CommonJS require() called for:', moduleName);
            }

            // Return appropriate stubs for known modules
            if (moduleName === 'crypto') {
              return (
                window.crypto || {
                  createHash: () => ({ update: () => ({ digest: () => '' }), digest: () => '' }),
                  randomBytes: (size) => new Uint8Array(size),
                }
              );
            }
            if (moduleName === 'buffer' || moduleName === 'buffer/') {
              return bufferModule;
            }
            if (moduleName === 'bn.js') {
              // Return a functional BN implementation using BigInt
              // This handles the eval("require('bn.js')") pattern in some crypto libs
              if (window._BNCache) return window._BNCache;

              class BN {
                constructor(number, base, endian) {
                  if (number instanceof BN) {
                    this.value = number.value;
                  } else if (typeof number === 'bigint') {
                    this.value = number;
                  } else if (typeof number === 'number') {
                    this.value = BigInt(number);
                  } else if (typeof number === 'string') {
                    const b = base || 10;
                    this.value = BigInt(b === 16 ? '0x' + number.replace(/^0x/i, '') : number);
                  } else if (number && number.length !== undefined) {
                    // Array or Buffer
                    let hex = '0x';
                    for (let i = 0; i < number.length; i++)
                      hex += number[i].toString(16).padStart(2, '0');
                    this.value = BigInt(hex);
                  } else {
                    this.value = BigInt(0);
                  }
                }
                clone() {
                  return new BN(this.value);
                }
                add(b) {
                  return new BN(this.value + new BN(b).value);
                }
                sub(b) {
                  return new BN(this.value - new BN(b).value);
                }
                mul(b) {
                  return new BN(this.value * new BN(b).value);
                }
                div(b) {
                  return new BN(this.value / new BN(b).value);
                }
                mod(b) {
                  return new BN(this.value % new BN(b).value);
                }
                pow(b) {
                  return new BN(this.value ** new BN(b).value);
                }
                sqr() {
                  return new BN(this.value * this.value);
                }
                neg() {
                  return new BN(-this.value);
                }
                abs() {
                  return new BN(this.value < 0n ? -this.value : this.value);
                }
                isZero() {
                  return this.value === 0n;
                }
                isNeg() {
                  return this.value < 0n;
                }
                cmp(b) {
                  const bv = new BN(b).value;
                  return this.value < bv ? -1 : this.value > bv ? 1 : 0;
                }
                lt(b) {
                  return this.cmp(b) < 0;
                }
                lte(b) {
                  return this.cmp(b) <= 0;
                }
                gt(b) {
                  return this.cmp(b) > 0;
                }
                gte(b) {
                  return this.cmp(b) >= 0;
                }
                eq(b) {
                  return this.cmp(b) === 0;
                }
                toNumber() {
                  return Number(this.value);
                }
                toString(base) {
                  const b = base || 10;
                  if (b === 16) return this.value.toString(16);
                  return this.value.toString();
                }
                toArray(endian, length) {
                  let hex = this.value.toString(16);
                  if (hex.length % 2) hex = '0' + hex;
                  const arr = [];
                  for (let i = 0; i < hex.length; i += 2) arr.push(parseInt(hex.substr(i, 2), 16));
                  if (length && arr.length < length) {
                    while (arr.length < length) arr.unshift(0);
                  }
                  if (endian === 'le') arr.reverse();
                  return arr;
                }
                toBuffer(endian, length) {
                  return new Uint8Array(this.toArray(endian, length));
                }
                bitLength() {
                  return this.value.toString(2).length;
                }
                byteLength() {
                  return Math.ceil(this.bitLength() / 8);
                }
                and(b) {
                  return new BN(this.value & new BN(b).value);
                }
                or(b) {
                  return new BN(this.value | new BN(b).value);
                }
                xor(b) {
                  return new BN(this.value ^ new BN(b).value);
                }
                shln(n) {
                  return new BN(this.value << BigInt(n));
                }
                shrn(n) {
                  return new BN(this.value >> BigInt(n));
                }
                static isBN(obj) {
                  return obj instanceof BN;
                }
                static red(m) {
                  return { prime: null, m: new BN(m) };
                }
                toRed(ctx) {
                  this._red = ctx;
                  return this;
                }
                fromRed() {
                  return this.clone();
                }
                redAdd(b) {
                  return this.add(b).mod(this._red?.m || new BN(1));
                }
                redSub(b) {
                  return this.sub(b).mod(this._red?.m || new BN(1));
                }
                redMul(b) {
                  return this.mul(b).mod(this._red?.m || new BN(1));
                }
                redSqr() {
                  return this.sqr().mod(this._red?.m || new BN(1));
                }
                redPow(b) {
                  return this.pow(b).mod(this._red?.m || new BN(1));
                }
              }
              BN.BN = BN;
              BN.wordSize = 26;
              window._BNCache = BN;
              return BN;
            }
            if (moduleName === '@emotion/is-prop-valid') {
              return { default: () => true };
            }

            // Scheduler module - used internally by React, some external scripts try to import it directly
            if (moduleName === 'scheduler' || moduleName === 'scheduler/tracing') {
              // Return a minimal scheduler shim that provides the essential APIs
              if (window._schedulerShim) return window._schedulerShim;

              const schedulerShim = {
                unstable_scheduleCallback: function (priority, callback) {
                  return setTimeout(callback, 0);
                },
                unstable_cancelCallback: function (task) {
                  clearTimeout(task);
                },
                unstable_now: function () {
                  return performance.now();
                },
                unstable_getCurrentPriorityLevel: function () {
                  return 3; // NormalPriority
                },
                unstable_ImmediatePriority: 1,
                unstable_UserBlockingPriority: 2,
                unstable_NormalPriority: 3,
                unstable_LowPriority: 4,
                unstable_IdlePriority: 5,
                unstable_runWithPriority: function (priority, callback) {
                  return callback();
                },
                unstable_next: function (callback) {
                  return callback();
                },
                unstable_wrapCallback: function (callback) {
                  return callback;
                },
                unstable_shouldYield: function () {
                  return false;
                },
                unstable_requestPaint: function () {},
                unstable_Profiling: null,
              };
              window._schedulerShim = schedulerShim;
              return schedulerShim;
            }

            return emptyModule;
          };
          window.require.main = null;
          // Intentional no-op log to avoid console noise in production.
        }
      })();
    </script>
