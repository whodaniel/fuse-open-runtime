            {
                id: "business-model-architect-agent",
                name: "Business Model Architect Agent",
                prompt: "Future-retro ultra realistic humanoid portrait, premium cinematic science-fiction editorial photography, chest-up composition, 1:1 profile image framing. A 52-year-old East Asian male humanoid operator. His skin has distinguished features with deep, expressive character lines. His expression is focused, calm, deeply technical, and scrutinizing. Tactile analog-meets-cybernetic wardrobe, photoreal skin texture, subtle retro-futurist hardware, badge-ready negative space, dramatic but clean studio lighting, grounded realism, no cartoon styling, no text in image. Business Model Architect Agent interpreted as a systems forge engineer. Color story: navy, electric blue, titanium. Wardrobe: utility jacket with modular tooling. Environment: server forge with orchestration schematics. Make the subject look like a memorable humanoid operator with strong personality, deeply intelligent eyes, and premium retro-future craftsmanship."

        ];

        let currentIndex = 0;
        const outputDir = "/Users/danielgoldberg/.gemini/antigravity/brain/129a6f84-97a9-4c46-88c8-4b5f066454aa/";
        
        function log(msg, type = "") {
            const div = document.createElement("div");
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            if (type) div.className = type;
            document.getElementById("log").appendChild(div);
            document.getElementById("log").scrollTop = document.getElementById("log").scrollHeight;
        }

        async function generateImage(agent) {
            log(`Generating: ${agent.name}`);
            document.getElementById("status").textContent = `Status: Generating ${agent.name}`;
            
            try {
                // Use gemini-2.5-flash-image-preview (nano-banana)
                const result = await puter.ai.txt2img(agent.prompt, {
                    model: "gemini-2.5-flash-image-preview"
                });
                
                if (result) {
                    // Create a download link
                    const link = document.createElement("a");
                    link.href = result.src || result;
                    link.download = `${agent.id}.png`;
                    
                    // Create card with image
                    const card = document.createElement("div");
                    card.className = "agent-card";
                    
                    const img = document.createElement("img");
                    img.src = result.src || result;
                    
                    const info = document.createElement("div");
                    info.innerHTML = `<strong>${agent.name}</strong><br>✓ Generated`;
                    
                    card.appendChild(img);
                    card.appendChild(info);
                    document.getElementById("results").appendChild(card);
                    
                    log(`✓ Saved: ${agent.id}.png`, "success");
                    return true;
                }
            } catch (e) {
                log(`Error: ${e.message}`, "error");
            }
            return false;
        }

        async function startGeneration() {
            document.getElementById("startBtn").disabled = true;
            document.getElementById("total").textContent = `Total: ${agents.length}`;
            
            for (let i = currentIndex; i < agents.length; i++) {
                document.getElementById("current").textContent = `Current: ${i + 1}`;
                
                const success = await generateImage(agents[i]);
                if (success) {
                    currentIndex = i + 1;
                }
                
                // Delay between generations to avoid rate limits
                await new Promise(r => setTimeout(r, 3000));
            }
            
            document.getElementById("status").textContent = "Status: Complete!";
            document.getElementById("startBtn").disabled = false;
            log("All done!", "success");
        }

        function skipTo() {
            const num = prompt("Enter agent number to skip to (1-" + agents.length + "):");
            if (num && num > 0 && num <= agents.length) {
                currentIndex = parseInt(num) - 1;
                log(`Skipped to agent #${currentIndex + 1}`);
            }
        }
    </script>
