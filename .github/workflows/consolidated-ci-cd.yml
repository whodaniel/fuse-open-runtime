name: Consolidated CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.1.38'

      - name: Generate cache key
        id: cache-key
        run: echo "key=deps-${{ hashFiles('**/bun.lockb', '**/package.json') }}" >> $GITHUB_OUTPUT

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            **/node_modules
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            deps-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

  type-check:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.1.38'

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            **/node_modules
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Type check
        run: pnpm run type-check

  lint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.1.38'

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            **/node_modules
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Run Linting
        run: pnpm run lint

  test:
    needs: [setup, type-check]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test-type: [unit, integration]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.1.38'

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            **/node_modules
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Generate Database Client
        run: pnpm run db:generate

      - name: Run ${{ matrix.test-type }} Tests
        run: pnpm run test:${{ matrix.test-type }}

      - name: Upload Coverage
        if: matrix.test-type == 'unit'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: ${{ matrix.test-type }}tests
          fail_ci_if_error: false

  build:
    needs: [setup, lint, type-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.1.38'

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            **/node_modules
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ github.sha }}
          restore-keys: |
            turbo-

      - name: Generate Database Client
        run: pnpm run db:generate

      - name: Build All Packages (Dependency Order)
        run: pnpm run build:ci

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            packages/*/dist
            packages/*/lib
            packages/*/types
            apps/*/dist
            apps/*/.next
          key: build-${{ github.sha }}

  docker-build:
    needs: [build, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    strategy:
      matrix:
        service: [api, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.1.38'

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            packages/*/dist
            packages/*/lib
            packages/*/types
            apps/*/dist
            apps/*/.next
          key: build-${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SERVICE=${{ matrix.service }}
            NODE_ENV=production

  deploy-staging:
    needs: [docker-build, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.1.38'

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            **/node_modules
          key: deps-${{ hashFiles('**/bun.lockb', '**/package.json') }}

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Run database migrations
        run: pnpm run db:migrate
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Deploy to staging
        run: |
          kubectl apply -f k8s/staging/
          kubectl set image deployment/api-staging api=ghcr.io/${{ github.repository }}/api:develop-${{ github.sha }}
          kubectl set image deployment/frontend-staging frontend=ghcr.io/${{ github.repository }}/frontend:develop-${{ github.sha }}

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/api-staging --timeout=300s
          kubectl rollout status deployment/frontend-staging --timeout=300s

      - name: Run health checks
        run: |
          ./scripts/deployment/deploy-full-stack.sh production true # Run with skip_tests to only verify

      - name: Run Extended Deployment Status Report (Production)
        run: ./scripts/deployment/deploy-status-extended.sh production

      - name: Run Extended Deployment Status Report (Staging)
        run: ./scripts/deployment/deploy-status-extended.sh staging

  deploy-production:
    needs: [docker-build, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.1.38'

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            **/node_modules
          key: deps-${{ hashFiles('**/bun.lockb', '**/package.json') }}

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Run Database Migrations
        run: pnpm run db:migrate
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

      - name: Deploy to production
        run: ./scripts/deployment/deploy-full-stack.sh production

      - name: Verify deployment
        run: ./scripts/deployment/deploy-full-stack.sh production true # Run with skip_tests to only verify

  notify:
    needs: [deploy-staging, deploy-production]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Determine status
        id: status
        run: |
          if [[ "${{ needs.deploy-staging.result }}" == "success" ]] || [[ "${{ needs.deploy-production.result }}" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.deploy-staging.result }}" == "failure" ]] || [[ "${{ needs.deploy-production.result }}" == "failure" ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
          else
            echo "status=skipped" >> $GITHUB_OUTPUT
          fi

      - name: Notify Slack
        if: steps.status.outputs.status != 'skipped'
        uses: slackapi/slack-github-action@v1.25.0
        with:
          channel-id: 'deployments'
          slack-message: |
            🚀 Deployment Status: ${{ steps.status.outputs.status == 'success' && '✅ Success' || '❌ Failed' }}
            📝 Commit: ${{ github.sha }}
            👤 Author: ${{ github.actor }}
            💬 Message: ${{ github.event.head_commit.message }}
            🌍 Environment: ${{ github.ref == 'refs/heads/main' && 'Production' || 'Staging' }}
            🔗 Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && steps.status.outputs.status == 'success'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            ## Changes in this Release
            ${{ github.event.head_commit.message }}
            
            ## Docker Images
            - API: `ghcr.io/${{ github.repository }}/api:${{ github.sha }}`
            - Frontend: `ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}`
            
            ## Deployment Info
            - Commit: ${{ github.sha }}
            - Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          draft: false
          prerelease: false
