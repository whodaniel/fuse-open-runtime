name: Roadmap Progress Tracker

on:
  issues:
    types: [opened, closed, reopened, labeled, unlabeled]
  pull_request:
    types: [opened, closed, merged]
  schedule:
    # Run daily at 9 AM UTC
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  update-roadmap-progress:
    runs-on: ubuntu-latest
    if: false # Temporarily disabled - missing CODEBASE_IMPROVEMENT_ROADMAP.md
    # if: github.repository == 'whodaniel/fuse'
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install Script Dependencies
        run: |
          cat > package.json << 'EOF'
          {
            "dependencies": {
              "@octokit/rest": "22.0.0",
              "js-yaml": "4.1.0"
            }
          }
          EOF
          pnpm install --shamefully-hoist

      - name: Update Roadmap Progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > update_progress.js << 'EOF'
          const { Octokit } = require('@octokit/rest');
          const fs = require('fs');
          const path = require('path');

          const octokit = new Octokit({
            auth: process.env.GITHUB_TOKEN,
          });

          async function updateRoadmapProgress() {
            try {
              // Get repository info
              const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
              
              // Fetch all issues with roadmap labels
              const { data: issues } = await octokit.rest.issues.listForRepo({
                owner,
                repo,
                labels: 'phase-1,phase-2,phase-3,phase-4',
                state: 'all',
                per_page: 100
              });

              // Calculate progress by phase
              const phases = {
                'phase-1': { total: 0, completed: 0, tasks: [] },
                'phase-2': { total: 0, completed: 0, tasks: [] },
                'phase-3': { total: 0, completed: 0, tasks: [] },
                'phase-4': { total: 0, completed: 0, tasks: [] }
              };

              issues.forEach(issue => {
                const phaseLabel = issue.labels.find(label => 
                  ['phase-1', 'phase-2', 'phase-3', 'phase-4'].includes(label.name)
                );
                
                if (phaseLabel) {
                  const phaseName = phaseLabel.name;
                  phases[phaseName].total++;
                  phases[phaseName].tasks.push({
                    number: issue.number,
                    title: issue.title,
                    state: issue.state,
                    assignee: issue.assignee?.login || 'Unassigned',
                    labels: issue.labels.map(l => l.name)
                  });
                  
                  if (issue.state === 'closed') {
                    phases[phaseName].completed++;
                  }
                }
              });

              // Calculate overall progress
              const totalTasks = Object.values(phases).reduce((sum, phase) => sum + phase.total, 0);
              const completedTasks = Object.values(phases).reduce((sum, phase) => sum + phase.completed, 0);
              const overallProgress = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;

              // Read current roadmap
              const roadmapPath = 'CODEBASE_IMPROVEMENT_ROADMAP.md';
              let roadmapContent = fs.readFileSync(roadmapPath, 'utf8');

              // Update progress dashboard
              const progressSection = `### **Overall Progress**
          - [${phases['phase-1'].completed === phases['phase-1'].total && phases['phase-1'].total > 0 ? 'x' : ' '}] **Phase 1 Complete** (${phases['phase-1'].completed}/${phases['phase-1'].total} tasks)
          - [${phases['phase-2'].completed === phases['phase-2'].total && phases['phase-2'].total > 0 ? 'x' : ' '}] **Phase 2 Complete** (${phases['phase-2'].completed}/${phases['phase-2'].total} tasks)
          - [${phases['phase-3'].completed === phases['phase-3'].total && phases['phase-3'].total > 0 ? 'x' : ' '}] **Phase 3 Complete** (${phases['phase-3'].completed}/${phases['phase-3'].total} tasks)
          - [${phases['phase-4'].completed === phases['phase-4'].total && phases['phase-4'].total > 0 ? 'x' : ' '}] **Phase 4 Complete** (${phases['phase-4'].completed}/${phases['phase-4'].total} tasks)

          **Total Progress: ${overallProgress}% (${completedTasks}/${totalTasks} tasks)**`;

              // Replace the progress section
              roadmapContent = roadmapContent.replace(
                /### \*\*Overall Progress\*\*[\s\S]*?\*\*Total Progress:.*?\*\*/,
                progressSection
              );

              // Update last updated date
              const currentDate = new Date().toISOString().split('T')[0];
              roadmapContent = roadmapContent.replace(
                /\*\*Last Updated:\*\* \d{4}-\d{2}-\d{2}/,
                `**Last Updated:** ${currentDate}`
              );

              // Write updated roadmap
              fs.writeFileSync(roadmapPath, roadmapContent);

              // Generate progress report
              const reportContent = `# Progress Report - ${currentDate}

          ## Overall Progress: ${overallProgress}%

          ### Phase Breakdown:
          ${Object.entries(phases).map(([phase, data]) => 
            `- **${phase.toUpperCase()}**: ${data.completed}/${data.total} tasks (${data.total > 0 ? Math.round((data.completed / data.total) * 100) : 0}%)`
          ).join('\n')}

          ### Recent Activity:
          ${issues.filter(issue => {
            const updatedAt = new Date(issue.updated_at);
            const sevenDaysAgo = new Date();
            sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
            return updatedAt > sevenDaysAgo;
          }).map(issue => 
            `- [#${issue.number}](${issue.html_url}) ${issue.title} - ${issue.state}`
          ).join('\n') || '- No recent activity'}

          ### Next Actions:
          ${Object.entries(phases).map(([phase, data]) => {
            const nextTasks = data.tasks.filter(task => task.state === 'open').slice(0, 3);
            return nextTasks.length > 0 ? 
              `#### ${phase.toUpperCase()}:\n${nextTasks.map(task => 
                `- [#${task.number}](https://github.com/${owner}/${repo}/issues/${task.number}) ${task.title}`
              ).join('\n')}` : '';
          }).filter(Boolean).join('\n\n')}
          `;

              // Save progress report
              fs.writeFileSync(`progress-reports/progress-${currentDate}.md`, reportContent);
              
              console.log('✅ Roadmap progress updated successfully');
              console.log(`📊 Overall Progress: ${overallProgress}% (${completedTasks}/${totalTasks})`);
              
            } catch (error) {
              console.error('❌ Error updating roadmap progress:', error);
              process.exit(1);
            }
          }

          updateRoadmapProgress();
          EOF

          # Create progress reports directory
          mkdir -p progress-reports
          
          # Run the progress update script
          node update_progress.js

      - name: Commit Progress Updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if [[ -n $(git status --porcelain) ]]; then
            git add CODEBASE_IMPROVEMENT_ROADMAP.md
            git add progress-reports/
            git commit -m "📊 Automated roadmap progress update - $(date +%Y-%m-%d)"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Create Progress Comment
        if: github.event_name == 'issues' && (github.event.action == 'closed' || github.event.action == 'reopened')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Calculate current progress for comment
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          
          cat > comment.js << 'EOF'
          const { Octokit } = require('@octokit/rest');
          
          const octokit = new Octokit({
            auth: process.env.GITHUB_TOKEN,
          });
          
          async function createProgressComment() {
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
            const issueNumber = process.env.ISSUE_NUMBER;
            const action = process.env.GITHUB_EVENT_ACTION;
            
            const emoji = action === 'closed' ? '✅' : '🔄';
            const status = action === 'closed' ? 'completed' : 'reopened';
            
            const comment = `${emoji} **Task ${status}!** 
          
          📊 This update will be reflected in the [Codebase Improvement Roadmap](../blob/main/CODEBASE_IMPROVEMENT_ROADMAP.md) progress tracking.
          
          👀 Check the roadmap for updated progress percentages and next priority tasks.`;
          
            await octokit.rest.issues.createComment({
              owner,
              repo,
              issue_number: parseInt(issueNumber),
              body: comment
            });
          }
          
          createProgressComment();
          EOF
          
          GITHUB_EVENT_ACTION="${{ github.event.action }}" node comment.js