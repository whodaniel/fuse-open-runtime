name: Gitlink Integrity

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gitlink-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Validate gitlink allowlist and state
        run: ./scripts/check-gitlinks.sh
