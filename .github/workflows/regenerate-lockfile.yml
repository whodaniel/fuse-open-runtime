name: Regenerate Lockfile

on:
  workflow_dispatch:

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: feat-supabase-integration
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: '10'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxkbfile-dev

      - name: Regenerate lockfile
        run: pnpm install --no-frozen-lockfile

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet pnpm-lock.yaml; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push lockfile
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "chore: regenerate pnpm-lock.yaml to fix package version mismatch

- Update @supabase/supabase-js to ^2.78.0
- Regenerated lockfile with pnpm 10 to match packageManager version"
          git push
