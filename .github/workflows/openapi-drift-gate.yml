name: OpenAPI Drift Gate

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "openapi.yaml"
      - "scripts/openapi/**"
      - "apps/api/src/**/*.controller.ts"
      - "apps/api/src/**/dto/**/*.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/openapi-drift-gate.yml"
  push:
    branches: [main, develop]
    paths:
      - "openapi.yaml"
      - "scripts/openapi/**"
      - "apps/api/src/**/*.controller.ts"
      - "apps/api/src/**/dto/**/*.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/openapi-drift-gate.yml"
  workflow_dispatch:

jobs:
  check-openapi-drift:
    name: Check OpenAPI Snapshot Drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --prefer-offline

      - name: Verify OpenAPI snapshot is up to date
        run: pnpm openapi:check
