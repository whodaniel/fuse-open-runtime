name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 'latest'
          
      - name: Install Dependencies
        run: bun install --frozen-lockfile
        
      - name: Build Packages
        run: bun run build
        
      - name: Build Docker Images
        run: docker compose build 