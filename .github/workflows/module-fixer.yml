name: Module System Fixer Agent

on:
  workflow_dispatch:
    inputs:
      failed_commit_sha:
        description: 'The commit SHA that failed deployment'
        required: true

jobs:
  fix-module-system-error:
    name: Fix ESM/CJS Module Conflict
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout failed commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.failed_commit_sha }}

      - name: Download failing file artifact
        uses: actions/download-artifact@v4
        with:
          name: failing-file-${{ github.event.inputs.failed_commit_sha }}
          path: .

      - name: Prepare Fix
        id: prepare
        run: |
          if [ ! -f failing_file.txt ]; then
            echo "Failing file artifact not found. Aborting."
            exit 1
          fi
          FAILING_FILE=$(cat failing_file.txt)
          if [ -z "$FAILING_FILE" ]; then
            echo "Failing file path is empty. Aborting."
            exit 1
          fi

          NEW_FILE="${FAILING_FILE%.js}.cjs"
          BRANCH_NAME="agent/fix-module-conflict-${{ github.event.inputs.failed_commit_sha }}"

          echo "Failing file: $FAILING_FILE"
          echo "New file name: $NEW_FILE"
          echo "Branch name: $BRANCH_NAME"

          echo "failing_file=$FAILING_FILE" >> $GITHUB_OUTPUT
          echo "new_file=$NEW_FILE" >> $GITHUB_OUTPUT
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Apply Automated Fix
        run: |
          git config --global user.name "Module Fixer Agent"
          git config --global user.email "agent@thenewfuse.com"

          git checkout -b ${{ steps.prepare.outputs.branch_name }}
          git mv ${{ steps.prepare.outputs.failing_file }} ${{ steps.prepare.outputs.new_file }}
          git commit -m "fix(agent): Rename to .cjs to resolve module conflict

          Automated fix by the Module System Fixer Agent.
          This file was identified as causing an ESM/CJS module conflict
          during deployment. Renaming to '.cjs' forces it to be treated
          as a CommonJS module, which should resolve the 'require is not defined' error."
          git push origin ${{ steps.prepare.outputs.branch_name }}

      - name: Create Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "fix(agent): Resolve module conflict for ${{ steps.prepare.outputs.failing_file }}" \
            --body "This is an automated pull request from the **Module System Fixer Agent**.

            ### Diagnosis
            A recent deployment failed due to a `ReferenceError: require is not defined` error, indicating a module system conflict. The failing file was identified as \`${{ steps.prepare.outputs.failing_file }}\`.

            ### Fix
            The agent has renamed the file to \`${{ steps.prepare.outputs.new_file }}\` to ensure it is treated as a CommonJS module.

            Please review and merge this fix to resolve the deployment blocker.

            Related commit: `${{ github.event.inputs.failed_commit_sha }}`" \
            --base main \
            --head ${{ steps.prepare.outputs.branch_name }} \
            --label "agent-fix", "bug"

  enable-auto-merge:
    name: Enable Auto-Merge
    needs: fix-module-system-error
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Enable auto-merge for the PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.fix-module-system-error.outputs.pr_url }} # This assumes the 'gh pr create' step will have an output with the PR URL
        run: |
          if [ -z "$PR_URL" ]; then
            echo "Pull Request URL not found. Cannot enable auto-merge."
            exit 1
          fi
          gh pr merge --auto --squash "$PR_URL"
          gh pr comment "$PR_URL" --body "🤖 This PR was created by an automated agent to fix a deployment failure. I've enabled auto-merge. It will be merged automatically once all status checks pass."
