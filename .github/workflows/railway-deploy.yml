name: Railway Deployment

on:
  push:
    branches: [main, project-reconstruction]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.app/install.sh | sh
          echo "$HOME/.railway/bin" >> $GITHUB_PATH
          
      - name: Deploy API Service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway login --token $RAILWAY_TOKEN
          railway link ${{ secrets.RAILWAY_PROJECT_ID }}
          railway up --service api --detach
          
      - name: Deploy Frontend Service  
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service frontend --detach
          
      - name: Wait for deployment
        run: sleep 60
        
      - name: Health check API
        run: |
          curl -f ${{ secrets.RAILWAY_API_URL }}/api/health || exit 1
          
      - name: Health check Frontend
        run: |
          curl -f ${{ secrets.RAILWAY_FRONTEND_URL }} || exit 1
          
      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Railway deployment successful"
            echo "Branch: ${{ github.ref_name }}"
            echo "Commit: ${{ github.sha }}"
            echo "API: ${{ secrets.RAILWAY_API_URL }}"
            echo "Frontend: ${{ secrets.RAILWAY_FRONTEND_URL }}"
          else
            echo "❌ Railway deployment failed"
            echo "Branch: ${{ github.ref_name }}"
            echo "Commit: ${{ github.sha }}"
          fi