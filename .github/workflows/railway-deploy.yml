name: Railway Deployment

on:
  push:
    branches: [main, project-reconstruction]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.app/install.sh | sh
          echo "$HOME/.railway/bin" >> $GITHUB_PATH
          
      - name: Deploy Services
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}


          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          railway login --token $RAILWAY_TOKEN
          railway link $RAILWAY_PROJECT_ID
          railway up --service api --service frontend
        
      - name: Health check API
        env:
          RAILWAY_API_URL: ${{ secrets.RAILWAY_API_URL }}
        run: |
          for i in {1..3}; do
            if curl -f $RAILWAY_API_URL/api/health; then
              echo "API health check passed."
              exit 0
            fi
            echo "API health check failed. Retrying in 10 seconds..."
            sleep 10
          done
          echo "API health check failed after 3 attempts."
          exit 1
          
      - name: Health check Frontend
        env:
          RAILWAY_FRONTEND_URL: ${{ secrets.RAILWAY_FRONTEND_URL }}
        run: |
          for i in {1..3}; do
            if curl -f $RAILWAY_FRONTEND_URL; then
              echo "Frontend health check passed."
              exit 0
            fi
            echo "Frontend health check failed. Retrying in 10 seconds..."
            sleep 10
          done
          echo "Frontend health check failed after 3 attempts."
          exit 1
          
      - name: Notify deployment status
        if: always()
        env:
          RAILWAY_API_URL: ${{ secrets.RAILWAY_API_URL }}
          RAILWAY_FRONTEND_URL: ${{ secrets.RAILWAY_FRONTEND_URL }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Railway deployment successful"
            echo "Branch: ${{ github.ref_name }}"
            echo "Commit: ${{ github.sha }}"
            echo "API: $RAILWAY_API_URL"
            echo "Frontend: $RAILWAY_FRONTEND_URL"
          else
            echo "❌ Railway deployment failed"
            echo "Branch: ${{ github.ref_name }}"
            echo "Commit: ${{ github.sha }}"
          fi