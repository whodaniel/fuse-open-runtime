name: Reusable Test Workflow

on:
  workflow_call:
    inputs:
      test-type:
        required: true
        type: string
        description: 'Type of tests to run (unit, integration, e2e)'
      shard:
        required: false
        type: string
        default: '1/1'
        description: 'Test shard configuration (e.g., 1/4)'
      cache-key:
        required: true
        type: string
        description: 'Cache key for dependencies'
      coverage:
        required: false
        type: boolean
        default: true
        description: 'Generate coverage reports'
      timeout:
        required: false
        type: string
        default: '30m'
        description: 'Test timeout'
    outputs:
      test-results:
        description: 'Test execution results'
        value: ${{ jobs.test.outputs.results }}
      coverage-report:
        description: 'Coverage report path'
        value: ${{ jobs.test.outputs.coverage }}
    secrets:
      DATABASE_URL:
        required: false
      CODECOV_TOKEN:
        required: false

jobs:
  test:
    name: Run ${{ inputs.test-type }} tests
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJson(inputs.timeout) }}
    outputs:
      results: ${{ steps.test-results.outputs.results }}
      coverage: ${{ steps.coverage.outputs.path }}
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_USER: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.2.16'

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            **/node_modules
            .turbo
          key: ${{ inputs.cache-key }}

      - name: Setup test environment
        run: |
          # Create test directories
          mkdir -p test-results coverage playwright-report
          
          # Set test environment variables
          echo "NODE_ENV=test" >> $GITHUB_ENV
          echo "DATABASE_URL=postgresql://test:test@localhost:5432/test" >> $GITHUB_ENV
          echo "REDIS_URL=redis://localhost:6379" >> $GITHUB_ENV

      - name: Generate Prisma client
        if: inputs.test-type != 'unit'
        run: bun run db:generate

      - name: Run database migrations
        if: inputs.test-type != 'unit'
        run: bun run db:migrate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Seed test database
        if: inputs.test-type != 'unit'
        run: |
          if [ -f "scripts/seed-test-db.sh" ]; then
            chmod +x scripts/seed-test-db.sh
            ./scripts/seed-test-db.sh
          else
            echo "No test database seeding script found"
          fi
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Install Playwright browsers
        if: inputs.test-type == 'e2e'
        run: bunx playwright install --with-deps

      - name: Start test services
        if: inputs.test-type == 'e2e'
        run: |
          # Start API server in background for E2E tests
          bun run dev:api &
          API_PID=$!
          echo "API_PID=$API_PID" >> $GITHUB_ENV
          
          # Wait for API to be ready
          timeout 60 bash -c 'until curl -f http://localhost:3001/health; do sleep 2; done'
          
          # Start frontend in background
          bun run dev:frontend &
          FRONTEND_PID=$!
          echo "FRONTEND_PID=$FRONTEND_PID" >> $GITHUB_ENV
          
          # Wait for frontend to be ready
          timeout 60 bash -c 'until curl -f http://localhost:3000; do sleep 2; done'

      - name: Run unit tests
        if: inputs.test-type == 'unit'
        run: |
          bun run test:unit \
            --shard=${{ inputs.shard }} \
            --reporter=junit \
            --outputFile=test-results/unit-results.xml \
            ${{ inputs.coverage && '--coverage' || '' }}

      - name: Run integration tests
        if: inputs.test-type == 'integration'
        run: |
          bun run test:integration \
            --shard=${{ inputs.shard }} \
            --reporter=junit \
            --outputFile=test-results/integration-results.xml \
            ${{ inputs.coverage && '--coverage' || '' }}
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379

      - name: Run E2E tests
        if: inputs.test-type == 'e2e'
        run: |
          bunx playwright test \
            --shard=${{ inputs.shard }} \
            --reporter=junit \
            --output-dir=test-results/e2e
        env:
          BASE_URL: http://localhost:3000
          API_URL: http://localhost:3001

      - name: Stop test services
        if: always() && inputs.test-type == 'e2e'
        run: |
          if [ -n "$API_PID" ]; then
            kill $API_PID || true
          fi
          if [ -n "$FRONTEND_PID" ]; then
            kill $FRONTEND_PID || true
          fi

      - name: Process test results
        id: test-results
        if: always()
        run: |
          # Count test results
          TOTAL_TESTS=0
          PASSED_TESTS=0
          FAILED_TESTS=0
          
          if [ -f "test-results/unit-results.xml" ]; then
            UNIT_TOTAL=$(xmllint --xpath "count(//testcase)" test-results/unit-results.xml)
            UNIT_FAILED=$(xmllint --xpath "count(//testcase[failure or error])" test-results/unit-results.xml)
            TOTAL_TESTS=$((TOTAL_TESTS + UNIT_TOTAL))
            FAILED_TESTS=$((FAILED_TESTS + UNIT_FAILED))
          fi
          
          if [ -f "test-results/integration-results.xml" ]; then
            INT_TOTAL=$(xmllint --xpath "count(//testcase)" test-results/integration-results.xml)
            INT_FAILED=$(xmllint --xpath "count(//testcase[failure or error])" test-results/integration-results.xml)
            TOTAL_TESTS=$((TOTAL_TESTS + INT_TOTAL))
            FAILED_TESTS=$((FAILED_TESTS + INT_FAILED))
          fi
          
          PASSED_TESTS=$((TOTAL_TESTS - FAILED_TESTS))
          
          echo "results={\"total\": $TOTAL_TESTS, \"passed\": $PASSED_TESTS, \"failed\": $FAILED_TESTS}" >> $GITHUB_OUTPUT

      - name: Generate coverage report
        id: coverage
        if: inputs.coverage && always()
        run: |
          # Merge coverage reports if multiple exist
          if [ -d "coverage" ]; then
            echo "path=coverage" >> $GITHUB_OUTPUT
          else
            echo "path=" >> $GITHUB_OUTPUT
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ inputs.test-type }}-${{ inputs.shard }}
          path: |
            test-results/
            coverage/
            playwright-report/
          retention-days: 30

      - name: Upload coverage to Codecov
        if: inputs.coverage && inputs.test-type == 'unit' && secrets.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: ${{ inputs.test-type }}
          directory: coverage
          fail_ci_if_error: false

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: ${{ inputs.test-type }} Test Results
          path: 'test-results/*.xml'
          reporter: java-junit
          fail-on-error: false

      - name: Comment test results on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const results = ${{ steps.test-results.outputs.results }};
            const testType = '${{ inputs.test-type }}';
            const shard = '${{ inputs.shard }}';
            
            const body = `## ${testType.toUpperCase()} Test Results (Shard ${shard})
            
            - ✅ **Passed:** ${results.passed}
            - ❌ **Failed:** ${results.failed}
            - 📊 **Total:** ${results.total}
            
            ${results.failed > 0 ? '⚠️ Some tests failed. Please check the logs for details.' : '🎉 All tests passed!'}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });