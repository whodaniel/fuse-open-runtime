name: Poker QA

on:
  pull_request:
    paths:
      - "apps/casin8-games/**"
      - ".github/workflows/poker-qa.yml"
  push:
    branches: [main]
    paths:
      - "apps/casin8-games/**"
      - ".github/workflows/poker-qa.yml"

jobs:
  poker-qa:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/casin8-games
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
        working-directory: .

      - name: Run Poker QA + Simulation Suites
        run: node --test *.test.mjs swarm/*.test.mjs

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: .

      - name: Run Trait UI Smoke (Playwright)
        run: node scripts/trait-ui-smoke.mjs --spawn
