name: Reusable Deployment Workflow

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: 'Target environment'
      service:
        required: true
        type: string
        description: 'Service to deploy'
      image-tag:
        required: true
        type: string
        description: 'Container image tag to deploy'
      namespace:
        required: false
        type: string
        default: 'default'
        description: 'Kubernetes namespace'
      timeout:
        required: false
        type: string
        default: '600s'
        description: 'Deployment timeout'
      health-check-url:
        required: false
        type: string
        description: 'Health check URL for post-deployment verification'
    outputs:
      deployment-url:
        description: 'Deployed application URL'
        value: ${{ jobs.deploy.outputs.url }}
      deployment-status:
        description: 'Deployment status'
        value: ${{ jobs.deploy.outputs.status }}
    secrets:
      KUBE_CONFIG:
        required: true
      DATABASE_URL:
        required: false
      SLACK_BOT_TOKEN:
        required: false

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
      url: ${{ steps.get-url.outputs.url }}
    outputs:
      url: ${{ steps.get-url.outputs.url }}
      status: ${{ steps.deployment.outcome }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup deployment tools
        run: |
          # Install kubectl
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
          
          # Install Helm
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          
          # Install yq for YAML processing
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Configure Kubernetes
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=./kubeconfig
          kubectl config current-context
          kubectl get nodes

      - name: Validate deployment manifests
        run: |
          export KUBECONFIG=./kubeconfig
          
          # Check if manifests exist
          if [ ! -d "k8s/${{ inputs.environment }}" ]; then
            echo "Deployment manifests not found for environment: ${{ inputs.environment }}"
            exit 1
          fi
          
          # Validate manifests
          kubectl apply --dry-run=client -f k8s/${{ inputs.environment }}/

      - name: Run pre-deployment checks
        run: |
          export KUBECONFIG=./kubeconfig
          
          # Check cluster resources
          kubectl top nodes || echo "Metrics server not available"
          kubectl get pods -n ${{ inputs.namespace }} -l app=${{ inputs.service }} || echo "No existing pods found"
          
          # Check for existing deployments
          if kubectl get deployment ${{ inputs.service }} -n ${{ inputs.namespace }} 2>/dev/null; then
            echo "Existing deployment found, will perform rolling update"
            kubectl describe deployment ${{ inputs.service }} -n ${{ inputs.namespace }}
          fi

      - name: Run database migrations
        if: inputs.service == 'api' && secrets.DATABASE_URL != ''
        run: |
          # Setup Bun for migrations
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          
          # Install dependencies and run migrations
          pnpm install --frozen-lockfile
          pnpm run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Update deployment manifests
        run: |
          # Update image tags in deployment manifests
          find k8s/${{ inputs.environment }}/ -name "*.yaml" -o -name "*.yml" | while read file; do
            if grep -q "image:.*${{ inputs.service }}" "$file"; then
              yq eval ".spec.template.spec.containers[].image = \"${{ inputs.image-tag }}\"" -i "$file"
              echo "Updated image in $file to ${{ inputs.image-tag }}"
            fi
          done

      - name: Deploy to Kubernetes
        id: deployment
        run: |
          export KUBECONFIG=./kubeconfig
          
          # Create namespace if it doesn't exist
          kubectl create namespace ${{ inputs.namespace }} --dry-run=client -o yaml | kubectl apply -f -
          
          # Apply all manifests
          kubectl apply -f k8s/${{ inputs.environment }}/ -n ${{ inputs.namespace }}
          
          # Wait for deployment to complete
          kubectl rollout status deployment/${{ inputs.service }} -n ${{ inputs.namespace }} --timeout=${{ inputs.timeout }}
          
          echo "Deployment completed successfully"

      - name: Get deployment URL
        id: get-url
        run: |
          export KUBECONFIG=./kubeconfig
          
          # Try to get LoadBalancer URL
          LB_URL=$(kubectl get service ${{ inputs.service }} -n ${{ inputs.namespace }} -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
          
          if [ -n "$LB_URL" ]; then
            echo "url=https://$LB_URL" >> $GITHUB_OUTPUT
          else
            # Try to get NodePort or ClusterIP
            SERVICE_TYPE=$(kubectl get service ${{ inputs.service }} -n ${{ inputs.namespace }} -o jsonpath='{.spec.type}')
            if [ "$SERVICE_TYPE" = "NodePort" ]; then
              NODE_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="ExternalIP")].address}')
              NODE_PORT=$(kubectl get service ${{ inputs.service }} -n ${{ inputs.namespace }} -o jsonpath='{.spec.ports[0].nodePort}')
              echo "url=http://$NODE_IP:$NODE_PORT" >> $GITHUB_OUTPUT
            else
              echo "url=http://cluster-internal" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run post-deployment verification
        run: |
          export KUBECONFIG=./kubeconfig
          
          # Check pod status
          kubectl get pods -n ${{ inputs.namespace }} -l app=${{ inputs.service }}
          
          # Check deployment status
          kubectl describe deployment ${{ inputs.service }} -n ${{ inputs.namespace }}
          
          # Wait for pods to be ready
          kubectl wait --for=condition=ready pod -l app=${{ inputs.service }} -n ${{ inputs.namespace }} --timeout=300s
          
          # Run health check if URL provided
          if [ -n "${{ inputs.health-check-url }}" ]; then
            echo "Running health check..."
            for i in {1..10}; do
              if curl -f -s "${{ inputs.health-check-url }}/health" > /dev/null; then
                echo "Health check passed"
                break
              else
                echo "Health check failed, attempt $i/10"
                sleep 30
              fi
              
              if [ $i -eq 10 ]; then
                echo "Health check failed after 10 attempts"
                exit 1
              fi
            done
          fi

      - name: Run smoke tests
        run: |
          # Run basic smoke tests
          if [ -f "scripts/smoke-tests.sh" ]; then
            chmod +x scripts/smoke-tests.sh
            ./scripts/smoke-tests.sh ${{ inputs.environment }} ${{ inputs.service }}
          else
            echo "No smoke tests found, skipping"
          fi

      - name: Rollback on failure
        if: failure()
        run: |
          export KUBECONFIG=./kubeconfig
          
          echo "Deployment failed, initiating rollback..."
          kubectl rollout undo deployment/${{ inputs.service }} -n ${{ inputs.namespace }}
          kubectl rollout status deployment/${{ inputs.service }} -n ${{ inputs.namespace }} --timeout=300s
          
          echo "Rollback completed"

      - name: Notify deployment status
        if: always() && secrets.SLACK_BOT_TOKEN != ''
        uses: slackapi/slack-github-action@v1.25.0
        with:
          channel-id: 'deployments'
          slack-message: |
            ${{ job.status == 'success' && '✅' || '❌' }} **${{ inputs.service }} Deployment**
            
            **Environment:** ${{ inputs.environment }}
            **Status:** ${{ job.status }}
            **Image:** ${{ inputs.image-tag }}
            **URL:** ${{ steps.get-url.outputs.url }}
            **Namespace:** ${{ inputs.namespace }}
            
            **Workflow:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}