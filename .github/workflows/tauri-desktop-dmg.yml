name: Tauri Desktop DMG

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "apps/tauri-desktop/**"
      - "scripts/packaging/build-tauri-dmg.cjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/tauri-desktop-dmg.yml"
  push:
    branches:
      - main
      - develop
      - "cursor/**"
    paths:
      - "apps/tauri-desktop/**"
      - "scripts/packaging/build-tauri-dmg.cjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/tauri-desktop-dmg.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  PNPM_VERSION: 10.22.0

jobs:
  build-dmg:
    name: Build macOS DMG
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pnpm
            ~/Library/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/tauri-desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-tauri-${{ hashFiles('apps/tauri-desktop/src-tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-tauri-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --prefer-offline

      - name: Package DMG
        run: pnpm run tnf:tauri:dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v5
        with:
          name: fuse-desktop-dmg
          path: apps/tauri-desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 14
