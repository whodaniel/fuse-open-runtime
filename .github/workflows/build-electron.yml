name: Build Electron Desktop

on:
  push:
    branches: ["main"]
    paths:
      - "apps/electron-desktop/**"
      - "apps/browser-hub/**"
      - "packages/**"
  workflow_dispatch:

jobs:
  build:
    name: Build & Package DMG
    # runs-on: self-hosted uses the local machine runner
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and Package
        working-directory: apps/electron-desktop
        env:
          # Use the GITHUB_TOKEN for releasing/publishing integration if needed later
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm run dist

      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: The-New-Fuse-Installer
          path: apps/electron-desktop/release/*.dmg
          retention-days: 7
