name: Framework Consciousness Nightly

on:
  schedule:
    - cron: "15 4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evolve-and-guardrails:
    name: Evolve + Guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pnpm
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies (frozen lockfile)
        id: install
        continue-on-error: true
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Install dependencies (fallback)
        if: steps.install.outcome == 'failure'
        run: pnpm install --no-frozen-lockfile

      - name: Run framework consciousness evolve
        id: evolve
        continue-on-error: true
        run: pnpm run framework-consciousness:evolve

      - name: Run framework consciousness guardrails
        id: guardrails
        continue-on-error: true
        run: node scripts/framework-consciousness/guardrail-check.cjs --baseline data/framework-consciousness-baseline.json --allow-partial

      - name: Create or update failure issue
        if: steps.guardrails.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issueTitle = 'Framework Consciousness Guardrail Failure';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const refName = context.ref.replace('refs/heads/', '');

            let guardrail = null;
            const guardrailPath = `${process.env.GITHUB_WORKSPACE}/.framework-consciousness/guardrail-result.json`;
            if (fs.existsSync(guardrailPath)) {
              try {
                guardrail = JSON.parse(fs.readFileSync(guardrailPath, 'utf8'));
              } catch (e) {
                core.warning(`Could not parse guardrail result: ${e.message}`);
              }
            }

            const failures = guardrail?.failures?.length
              ? guardrail.failures.map(f => `- ${f}`).join('\n')
              : '- Guardrail check failed (see step logs for details)';

            const body = [
              'Automated framework-consciousness nightly run failed.',
              '',
              `- Run: ${runUrl}`,
              `- Branch: \`${refName}\``,
              `- Commit: \`${context.sha}\``,
              '',
              '## Failure Details',
              failures,
              '',
              '## Current Metrics',
              '```json',
              JSON.stringify(guardrail?.current || {}, null, 2),
              '```'
            ].join('\n');

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            const existing = openIssues.find(i => i.title === issueTitle);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
              core.info(`Updated existing issue #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body
              });
              core.info(`Created issue #${created.data.number}`);
            }

      - name: Upload framework consciousness artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: framework-consciousness-${{ github.run_id }}
          path: |
            .framework-consciousness/*.json
          retention-days: 30
