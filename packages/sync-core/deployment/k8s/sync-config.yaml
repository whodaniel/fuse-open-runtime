apiVersion: v1
kind: ConfigMap
metadata:
  name: sync-core-config
  labels:
    app: sync-core
data:
  master-clock-enabled: "true"
  file-watcher-enabled: "true"
  performance-monitoring: "true"
  log-level: "info"
  tenant-isolation: "true"
  sync-batch-size: "100"
  sync-debounce-ms: "1000"
  conflict-resolution-strategy: "timestamp"
  health-check-interval: "30000"
  metrics-collection-interval: "10000"
  redis-keyspace-prefix: "sync:"
  file-watcher-patterns: |
    [
      "**/*.json",
      "**/*.yaml",
      "**/*.yml",
      "**/*.ts",
      "**/*.js",
      "**/config/**/*",
      "**/templates/**/*"
    ]
  excluded-patterns: |
    [
      "**/node_modules/**",
      "**/dist/**",
      "**/build/**",
      "**/.git/**",
      "**/coverage/**",
      "**/*.log"
    ]
---
apiVersion: v1
kind: Secret
metadata:
  name: sync-core-secrets
  labels:
    app: sync-core
type: Opaque
stringData:
  redis-url: "redis://redis-service:6379"
  database-url: "postgresql://user:password@postgres-service:5432/sync_db"
  jwt-secret: "your-jwt-secret-here"
  encryption-key: "your-encryption-key-here"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sync-monitoring-config
  labels:
    app: sync-core
    component: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - "sync_alerts.yml"

    scrape_configs:
      - job_name: 'sync-core'
        static_configs:
          - targets: ['sync-core-service:9090']
        metrics_path: '/metrics'
        scrape_interval: 10s
        scrape_timeout: 5s
        
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__

  sync_alerts.yml: |
    groups:
      - name: sync-core-alerts
        rules:
          - alert: SyncCoreDown
            expr: up{job="sync-core"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Sync Core service is down"
              description: "Sync Core service has been down for more than 1 minute"
              
          - alert: HighSyncLatency
            expr: sync_operation_duration_seconds{quantile="0.95"} > 5
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High sync operation latency"
              description: "95th percentile sync latency is {{ $value }}s"
              
          - alert: SyncConflictRate
            expr: rate(sync_conflicts_total[5m]) > 0.1
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "High sync conflict rate"
              description: "Sync conflict rate is {{ $value }} conflicts/second"
              
          - alert: FileWatcherErrors
            expr: rate(file_watcher_errors_total[5m]) > 0.05
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "File watcher errors detected"
              description: "File watcher error rate is {{ $value }} errors/second"
