apiVersion: v1
kind: Service
metadata:
  name: sync-core-service
  namespace: the-new-fuse
  labels:
    app: sync-core
spec:
  type: ClusterIP
  selector:
    app: sync-core
  ports:
    - name: websocket
      port: 3001
      targetPort: 3001
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800  # 3 hours

---
apiVersion: v1
kind: Service
metadata:
  name: sync-core-headless
  namespace: the-new-fuse
  labels:
    app: sync-core
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: sync-core
  ports:
    - name: websocket
      port: 3001
      targetPort: 3001
      protocol: TCP
