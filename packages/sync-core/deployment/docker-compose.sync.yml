version: '3.8'

services:
  sync-core:
    build:
      context: ../..
      dockerfile: packages/sync-core/deployment/Dockerfile
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - DATABASE_URL=${DATABASE_URL}
      - SYNC_MASTER_CLOCK_ENABLED=${SYNC_MASTER_CLOCK_ENABLED:-true}
      - SYNC_FILE_WATCHER_ENABLED=${SYNC_FILE_WATCHER_ENABLED:-true}
      - SYNC_PERFORMANCE_MONITORING=${SYNC_PERFORMANCE_MONITORING:-true}
      - SYNC_LOG_LEVEL=${SYNC_LOG_LEVEL:-info}
      - SYNC_TENANT_ISOLATION=${SYNC_TENANT_ISOLATION:-true}
    volumes:
      - sync_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health/sync"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - sync-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sync-core.rule=Host(`sync.${DOMAIN:-localhost}`)"
      - "traefik.http.services.sync-core.loadbalancer.server.port=3003"

  sync-monitoring:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - sync-network
    restart: unless-stopped

  sync-grafana:
    image: grafana/grafana:latest
    ports:
      - "3004:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - sync-network
    restart: unless-stopped

volumes:
  sync_data:
  prometheus_data:
  grafana_data:

networks:
  sync-network:
    driver: bridge