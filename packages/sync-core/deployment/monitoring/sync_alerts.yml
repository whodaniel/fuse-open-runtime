groups:
  - name: sync-core-alerts
    rules:
      # Service availability alerts
      - alert: SyncCoreDown
        expr: up{job="sync-core"} == 0
        for: 1m
        labels:
          severity: critical
          service: sync-core
        annotations:
          summary: "Sync Core service is down"
          description: "Sync Core service has been down for more than 1 minute"
          runbook_url: "https://docs.example.com/runbooks/sync-core-down"

      - alert: SyncCoreHighErrorRate
        expr: rate(sync_errors_total[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
          service: sync-core
        annotations:
          summary: "High error rate in Sync Core"
          description: "Sync Core error rate is {{ $value }} errors/second"
          runbook_url: "https://docs.example.com/runbooks/sync-core-errors"

      # Performance alerts
      - alert: HighSyncLatency
        expr: histogram_quantile(0.95, rate(sync_operation_duration_seconds_bucket[5m])) > 5
        for: 2m
        labels:
          severity: warning
          service: sync-core
        annotations:
          summary: "High sync operation latency"
          description: "95th percentile sync latency is {{ $value }}s"
          runbook_url: "https://docs.example.com/runbooks/sync-latency"

      - alert: SyncQueueBacklog
        expr: sync_queue_size > 1000
        for: 5m
        labels:
          severity: warning
          service: sync-core
        annotations:
          summary: "Large sync queue backlog"
          description: "Sync queue has {{ $value }} pending operations"
          runbook_url: "https://docs.example.com/runbooks/sync-queue-backlog"

      # Conflict detection alerts
      - alert: SyncConflictRate
        expr: rate(sync_conflicts_total[5m]) > 0.1
        for: 1m
        labels:
          severity: warning
          service: sync-core
        annotations:
          summary: "High sync conflict rate"
          description: "Sync conflict rate is {{ $value }} conflicts/second"
          runbook_url: "https://docs.example.com/runbooks/sync-conflicts"

      - alert: UnresolvedSyncConflicts
        expr: sync_unresolved_conflicts > 10
        for: 10m
        labels:
          severity: critical
          service: sync-core
        annotations:
          summary: "Too many unresolved sync conflicts"
          description: "{{ $value }} sync conflicts remain unresolved for more than 10 minutes"
          runbook_url: "https://docs.example.com/runbooks/unresolved-conflicts"

      # File watcher alerts
      - alert: FileWatcherErrors
        expr: rate(file_watcher_errors_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
          service: sync-core
        annotations:
          summary: "File watcher errors detected"
          description: "File watcher error rate is {{ $value }} errors/second"
          runbook_url: "https://docs.example.com/runbooks/file-watcher-errors"

      - alert: FileWatcherOverload
        expr: file_watcher_events_per_second > 100
        for: 5m
        labels:
          severity: warning
          service: sync-core
        annotations:
          summary: "File watcher processing high event volume"
          description: "File watcher is processing {{ $value }} events/second"
          runbook_url: "https://docs.example.com/runbooks/file-watcher-overload"

      # Master clock alerts
      - alert: ClockDriftHigh
        expr: master_clock_drift_ms > 1000
        for: 1m
        labels:
          severity: critical
          service: sync-core
        annotations:
          summary: "High clock drift detected"
          description: "Master clock drift is {{ $value }}ms"
          runbook_url: "https://docs.example.com/runbooks/clock-drift"

      - alert: ClockSyncFailure
        expr: increase(master_clock_sync_failures_total[5m]) > 3
        for: 1m
        labels:
          severity: warning
          service: sync-core
        annotations:
          summary: "Master clock sync failures"
          description: "{{ $value }} clock sync failures in the last 5 minutes"
          runbook_url: "https://docs.example.com/runbooks/clock-sync-failure"

      # Resource usage alerts
      - alert: HighMemoryUsage
        expr: sync_memory_usage_ratio > 0.9
        for: 5m
        labels:
          severity: warning
          service: sync-core
        annotations:
          summary: "High memory usage in Sync Core"
          description: "Memory usage is {{ $value | humanizePercentage }}"
          runbook_url: "https://docs.example.com/runbooks/high-memory-usage"

      - alert: HighCPUUsage
        expr: sync_cpu_usage_ratio > 0.8
        for: 10m
        labels:
          severity: warning
          service: sync-core
        annotations:
          summary: "High CPU usage in Sync Core"
          description: "CPU usage is {{ $value | humanizePercentage }}"
          runbook_url: "https://docs.example.com/runbooks/high-cpu-usage"

      # Database connectivity alerts
      - alert: DatabaseConnectionFailure
        expr: sync_database_connection_failures_total > 0
        for: 1m
        labels:
          severity: critical
          service: sync-core
        annotations:
          summary: "Database connection failures"
          description: "{{ $value }} database connection failures detected"
          runbook_url: "https://docs.example.com/runbooks/database-connection-failure"

      - alert: DatabaseHighLatency
        expr: histogram_quantile(0.95, rate(sync_database_query_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
          service: sync-core
        annotations:
          summary: "High database query latency"
          description: "95th percentile database query latency is {{ $value }}s"
          runbook_url: "https://docs.example.com/runbooks/database-latency"

      # Redis connectivity alerts
      - alert: RedisConnectionFailure
        expr: sync_redis_connection_failures_total > 0
        for: 1m
        labels:
          severity: critical
          service: sync-core
        annotations:
          summary: "Redis connection failures"
          description: "{{ $value }} Redis connection failures detected"
          runbook_url: "https://docs.example.com/runbooks/redis-connection-failure"

      - alert: RedisHighLatency
        expr: histogram_quantile(0.95, rate(sync_redis_command_duration_seconds_bucket[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
          service: sync-core
        annotations:
          summary: "High Redis command latency"
          description: "95th percentile Redis command latency is {{ $value }}s"
          runbook_url: "https://docs.example.com/runbooks/redis-latency"

      # Tenant isolation alerts
      - alert: TenantIsolationViolation
        expr: increase(sync_tenant_isolation_violations_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
          service: sync-core
        annotations:
          summary: "Tenant isolation violation detected"
          description: "{{ $value }} tenant isolation violations in the last 5 minutes"
          runbook_url: "https://docs.example.com/runbooks/tenant-isolation-violation"

      # Security alerts
      - alert: UnauthorizedSyncAttempt
        expr: increase(sync_unauthorized_attempts_total[5m]) > 5
        for: 1m
        labels:
          severity: warning
          service: sync-core
        annotations:
          summary: "Multiple unauthorized sync attempts"
          description: "{{ $value }} unauthorized sync attempts in the last 5 minutes"
          runbook_url: "https://docs.example.com/runbooks/unauthorized-sync-attempts"