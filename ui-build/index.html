<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TNF Relay Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/lucide-react@0.263.1/dist/umd/lucide-react.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script>
        const { useState, useEffect } = React;
        const { 
            RefreshCw, Settings, MessageSquare, Shield, Monitor, 
            Globe, Terminal, Activity 
        } = lucideReact;

        const TNFRelayDashboard = () => {
            const [systemStatus, setSystemStatus] = useState(null);
            const [interceptedMessages, setInterceptedMessages] = useState([]);
            const [agents, setAgents] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [connectionStatus, setConnectionStatus] = useState('disconnected');

            const RELAY_BASE_URL = 'http://localhost:3000';

            const fetchDashboardData = async () => {
                try {
                    const response = await fetch(`${RELAY_BASE_URL}/api/dashboard`);
                    const data = await response.json();
                    setSystemStatus(data.systemStatus);
                    setInterceptedMessages(data.recentMessages || []);
                    setConnectionStatus('connected');
                } catch (error) {
                    console.error('Error fetching dashboard data:', error);
                    setConnectionStatus('error');
                }
            };

            const setupClaudeCodeEnvironment = async () => {
                try {
                    const response = await fetch(`${RELAY_BASE_URL}/setup/claude-code-env`, {
                        method: 'POST'
                    });
                    const data = await response.json();
                    alert(data.success ? 'Claude Code environment configured! Restart your terminal.' : `Error: ${data.error}`);
                } catch (error) {
                    alert(`Error: ${error.message}`);
                }
            };

            const setupGeminiCodeEnvironment = async () => {
                try {
                    const response = await fetch(`${RELAY_BASE_URL}/setup/gemini-code-env`, {
                        method: 'POST'
                    });
                    const data = await response.json();
                    alert(data.success ? 'Gemini Code environment configured! Restart your terminal.' : `Error: ${data.error}`);
                } catch (error) {
                    alert(`Error: ${error.message}`);
                }
            };

            useEffect(() => {
                const loadData = async () => {
                    setIsLoading(true);
                    await fetchDashboardData();
                    setIsLoading(false);
                };

                loadData();
                const interval = setInterval(loadData, 30000);
                return () => clearInterval(interval);
            }, []);

            if (isLoading) {
                return React.createElement('div', {
                    className: 'min-h-screen bg-gray-900 text-white flex items-center justify-center'
                }, 
                    React.createElement('div', { className: 'text-center' }, [
                        React.createElement('div', { 
                            key: 'spinner',
                            className: 'animate-spin rounded-full h-8 w-8 border-b-2 border-white mx-auto mb-4' 
                        }),
                        React.createElement('p', { key: 'text' }, 'Loading TNF Relay Dashboard...')
                    ])
                );
            }

            const StatusBadge = ({ status }) => {
                const colors = {
                    connected: 'bg-green-500',
                    disconnected: 'bg-red-500',
                    error: 'bg-yellow-500'
                };
                
                return React.createElement('div', {
                    className: `w-3 h-3 rounded-full ${colors[status] || 'bg-gray-500'}`
                });
            };

            return React.createElement('div', { className: 'min-h-screen bg-gray-900 text-white' }, [
                // Header
                React.createElement('div', { 
                    key: 'header',
                    className: 'bg-gray-800 border-b border-gray-700' 
                }, 
                    React.createElement('div', { 
                        className: 'max-w-7xl mx-auto px-4 sm:px-6 lg:px-8' 
                    }, 
                        React.createElement('div', { 
                            className: 'flex justify-between items-center py-4' 
                        }, [
                            React.createElement('div', { 
                                key: 'title-section',
                                className: 'flex items-center gap-3' 
                            }, [
                                React.createElement('div', { 
                                    key: 'icon',
                                    className: 'bg-blue-600 p-2 rounded-lg' 
                                }, 
                                    React.createElement(Shield, { className: 'h-6 w-6' })
                                ),
                                React.createElement('div', { key: 'text' }, [
                                    React.createElement('h1', { 
                                        key: 'title',
                                        className: 'text-xl font-bold' 
                                    }, 'TNF Relay Dashboard'),
                                    React.createElement('p', { 
                                        key: 'subtitle',
                                        className: 'text-sm text-gray-400' 
                                    }, 'AI API Interception & Management')
                                ])
                            ]),
                            
                            React.createElement('div', { 
                                key: 'controls',
                                className: 'flex items-center gap-4' 
                            }, [
                                React.createElement('div', { 
                                    key: 'status',
                                    className: 'flex items-center gap-2' 
                                }, [
                                    React.createElement(StatusBadge, { status: connectionStatus }),
                                    React.createElement('span', { 
                                        className: 'text-sm capitalize' 
                                    }, connectionStatus)
                                ]),
                                
                                React.createElement('button', {
                                    key: 'refresh',
                                    onClick: fetchDashboardData,
                                    className: 'bg-blue-600 hover:bg-blue-700 px-3 py-2 rounded flex items-center gap-2'
                                }, [
                                    React.createElement(RefreshCw, { className: 'h-4 w-4' }),
                                    'Refresh'
                                ])
                            ])
                        ])
                    )
                ),

                // Main Content
                React.createElement('div', { 
                    key: 'main',
                    className: 'max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8' 
                }, 
                    React.createElement('div', { className: 'space-y-6' }, [
                        // Status Cards
                        React.createElement('div', { 
                            key: 'status-cards',
                            className: 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4' 
                        }, [
                            React.createElement('div', { 
                                key: 'system-status',
                                className: 'bg-gray-800 p-4 rounded-lg' 
                            }, 
                                React.createElement('div', { 
                                    className: 'flex items-center justify-between' 
                                }, [
                                    React.createElement('div', { key: 'text' }, [
                                        React.createElement('p', { 
                                            key: 'label',
                                            className: 'text-gray-400 text-sm' 
                                        }, 'System Status'),
                                        React.createElement('p', { 
                                            key: 'value',
                                            className: 'text-2xl font-bold text-green-400' 
                                        }, 'Running')
                                    ]),
                                    React.createElement(Activity, { 
                                        key: 'icon',
                                        className: 'h-8 w-8 text-green-400' 
                                    })
                                ])
                            ),
                            React.createElement('div', { 
                                key: 'agents',
                                className: 'bg-gray-800 p-4 rounded-lg' 
                            }, 
                                React.createElement('div', { 
                                    className: 'flex items-center justify-between' 
                                }, [
                                    React.createElement('div', { key: 'text' }, [
                                        React.createElement('p', { 
                                            key: 'label',
                                            className: 'text-gray-400 text-sm' 
                                        }, 'Connected Agents'),
                                        React.createElement('p', { 
                                            key: 'value',
                                            className: 'text-2xl font-bold' 
                                        }, agents.length)
                                    ]),
                                    React.createElement(Monitor, { 
                                        key: 'icon',
                                        className: 'h-8 w-8 text-blue-400' 
                                    })
                                ])
                            ),
                            React.createElement('div', { 
                                key: 'messages',
                                className: 'bg-gray-800 p-4 rounded-lg' 
                            }, 
                                React.createElement('div', { 
                                    className: 'flex items-center justify-between' 
                                }, [
                                    React.createElement('div', { key: 'text' }, [
                                        React.createElement('p', { 
                                            key: 'label',
                                            className: 'text-gray-400 text-sm' 
                                        }, 'Intercepted Messages'),
                                        React.createElement('p', { 
                                            key: 'value',
                                            className: 'text-2xl font-bold' 
                                        }, interceptedMessages.length)
                                    ]),
                                    React.createElement(Shield, { 
                                        key: 'icon',
                                        className: 'h-8 w-8 text-purple-400' 
                                    })
                                ])
                            ),
                            React.createElement('div', { 
                                key: 'connection',
                                className: 'bg-gray-800 p-4 rounded-lg' 
                            }, 
                                React.createElement('div', { 
                                    className: 'flex items-center justify-between' 
                                }, [
                                    React.createElement('div', { key: 'text' }, [
                                        React.createElement('p', { 
                                            key: 'label',
                                            className: 'text-gray-400 text-sm' 
                                        }, 'Connection'),
                                        React.createElement('div', { 
                                            key: 'status',
                                            className: 'flex items-center gap-2' 
                                        }, [
                                            React.createElement(StatusBadge, { status: connectionStatus }),
                                            React.createElement('span', { 
                                                className: 'text-sm capitalize' 
                                            }, connectionStatus)
                                        ])
                                    ]),
                                    React.createElement(Globe, { 
                                        key: 'icon',
                                        className: 'h-8 w-8 text-indigo-400' 
                                    })
                                ])
                            )
                        ]),

                        // Quick Setup
                        React.createElement('div', { 
                            key: 'quick-setup',
                            className: 'bg-gray-800 p-6 rounded-lg' 
                        }, [
                            React.createElement('h3', { 
                                key: 'title',
                                className: 'text-lg font-semibold mb-4 flex items-center gap-2' 
                            }, [
                                React.createElement('span', { key: 'icon' }, '⚡'),
                                'Quick Setup'
                            ]),
                            React.createElement('div', { 
                                key: 'buttons',
                                className: 'grid grid-cols-1 md:grid-cols-3 gap-4' 
                            }, [
                                React.createElement('button', {
                                    key: 'claude-code',
                                    onClick: setupClaudeCodeEnvironment,
                                    className: 'bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg flex items-center gap-2 transition-colors'
                                }, [
                                    React.createElement(Terminal, { className: 'h-4 w-4' }),
                                    'Setup Claude Code'
                                ]),
                                React.createElement('button', {
                                    key: 'gemini-code',
                                    onClick: setupGeminiCodeEnvironment,
                                    className: 'bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg flex items-center gap-2 transition-colors'
                                }, [
                                    React.createElement(Terminal, { className: 'h-4 w-4' }),
                                    'Setup Gemini Code'
                                ]),
                                React.createElement('button', {
                                    key: 'vscode',
                                    onClick: () => {
                                        const config = {
                                            "http.proxy": "http://localhost:8888",
                                            "http.proxyStrictSSL": false,
                                            "http.proxySupport": "on"
                                        };
                                        navigator.clipboard.writeText(JSON.stringify(config, null, 2));
                                        alert('VS Code proxy config copied to clipboard!\\nAdd to your VS Code settings.json');
                                    },
                                    className: 'bg-green-600 hover:bg-green-700 px-4 py-2 rounded-lg flex items-center gap-2 transition-colors'
                                }, [
                                    React.createElement(Settings, { className: 'h-4 w-4' }),
                                    'VS Code Config'
                                ]),
                                React.createElement('button', {
                                    key: 'system-proxy',
                                    onClick: () => alert('System proxy: Run "networksetup -setwebproxy \\"Wi-Fi\\" localhost 8888" in terminal'),
                                    className: 'bg-purple-600 hover:bg-purple-700 px-4 py-2 rounded-lg flex items-center gap-2 transition-colors'
                                }, [
                                    React.createElement(Globe, { className: 'h-4 w-4' }),
                                    'System Proxy'
                                ])
                            ])
                        ]),

                        // Recent Messages
                        React.createElement('div', { 
                            key: 'recent-messages',
                            className: 'bg-gray-800 p-6 rounded-lg' 
                        }, [
                            React.createElement('h3', { 
                                key: 'title',
                                className: 'text-lg font-semibold mb-4 flex items-center gap-2' 
                            }, [
                                React.createElement(MessageSquare, { className: 'h-5 w-5' }),
                                'Recent Intercepted Messages'
                            ]),
                            React.createElement('div', { 
                                key: 'messages',
                                className: 'space-y-2 max-h-64 overflow-y-auto' 
                            }, interceptedMessages.length > 0 ? 
                                interceptedMessages.map((message, index) => 
                                    React.createElement('div', {
                                        key: index,
                                        className: 'bg-gray-700 p-3 rounded border-l-4 border-blue-500'
                                    }, 
                                        React.createElement('div', {
                                            className: 'flex justify-between items-start'
                                        }, [
                                            React.createElement('div', { key: 'info' }, [
                                                React.createElement('p', {
                                                    key: 'url',
                                                    className: 'font-mono text-sm text-green-400'
                                                }, `${message.method || 'GET'} ${message.url || 'Unknown URL'}`),
                                                React.createElement('p', {
                                                    key: 'time',
                                                    className: 'text-xs text-gray-400'
                                                }, new Date(message.timestamp).toLocaleString())
                                            ]),
                                            React.createElement('span', {
                                                key: 'source',
                                                className: 'text-xs bg-blue-600 px-2 py-1 rounded'
                                            }, message.source || 'unknown')
                                        ])
                                    )
                                ) : 
                                React.createElement('p', {
                                    className: 'text-gray-400 text-center py-4'
                                }, 'No intercepted messages yet. Start using Claude Code or configure applications to see intercepted API calls here.')
                            )
                        ])
                    ])
                )
            ]);
        };

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(TNFRelayDashboard));
    </script>
</body>
</html>
