version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: tnf-cloud-sandbox-db
    environment:
      POSTGRES_USER: tnf_user
      POSTGRES_PASSWORD: tnf_password
      POSTGRES_DB: the_new_fuse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tnf_user -d the_new_fuse"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (optional - for distributed rate limiting)
  redis:
    image: redis:7-alpine
    container_name: tnf-cloud-sandbox-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cloud Sandbox Service
  cloud-sandbox:
    build:
      context: ../..
      dockerfile: apps/cloud-sandbox/Dockerfile.secure
    container_name: tnf-cloud-sandbox
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Required
      NODE_ENV: development
      JWT_SECRET: development-secret-change-in-production
      DATABASE_URL: postgresql://tnf_user:tnf_password@postgres:5432/the_new_fuse

      # Optional
      REDIS_URL: redis://redis:6379
      PORT: 8080
      WS_PORT: 8080

      # Security
      ENABLE_TENANT_ISOLATION: "true"
      ENABLE_RESOURCE_QUOTAS: "true"
      ENABLE_AUDIT_LOG: "true"

      # Features
      ENABLE_BROWSER_TOOLS: "true"
      ENABLE_FILESYSTEM_TOOLS: "true"
      ENABLE_EXECUTION_TOOLS: "true"
      ENABLE_SKILL_CHAINS: "true"

      # Logging
      LOG_LEVEL: debug
      LOG_FORMAT: text
      DEBUG: "true"

      # Playwright
      PLAYWRIGHT_HEADLESS: "true"
      PLAYWRIGHT_BROWSERS_PATH: /home/app-user/pw-browsers
    ports:
      - "8080:8080"
    volumes:
      # Mount workspace for file operations
      - workspace:/home/app-user/workspace
      # Mount for logs
      - ./logs:/var/log/cloud-sandbox
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
  redis_data:
  workspace:
