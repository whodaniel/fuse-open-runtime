<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNF Cloud Sandbox - Live Agent View (V17)</title>
    <!-- Socket.IO client library -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: #111;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }

        h1 { margin: 0; font-size: 24px; font-weight: 600; }
        .status {
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
        }
        .connected .indicator { background: #10B981; box-shadow: 0 0 8px #10B981; }
        .disconnected .indicator { background: #EF4444; }
        .connecting .indicator { background: #F59E0B; animation: pulse 1s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .transport-badge {
            font-size: 10px;
            padding: 2px 6px;
            background: #333;
            border-radius: 4px;
            margin-left: 8px;
        }

        .viewer-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        #browser-view {
            width: 100%;
            display: block;
            background: #000;
            min-height: 400px;
        }

        .logs {
            margin-top: 20px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            height: 200px;
            overflow-y: auto;
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            color: #aaa;
        }

        .log-entry {
            margin-bottom: 4px;
            border-bottom: 1px solid #222;
            padding-bottom: 4px;
        }
        .log-time { color: #555; margin-right: 8px; }
        .log-action { color: #60A5FA; font-weight: bold; margin-right: 8px; }
        .log-action.error { color: #EF4444; }
        .log-action.success { color: #10B981; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>TNF Cloud Sandbox Live View</h1>
            <div id="connection-status" class="status disconnected">
                <div class="indicator"></div>
                <span id="status-text">Disconnected</span>
                <span id="transport-badge" class="transport-badge" style="display: none;"></span>
            </div>
        </header>

        <div class="viewer-card">
            <img id="browser-view" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 600' width='800' height='600'%3E%3Crect width='800' height='600' fill='%23111'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' fill='%23333' font-family='sans-serif' font-size='24'%3EWaiting for agent activity...%3C/text%3E%3C/svg%3E" alt="Live Browser View">
        </div>

        <div class="logs" id="activity-logs">
            <div class="log-entry">Initializing Socket.IO connection...</div>
        </div>
    </div>

    <script>
        const statusEl = document.getElementById('connection-status');
        const statusText = document.getElementById('status-text');
        const transportBadge = document.getElementById('transport-badge');
        const imgEl = document.getElementById('browser-view');
        const logsEl = document.getElementById('activity-logs');

        let screenshotCount = 0;

        function addLog(action, details, type = 'info') {
            const row = document.createElement('div');
            row.className = 'log-entry';
            const time = new Date().toLocaleTimeString();
            const actionClass = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
            row.innerHTML = `<span class="log-time">${time}</span><span class="log-action ${actionClass}">${action}</span> ${details || ''}`;
            logsEl.prepend(row);
            // Keep only last 100 logs
            while (logsEl.children.length > 100) {
                logsEl.removeChild(logsEl.lastChild);
            }
        }

        function connect() {
            // Determine the Socket.IO URL based on current location
            const protocol = window.location.protocol;
            const host = window.location.host;
            const socketUrl = `${protocol}//${host}`;

            addLog('System', `Connecting via Socket.IO to ${socketUrl}...`);
            statusEl.className = 'status connecting';
            statusText.textContent = 'Connecting...';

            // Create Socket.IO connection with automatic transport fallback
            const socket = io(socketUrl, {
                transports: ['polling', 'websocket'], // Prioritize polling for Railway compatibility
                path: '/socket.io/',
                reconnection: true,
                reconnectionAttempts: Infinity,
                reconnectionDelay: 1000,
                reconnectionDelayMax: 5000,
                timeout: 20000
            });

            socket.on('connect', () => {
                statusEl.className = 'status connected';
                statusText.textContent = 'Connected';
                addLog('System', 'Socket.IO connected', 'success');

                // Show transport type
                const transport = socket.io.engine.transport.name;
                transportBadge.textContent = transport.toUpperCase();
                transportBadge.style.display = 'inline';
                addLog('Transport', `Using ${transport} transport`);

                // Register as a monitor
                socket.emit('register_monitor', {
                    id: 'web-viewer-' + Math.random().toString(36).substr(2, 9)
                });
            });

            // Handle transport upgrade (polling -> websocket)
            socket.io.engine.on('upgrade', (transport) => {
                transportBadge.textContent = transport.name.toUpperCase();
                addLog('Transport', `Upgraded to ${transport.name}`, 'success');
            });

            socket.on('welcome', (data) => {
                addLog('Server', data.message, 'success');
                if (data.transport) {
                    addLog('Transport', `Server reports: ${data.transport}`);
                }
            });

            socket.on('registered', (data) => {
                addLog('System', `Registered as monitor (${data.monitors} total monitors)`, 'success');
            });

            socket.on('disconnect', (reason) => {
                statusEl.className = 'status disconnected';
                statusText.textContent = 'Disconnected';
                transportBadge.style.display = 'none';
                addLog('System', `Disconnected: ${reason}`, 'error');
            });

            socket.on('connect_error', (error) => {
                addLog('Error', `Connection error: ${error.message}`, 'error');
            });

            socket.on('screenshot', (data) => {
                if (data && data.image) {
                    screenshotCount++;
                    imgEl.src = data.image;
                    addLog('Screenshot', `#${screenshotCount} from ${data.action || 'agent action'}`);
                }
            });

            // Handle any other events
            socket.on('health_update', (data) => {
                // Optionally visualize system health
            });

            socket.on('activity', (data) => {
                addLog('Activity', data.message || JSON.stringify(data));
            });
        }

        // Start connection
        connect();
    </script>
</body>
</html>
