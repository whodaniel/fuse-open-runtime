<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNF Cloud Sandbox - Live Agent View (V16)</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: #111;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }

        h1 { margin: 0; font-size: 24px; font-weight: 600; }
        .status {
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
        }
        .connected .indicator { background: #10B981; box-shadow: 0 0 8px #10B981; }
        .disconnected .indicator { background: #EF4444; }

        .viewer-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        #browser-view {
            width: 100%;
            display: block;
            background: #000;
            min-height: 400px;
            /* Maintain aspect ratio somewhat or show placeholder */
        }

        .logs {
            margin-top: 20px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            height: 200px;
            overflow-y: auto;
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            color: #aaa;
        }

        .log-entry {
            margin-bottom: 4px;
            border-bottom: 1px solid #222;
            padding-bottom: 4px;
        }
        .log-time { color: #555; margin-right: 8px; }
        .log-action { color: #60A5FA; font-weight: bold; margin-right: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>TNF Cloud Sandbox Live View</h1>
            <div id="connection-status" class="status disconnected">
                <div class="indicator"></div>
                <span id="status-text">Disconnected</span>
            </div>
        </header>

        <div class="viewer-card">
            <img id="browser-view" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 600' width='800' height='600'%3E%3Crect width='800' height='600' fill='%23111'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' fill='%23333' font-family='sans-serif' font-size='24'%3EWaiting for agent activity...%3C/text%3E%3C/svg%3E" alt="Live Browser View">
        </div>

        <div class="logs" id="activity-logs">
            <div class="log-entry">Waiting for connection...</div>
        </div>
    </div>

    <script>
        const statusEl = document.getElementById('connection-status');
        const statusText = document.getElementById('status-text');
        const imgEl = document.getElementById('browser-view');
        const logsEl = document.getElementById('activity-logs');

        function addLog(action, details) {
            const row = document.createElement('div');
            row.className = 'log-entry';
            const time = new Date().toLocaleTimeString();
            row.innerHTML = `<span class="log-time">${time}</span><span class="log-action">${action}</span> ${details || ''}`;
            logsEl.prepend(row);
        }

        function connect() {
            // Determine WS URL based on current location
            // Use /ws endpoint (not /ws/heartbeat) for Railway compatibility
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const host = window.location.host;
            const wsUrl = `${protocol}//${host}/ws`;

            addLog('System', `Connecting to ${wsUrl}...`);

            const ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                statusEl.className = 'status connected';
                statusText.textContent = 'Connected';
                addLog('System', 'WebSocket connected');

                // Identify as a monitor
                ws.send(JSON.stringify({
                    type: 'register_monitor',
                    payload: { id: 'web-viewer-' + Math.random().toString(36).substr(2, 9) }
                }));
            };

            ws.onclose = () => {
                statusEl.className = 'status disconnected';
                statusText.textContent = 'Disconnected (Retrying...)';
                addLog('System', 'Disconnected. Retrying in 3s...');
                setTimeout(connect, 3000);
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);

                    if (data.type === 'screenshot') {
                        if (data.payload && data.payload.image) {
                            imgEl.src = data.payload.image;
                            addLog('Screenshot', `Updates from ${data.payload.action}`);
                        }
                    } else if (data.type === 'health_update') {
                        // Optional: visualize system health
                    }
                } catch (e) {
                    console.error('Parse error', e);
                }
            };
        }

        // Start
        connect();
    </script>
</body>
</html>
