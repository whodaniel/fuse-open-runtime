name = "fuse-edge-worker"
main = "src/index.ts"
compatibility_date = "2024-02-08"

# KV Namespace for Agent State
[[kv_namespaces]]
binding = "AGENT_STATE"
id = "43bfe6c56db1457b9becfd6a7fa943da"
preview_id = "43bfe6c56db1457b9becfd6a7fa943da"

# Workers AI Binding
[ai]
binding = "AI"

# Browser Rendering (Requires Worker with Browser Rendering enabled)
[browser]
binding = "MY_BROWSER"

# R2 Bucket for Artifacts
[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "fuse-artifacts-v1"

# Vectorize Index for Memory/RAG
[[vectorize]]
binding = "VECTOR_INDEX"
index_name = "fuse-agent-memory"

# Durable Objects (Stateful Agents)
[[durable_objects]]
binding = "AGENT_OBJECT"
class_name = "AgentObject"

# Migrations for Durable Objects
[[migrations]]
tag = "v1" # unique identifier for the migration
new_classes = ["AgentObject"]

# D1 Database (Relational Data)
[[d1_databases]]
binding = "DB"
database_name = "fuse-edge-db"
database_id = "e9e9e9e9-e9e9-e9e9-e9e9-e9e9e9e9e9e9" # Placeholder - update after creation

# Queue Producers (Sending jobs)
[[queues.producers]]
queue = "fuse-background-jobs"
binding = "JOBS_QUEUE"

# Queue Consumers (Processing jobs)
[[queues.consumers]]
queue = "fuse-background-jobs"
max_batch_size = 5
max_batch_timeout = 30

# Scheduled Triggers (Cron)
[triggers]
crons = ["*/15 * * * *"] # Run every 15 minutes

[vars]
# Environment variables (placeholders)
ENVIRONMENT = "production"
