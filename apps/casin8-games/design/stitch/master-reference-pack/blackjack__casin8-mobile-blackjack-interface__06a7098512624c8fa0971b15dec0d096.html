<html class="dark"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#f4c025",
            "background-light": "#f8f8f5",
            "background-dark": "#12110a",
            "surface-dark": "#1c1a12",
            "felt-blue": "#1e293b",
          },
          fontFamily: {
            "display": ["Spline Sans", "sans-serif"]
          },
          borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
        },
      },
    }
  </script>
<style>
    body {
      font-family: 'Spline Sans', sans-serif;
    }
    .blackjack-felt {
      background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
    }
    .card-shadow {
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
<div class="relative flex h-screen w-full max-w-[390px] mx-auto flex-col bg-background-light dark:bg-background-dark overflow-hidden border-x border-slate-200 dark:border-slate-800">
<!-- Top Nav Bar Component -->
<header class="flex items-center justify-between px-4 py-3 bg-surface-dark border-b border-white/10 shrink-0">
<div class="flex items-center gap-2 text-primary">
<div class="size-6">
<svg fill="currentColor" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M24 45.8096C19.6865 45.8096 15.4698 44.5305 11.8832 42.134C8.29667 39.7376 5.50128 36.3314 3.85056 32.3462C2.19985 28.361 1.76794 23.9758 2.60947 19.7452C3.451 15.5145 5.52816 11.6284 8.57829 8.5783C11.6284 5.52817 15.5145 3.45101 19.7452 2.60948C23.9758 1.76795 28.361 2.19986 32.3462 3.85057C36.3314 5.50129 39.7376 8.29668 42.134 11.8833C44.5305 15.4698 45.8096 19.6865 45.8096 24L24 24L24 45.8096Z"></path>
</svg>
</div>
<h2 class="text-slate-100 text-lg font-bold leading-tight tracking-tight">Casin8</h2>
</div>
<div class="flex items-center gap-3">
<div class="hidden sm:flex items-center bg-white/5 px-2 py-1 rounded text-[10px] text-slate-400 uppercase tracking-widest border border-white/10">Mainnet</div>
<button class="flex items-center justify-center rounded-full h-9 px-3 bg-primary text-background-dark text-xs font-bold shadow-lg shadow-primary/20">
          $4,250.50
        </button>
<div class="size-8 rounded-full overflow-hidden border border-white/20">
<img class="w-full h-full object-cover" data-alt="User profile avatar placeholder" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBDOS6WdisqX5j1GC447r72vYIIiJopDyxKaco3MUuvQXp3_F7IU7dwrXM0r7vakLzFKfCtQQzGe9uUNAeKjUI0lf9nMHQrIUMEeYyDPMbwDaWThfDj-O6JxuqHDNTQosp0MgU3TzRQIyTE-j2YdXB4FxqSe2MXfElA-yeFYCPnXpfQpWBjKkZCQD-e0bvMRXMpX7RFwryjg_93ucesithPlAq_NO5mtdeO37ZyUvYMDTUyGvzAd-8UoBfv3okiOd_lmtwtkJKbwGKu"/>
</div>
</div>
</header>
<!-- Reconnecting Banner -->
<div class="bg-primary/10 border-b border-primary/20 px-4 py-2 flex items-center justify-between">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-sm animate-pulse">sync</span>
<p class="text-primary text-[10px] font-bold uppercase tracking-wider">Reconnecting to server...</p>
</div>
<div class="w-16 h-1 bg-white/10 rounded-full overflow-hidden">
<div class="h-full bg-primary w-2/3"></div>
</div>
</div>
<!-- Main Game Area -->
<main class="flex-1 blackjack-felt relative flex flex-col items-center justify-between py-8 px-4 overflow-hidden">
<!-- Dealer Area -->
<div class="flex flex-col items-center gap-4 w-full">
<div class="px-4 py-1 rounded-full bg-black/40 border border-white/10 backdrop-blur-md">
<p class="text-white/60 text-[10px] font-bold uppercase tracking-widest text-center">Dealer Hand: <span class="text-white">16</span></p>
</div>
<div class="flex justify-center -space-x-8">
<div class="w-20 h-28 bg-white rounded-lg flex flex-col p-2 card-shadow transform -rotate-3">
<span class="text-slate-900 font-bold text-lg leading-none">A</span>
<span class="material-symbols-outlined text-red-600 !text-xl">favorite</span>
</div>
<div class="w-20 h-28 bg-slate-200 rounded-lg flex items-center justify-center card-shadow transform rotate-2 border-2 border-white/20">
<div class="w-16 h-24 rounded border border-slate-400/30 bg-slate-300/50 flex items-center justify-center">
<span class="material-symbols-outlined text-slate-400 !text-4xl">casino</span>
</div>
</div>
</div>
</div>
<!-- Table Center Decor -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 opacity-10 pointer-events-none">
<svg class="w-64 h-64 text-white" fill="currentColor" viewbox="0 0 24 24">
<path d="M12 2L4.5 20.29L5.21 21L12 18L18.79 21L19.5 20.29L12 2Z"></path>
</svg>
</div>
<!-- Player Area -->
<div class="flex flex-col items-center gap-4 w-full mt-auto mb-4">
<div class="flex justify-center -space-x-8">
<div class="w-24 h-32 bg-white rounded-lg flex flex-col p-2 card-shadow transform -rotate-6">
<span class="text-slate-900 font-bold text-xl leading-none">10</span>
<span class="material-symbols-outlined text-slate-900 !text-2xl">diamond</span>
</div>
<div class="w-24 h-32 bg-white rounded-lg flex flex-col p-2 card-shadow transform rotate-3">
<span class="text-slate-900 font-bold text-xl leading-none">9</span>
<span class="material-symbols-outlined text-slate-900 !text-2xl">playing_cards</span>
</div>
</div>
<div class="px-6 py-2 rounded-full bg-primary shadow-xl shadow-primary/30 border-2 border-white/20">
<p class="text-background-dark text-sm font-bold uppercase tracking-widest">Your Hand: <span class="text-lg">19</span></p>
</div>
</div>
</main>
<!-- Bottom Action Bar -->
<div class="bg-surface-dark p-4 flex flex-col gap-4 border-t border-white/10 shrink-0">
<div class="grid grid-cols-3 gap-3">
<button class="flex flex-col items-center justify-center bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl py-3 gap-1 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-white">double_arrow</span>
<span class="text-white text-[10px] font-bold uppercase">Double</span>
</button>
<button class="flex flex-col items-center justify-center bg-primary hover:bg-primary/90 rounded-xl py-3 gap-1 active:scale-95 transition-transform shadow-lg shadow-primary/10">
<span class="material-symbols-outlined text-background-dark font-bold">add</span>
<span class="text-background-dark text-[10px] font-bold uppercase">Hit</span>
</button>
<button class="flex flex-col items-center justify-center bg-red-500 hover:bg-red-600 rounded-xl py-3 gap-1 active:scale-95 transition-transform shadow-lg shadow-red-500/10">
<span class="material-symbols-outlined text-white">front_hand</span>
<span class="text-white text-[10px] font-bold uppercase">Stand</span>
</button>
</div>
</div>
<!-- Bottom Tab Bar -->
<nav class="bg-surface-dark border-t border-white/10 px-6 py-3 shrink-0">
<div class="flex items-center justify-between">
<a class="flex flex-col items-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[9px] font-bold uppercase">Home</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">playing_cards</span>
<span class="text-[9px] font-bold uppercase">Games</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="text-[9px] font-bold uppercase">Wallet</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[9px] font-bold uppercase">Profile</span>
</a>
</div>
</nav>
</div>
</body></html>
