<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Buy Native Tokens - Casin8</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Icons -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7f13ec",
                        "primary-hover": "#6b10c6",
                        "primary-light": "#9844f0",
                        "background-light": "#f7f6f8",
                        "background-dark": "#191022",
                        "surface-dark": "#2a1e36",
                        "surface-light": "#362646",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-slate-900 dark:text-slate-100 min-h-screen flex justify-center overflow-hidden">
<!-- Mobile Container -->
<div class="relative w-full max-w-md h-screen flex flex-col bg-background-light dark:bg-background-dark overflow-y-auto">
<!-- Header -->
<header class="sticky top-0 z-10 flex items-center justify-between p-4 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-md border-b border-primary/10">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-primary/10 transition-colors text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="text-lg font-bold tracking-tight text-slate-900 dark:text-white">Purchase Tokens</h1>
<button class="flex items-center justify-center size-10 rounded-full hover:bg-primary/10 transition-colors text-primary font-bold text-sm">
                Help
            </button>
</header>
<!-- Main Content -->
<main class="flex-1 px-4 py-6 flex flex-col gap-6">
<!-- Progress Stepper (Visual Only) -->
<div class="flex items-center justify-center gap-2 mb-2">
<div class="h-1 w-8 rounded-full bg-primary"></div>
<div class="h-1 w-8 rounded-full bg-primary/30"></div>
<div class="h-1 w-8 rounded-full bg-primary/30"></div>
</div>
<!-- Amount Section -->
<section>
<h2 class="text-2xl font-bold text-center mb-1 text-slate-900 dark:text-white">Select Amount</h2>
<p class="text-center text-sm text-slate-500 dark:text-slate-400 mb-6">Choose how much you want to top up</p>
<!-- Presets -->
<div class="grid grid-cols-4 gap-3 mb-6">
<button class="flex h-12 items-center justify-center rounded-xl bg-surface-dark border border-primary/20 hover:border-primary hover:bg-primary/10 transition-all active:scale-95 group">
<span class="font-semibold group-hover:text-primary">$20</span>
</button>
<button class="flex h-12 items-center justify-center rounded-xl bg-surface-dark border border-primary/20 hover:border-primary hover:bg-primary/10 transition-all active:scale-95 group">
<span class="font-semibold group-hover:text-primary">$50</span>
</button>
<button class="flex h-12 items-center justify-center rounded-xl bg-primary text-white shadow-lg shadow-primary/25 border border-primary ring-2 ring-primary/20 transition-all active:scale-95">
<span class="font-bold">$100</span>
</button>
<button class="flex h-12 items-center justify-center rounded-xl bg-surface-dark border border-primary/20 hover:border-primary hover:bg-primary/10 transition-all active:scale-95 group">
<span class="font-semibold group-hover:text-primary">$250</span>
</button>
</div>
<!-- Custom Input -->
<div class="relative group">
<label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-2 uppercase tracking-wider">Custom Amount (USD)</label>
<div class="relative flex items-center">
<span class="absolute left-4 text-slate-400 pointer-events-none material-symbols-outlined">attach_money</span>
<input class="w-full bg-surface-dark border border-primary/20 text-white text-lg font-medium rounded-xl h-14 pl-12 pr-4 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-600" placeholder="Enter amount" type="number" value="100"/>
</div>
<div class="mt-3 flex items-center justify-center gap-2 p-3 rounded-lg bg-primary/5 border border-primary/10">
<span class="material-symbols-outlined text-primary text-lg">token</span>
<p class="text-sm font-medium text-primary">Estimated Receive: <span class="font-bold">5,000 CSN8</span></p>
</div>
</div>
</section>
<!-- Payment Provider Section -->
<section class="mt-2">
<label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-3 uppercase tracking-wider">Select Payment Method</label>
<div class="space-y-3">
<!-- Apple Pay -->
<label class="relative flex items-center p-4 rounded-xl border border-primary bg-primary/10 cursor-pointer transition-all shadow-sm">
<input checked="" class="peer sr-only" name="payment" type="radio"/>
<div class="flex items-center justify-center size-10 rounded-lg bg-white text-black mr-4 shrink-0">
<span class="material-symbols-outlined">logo_dev</span> <!-- Placeholder for Apple logo -->
</div>
<div class="flex-1">
<h3 class="font-bold text-slate-900 dark:text-white">Apple Pay</h3>
<p class="text-xs text-slate-500 dark:text-slate-400">Connected via FaceID</p>
</div>
<div class="size-5 rounded-full border-2 border-slate-500 peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center transition-all">
<div class="size-2 rounded-full bg-white opacity-0 peer-checked:opacity-100"></div>
</div>
</label>
<!-- Credit Card -->
<label class="relative flex items-center p-4 rounded-xl border border-primary/20 bg-surface-dark hover:border-primary/50 cursor-pointer transition-all">
<input class="peer sr-only" name="payment" type="radio"/>
<div class="flex items-center justify-center size-10 rounded-lg bg-[#362646] text-white mr-4 shrink-0">
<span class="material-symbols-outlined">credit_card</span>
</div>
<div class="flex-1">
<h3 class="font-semibold text-slate-900 dark:text-white">Credit Card</h3>
<p class="text-xs text-slate-500 dark:text-slate-400">Visa, Mastercard</p>
</div>
<div class="size-5 rounded-full border-2 border-slate-500 peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center transition-all">
<div class="size-2 rounded-full bg-white opacity-0 peer-checked:opacity-100"></div>
</div>
</label>
<!-- Crypto -->
<label class="relative flex items-center p-4 rounded-xl border border-primary/20 bg-surface-dark hover:border-primary/50 cursor-pointer transition-all">
<input class="peer sr-only" name="payment" type="radio"/>
<div class="flex items-center justify-center size-10 rounded-lg bg-[#362646] text-[#F7931A] mr-4 shrink-0">
<span class="material-symbols-outlined">currency_bitcoin</span>
</div>
<div class="flex-1">
<h3 class="font-semibold text-slate-900 dark:text-white">Crypto Wallet</h3>
<p class="text-xs text-slate-500 dark:text-slate-400">MetaMask, WalletConnect</p>
</div>
<div class="size-5 rounded-full border-2 border-slate-500 peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center transition-all">
<div class="size-2 rounded-full bg-white opacity-0 peer-checked:opacity-100"></div>
</div>
</label>
</div>
</section>
<!-- Spacer -->
<div class="flex-1"></div>
</main>
<!-- Footer / Action Area -->
<footer class="p-4 bg-background-light dark:bg-background-dark border-t border-primary/10">
<!-- Security Notice -->
<div class="flex items-start gap-3 mb-4 p-3 rounded-lg bg-emerald-500/10 border border-emerald-500/20">
<span class="material-symbols-outlined text-emerald-500 shrink-0 text-sm mt-0.5">verified_user</span>
<p class="text-xs text-emerald-400/90 leading-relaxed">
                    Transactions are secure and encrypted. Funds will be immediately available in your Casin8 wallet upon confirmation.
                </p>
</div>
<!-- Confirm Button -->
<button class="w-full relative overflow-hidden group h-14 bg-primary hover:bg-primary-hover active:bg-primary-hover rounded-xl shadow-lg shadow-primary/25 transition-all flex items-center justify-between px-6">
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent translate-x-[-100%] group-hover:animate-[shimmer_1.5s_infinite]"></div>
<div class="flex flex-col items-start">
<span class="text-[10px] text-white/80 uppercase tracking-wide font-medium">Total to Pay</span>
<span class="text-lg font-bold text-white">$100.00</span>
</div>
<div class="flex items-center gap-2">
<span class="text-base font-bold text-white">Purchase</span>
<span class="material-symbols-outlined text-white">arrow_forward</span>
</div>
</button>
</footer>
</div>
</body></html>
