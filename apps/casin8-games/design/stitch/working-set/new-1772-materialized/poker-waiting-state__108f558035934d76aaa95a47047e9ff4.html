<span class="text-[10px] font-medium text-white group-hover:text-white transition-colors">Table</span>

<a class="flex flex-1 flex-col items-center gap-1 group" href="#">
<span class="material-symbols-outlined text-slate-500 group-hover:text-white transition-colors">chat_bubble</span>
