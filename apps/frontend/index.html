<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO and Meta Information -->
    <title>The New Fuse - Frontend Application</title>
    <meta name="description" content="Advanced AI Communication System">
    <meta name="theme-color" content="#667eea">

    <!-- Performance Optimization: DNS Prefetch for external resources -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">

    <!-- Performance Optimization: Preconnect to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>

    <!-- Critical CSS for initial render -->
    <style>
        /* Critical above-the-fold styles */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        #root {
            width: 100%;
            min-height: 100vh;
            background: white;
        }

        /* Optimized loading spinner */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #667eea;
            font-size: 18px;
            font-weight: 500;
        }

        .loading::after {
            content: '';
            width: 20px;
            height: 20px;
            margin-left: 10px;
            border: 3px solid #667eea;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Prevent layout shift */
        img, svg, video, canvas, iframe {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading" role="status" aria-live="polite">Loading Application</div>
    </div>

    <!-- Main application entry point - Vite will inject preload tags automatically -->
    <script type="module" src="/src/main.tsx"></script>

    <!-- Fallback for users with JavaScript disabled -->
    <noscript>
        <div style="padding: 20px; text-align: center; color: #333;">
            <h1>JavaScript Required</h1>
            <p>This application requires JavaScript to run. Please enable JavaScript in your browser settings.</p>
        </div>
    </noscript>
</body>
</html>
