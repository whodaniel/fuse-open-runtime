<!doctype html>

    <!-- Global Custom Element Guard: Prevents crashes from duplicate definitions -->
    <script>
      (function() {
        try {
          const originalDefine = customElements.define;
          customElements.define = function(name, constructor, options) {
            if (customElements.get(name)) {
              console.warn(`[The New Fuse] Custom element '${name}' is already defined. Ignoring duplicate definition.`);
              return;
            }
            try {
              originalDefine.call(this, name, constructor, options);
            } catch (e) {
              if (e.message.includes('already been defined')) {
                 console.warn(`[The New Fuse] Custom element '${name}' collision caught in try-catch.`);
                 return;
              }
              throw e;
            }
          };
          console.log('[The New Fuse] Custom Element Guard activated.');
        } catch(e) {
          console.error('[The New Fuse] Failed to activate Custom Element Guard', e);
        }
      })();
    </script>

    <!-- Performance Optimization: DNS Prefetch for external resources -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />

    <!-- Performance Optimization: Preconnect to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Font Optimization: Preload critical fonts -->
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript
      ><link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    /></noscript>

    <!-- Critical CSS for initial render - Dark Theme -->
    <style>
      /* Critical above-the-fold styles - Premium Dark Theme */
      * {
        box-sizing: border-box;
      }

      html {
        color-scheme: dark;
      }

      body {
        font-family:
          'Plus Jakarta Sans',
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          sans-serif;
        margin: 0;
        padding: 0;
        background-color: #020617; /* Slate 950 - Deep Obsidian */
        background-image:
          radial-gradient(circle at 50% 0%, rgba(56, 189, 248, 0.08) 0%, transparent 50%),
          radial-gradient(circle at 100% 0%, rgba(168, 85, 247, 0.05) 0%, transparent 50%),
          linear-gradient(180deg, #020617 0%, #0f172a 100%);
        background-attachment: fixed;
        min-height: 100vh;
        color: #f8fafc; /* Slate 50 */
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #root {
        width: 100%;
        min-height: 100vh;
        background: transparent; /* CRITICAL: Was 'white', now transparent */
      }

      /* Optimized loading spinner - Dark Theme */
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        color: #60a5fa; /* Blue 400 */
        font-size: 18px;
        font-weight: 500;
      }

      .loading::after {
        content: '';
        width: 20px;
        height: 20px;
        margin-left: 10px;
        border: 3px solid #3b82f6;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Prevent layout shift */
      img,
      svg,
      video,
      canvas,
      iframe {
        max-width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading" role="status" aria-live="polite">
        <div style="text-align: center">
          <div style="font-size: 48px; margin-bottom: 20px">🚀</div>
          <h1 style="font-size: 32px; font-weight: 700; color: #f1f5f9; margin: 0 0 12px 0">
            The New Fuse
          </h1>
          <p style="font-size: 16px; color: #94a3b8; margin: 0 0 24px 0">
            AI Agent Orchestration Platform
          </p>
          <div
            style="
              width: 40px;
              height: 40px;
              margin: 0 auto;
              border: 4px solid #334155;
              border-top-color: #3b82f6;
              border-radius: 50%;
              animation: spin 0.8s linear infinite;
            "
          ></div>
        </div>
      </div>
    </div>

    <!-- Main application entry point - Vite will inject preload tags automatically -->
    <script type="module" src="/src/main.tsx"></script>

    <!-- Fallback for users with JavaScript disabled -->

          This application requires JavaScript to run. Please enable JavaScript in your browser
          settings.
        </p>
      </div>
    </noscript>
