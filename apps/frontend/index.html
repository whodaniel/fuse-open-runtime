  <!-- Content Security Policy: Relaxed for local development (http/ws) and legacy eval support -->

  />

  <script>
    (function routeStaticHostingToSpa() {
      var AUTH_LOGIN_URL = 'https://thenewfuse.com/auth/login';
      var AUTH_REGISTER_URL = 'https://thenewfuse.com/auth/register';

      // Keep auth links canonical while leaving app links as clean path-based routes.
      // The frontend server handles SPA fallback to app.html.
      document.addEventListener('DOMContentLoaded', function () {
        var links = document.querySelectorAll('a[href^="/"]');
        links.forEach(function (link) {
          var href = link.getAttribute('href');
          if (!href) return;
          if (href === '/' || href.startsWith('/#') || href.startsWith('/visualizations/')) return;
          if (href === '/auth/login' || href === '/login') {
            link.setAttribute('href', AUTH_LOGIN_URL);
            return;
          }
          if (href === '/auth/register' || href === '/register') {
            link.setAttribute('href', AUTH_REGISTER_URL);
            return;
          }
        });
      });
    })();
  </script>

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {

    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #60a5fa;
      font-size: 18px;
      font-weight: 500;
    }

    .loading::after {
      content: '';
      width: 20px;
      height: 20px;
      margin-left: 10px;
      border: 3px solid #3b82f6;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <!-- CRITICAL: Custom Element Guard MUST be first to intercept browser extension scripts -->
  <script>
    (function () {
      let GUARD_DEBUG = false;
      try {
        GUARD_DEBUG = (window && window.__TNF_DEBUG_CUSTOM_ELEMENTS__) || (window && window.localStorage && window.localStorage.getItem('TNF_DEBUG_CE') === '1');
      } catch (_e) { GUARD_DEBUG = false; }

      const swallowError = function (message) {
        const msg = (message || '').toLowerCase();
        return (msg.includes('mce-autosize-textarea') || msg.includes('already been defined') || msg.includes('already been used') || msg.includes('failed to resolve module') || msg.includes('scheduler') || (msg.includes('uncaught') && msg.includes('custom element')));
      };

      const originalOnerror = window.onerror;
      window.onerror = function (message, source, lineno, colno, error) {
        if (swallowError(message)) {
          console.warn('[The New Fuse] Globally suppressed error:', message);
          return true;
        }
        if (originalOnerror) return originalOnerror.apply(this, arguments);
      };

      window.addEventListener('error', function (event) {
        if (swallowError(event.message)) {
          event.preventDefault();
          event.stopImmediatePropagation();
          return true;
        }
      }, true);

      window.addEventListener('unhandledrejection', function (event) {
        const reason = event.reason?.message || String(event.reason || '');
        if (swallowError(reason)) {
          event.preventDefault();
          return true;
        }
      }, true);

      try {
        const registry = customElements;
        const originalDefine = registry.define.bind(registry);
        const originalGet = registry.get.bind(registry);
        const registeredElements = new Set();
        const definingElements = new Set();

        const safeDefine = function (name, constructor, options) {
          if (name === 'mce-autosize-textarea') {
            if (customElements.get(name) || registeredElements.has(name)) return;
          }
          if (registeredElements.has(name)) return;
          try {
            const existing = originalGet(name);
            if (existing) {
              registeredElements.add(name);
              return;
            }
          } catch (e) {}
          if (definingElements.has(name)) return;
          if (customElements.get(name)) {
            registeredElements.add(name);
            return;
          }
          definingElements.add(name);
          try {
            originalDefine(name, constructor, options);
            registeredElements.add(name);
          } catch (e) {
            const msg = (e && e.message) || String(e || '');
            if (msg.toLowerCase().includes('already') || msg.toLowerCase().includes('defined') || msg.toLowerCase().includes('used') || msg.includes('NotSupportedError')) {
              registeredElements.add(name);
              return;
            }
            console.error(`[The New Fuse] Error defining '${name}':`, e);
          } finally {
            definingElements.delete(name);
          }
        };

        safeDefine.__isSafeGuarded = true;
        const boundSafeDefine = safeDefine.bind(registry);
        boundSafeDefine.__isSafeGuarded = true;

        const proto = window.CustomElementRegistry && window.CustomElementRegistry.prototype;
        if (proto && proto.define && !proto.define.__isSafeGuarded) {
          Object.defineProperty(proto, 'define', { value: boundSafeDefine, configurable: false, writable: false });
        }
        if (!registry.define.__isSafeGuarded) {
          Object.defineProperty(registry, 'define', { value: boundSafeDefine, configurable: false, writable: false });
        }

        try {
          const originalCustomElements = window.customElements;
          if (originalCustomElements) {
            Object.defineProperty(window, 'customElements', {
              get() { return originalCustomElements; },
              set(v) { console.warn('[The New Fuse] Prevented external script from overwriting window.customElements'); },
              configurable: false,
            });
          }
        } catch (e) {}

        if (GUARD_DEBUG) console.log('[The New Fuse] Custom Element Guard active');
      } catch (e) {
        console.error('[The New Fuse] Custom Element Guard failed to initialize', e);
      }
    })();
  </script>
