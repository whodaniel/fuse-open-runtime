<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO and Meta Information -->
    <title>
      The New Fuse - AI Collaboration Platform | Workflow Automation & Agent Orchestration
    </title>
    <meta
      name="description"
      content="Orchestrate intelligent workflows, enable seamless agent communication, and unlock the full potential of AI automation with The New Fuse. Support for MCP and A2A protocols."
    />
    <meta
      name="keywords"
      content="AI platform, workflow automation, AI agents, agent orchestration, MCP protocol, A2A protocol, enterprise AI, AI collaboration"
    />
    <meta name="author" content="The New Fuse Team" />
    <meta name="theme-color" content="#667eea" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="The New Fuse - AI Collaboration Platform" />
    <meta
      property="og:description"
      content="Orchestrate intelligent workflows, enable seamless agent communication, and unlock the full potential of AI automation."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:site_name" content="The New Fuse" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="The New Fuse - AI Collaboration Platform" />
    <meta
      name="twitter:description"
      content="Orchestrate intelligent workflows, enable seamless agent communication, and unlock the full potential of AI automation."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Performance Optimization: DNS Prefetch for external resources -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />

    <!-- Performance Optimization: Preconnect to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Font Optimization: Preload critical fonts -->
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript
      ><link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    /></noscript>

    <!-- Critical CSS for initial render -->
    <style>
      /* Critical above-the-fold styles */
      * {
        box-sizing: border-box;
      }

      body {
        font-family:
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          'Helvetica Neue',
          Arial,
          sans-serif;
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-display: swap;
      }

      #root {
        width: 100%;
        min-height: 100vh;
        background: white;
      }

      /* Optimized loading spinner */
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        color: #667eea;
        font-size: 18px;
        font-weight: 500;
      }

      .loading::after {
        content: '';
        width: 20px;
        height: 20px;
        margin-left: 10px;
        border: 3px solid #667eea;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Prevent layout shift */
      img,
      svg,
      video,
      canvas,
      iframe {
        max-width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading" role="status" aria-live="polite">
        <div style="text-align: center">
          <div style="font-size: 48px; margin-bottom: 20px">🚀</div>
          <h1 style="font-size: 32px; font-weight: 700; color: #1e293b; margin: 0 0 12px 0">
            The New Fuse
          </h1>
          <p style="font-size: 16px; color: #64748b; margin: 0 0 24px 0">
            AI Agent Orchestration Platform
          </p>
          <div
            style="
              width: 40px;
              height: 40px;
              margin: 0 auto;
              border: 4px solid #e2e8f0;
              border-top-color: #667eea;
              border-radius: 50%;
              animation: spin 0.8s linear infinite;
            "
          ></div>
        </div>
      </div>
    </div>

    <!-- Main application entry point - Vite will inject preload tags automatically -->
    <script type="module" src="/src/main.tsx"></script>

    <!-- Fallback for users with JavaScript disabled -->
    <noscript>
      <div style="padding: 20px; text-align: center; color: #333">
        <h1>JavaScript Required</h1>
        <p>
          This application requires JavaScript to run. Please enable JavaScript in your browser
          settings.
        </p>
      </div>
    </noscript>
  </body>
</html>
