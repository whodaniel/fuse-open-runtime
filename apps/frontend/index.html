    <!-- CRITICAL: Custom Element Guard MUST be first to intercept browser extension scripts -->
    <script>
      (function () {
        try {
          // Keep track of all registered elements
          const registeredElements = new Set();
          const definingElements = new Set();

          // Store original methods
          const originalDefine = customElements.define.bind(customElements);
          const originalGet = customElements.get.bind(customElements);

          // Create a safer define function
          const safeDefine = function (name, constructor, options) {
            // Double-check if already registered in our tracker
            if (registeredElements.has(name)) {
              console.warn(`[The New Fuse] Element '${name}' already in registry. Skipping.`);
              return;
            }

            // Check if already defined via native API
            try {
              const existing = originalGet(name);
              if (existing) {
                console.warn(
                  `[The New Fuse] Element '${name}' already defined in customElements. Skipping.`
                );
                registeredElements.add(name);
                return;
              }
            } catch (e) {
              // Get failed, element doesn't exist - continue
            }

            // Check if currently being defined (race condition)
            if (definingElements.has(name)) {
              console.warn(
                `[The New Fuse] Element '${name}' is currently being defined. Skipping duplicate.`
              );
              return;
            }

            // Mark as being defined
            definingElements.add(name);

            try {
              originalDefine(name, constructor, options);
              registeredElements.add(name);
            } catch (e) {
              const msg = e.message || '';
              if (
                msg.includes('already been defined') ||
                msg.includes('has already been used') ||
                msg.includes('NotSupportedError') ||
                msg.includes('is already defined') ||
                msg.includes('has already been')
              ) {
                // Silently handle - element is already defined
                console.warn(`[The New Fuse] Duplicate definition prevented for '${name}'`);
                registeredElements.add(name);
                return;
              }
              // Re-throw unexpected errors
              console.error(`[The New Fuse] Unexpected error defining '${name}':`, e);
              throw e;
            } finally {
              // Remove from defining set
              definingElements.delete(name);
            }
          };

          // Mark as guarded so other scripts know
          safeDefine.__isSafeGuarded = true;

          // Bind the function to customElements to maintain context
          const boundSafeDefine = safeDefine.bind(customElements);
          // Also mark the bound function
          boundSafeDefine.__isSafeGuarded = true;

          // Override with bound function
          Object.defineProperty(customElements, 'define', {
            value: boundSafeDefine,
            configurable: false,
            writable: false,
          });

          // Lock the customElements object itself to prevent polyfills from replacing it
          try {
            const originalCustomElements = window.customElements;
            Object.defineProperty(window, 'customElements', {
              get() {
                return originalCustomElements;
              },
              set(v) {
                console.warn(
                  '[The New Fuse] Prevented external script from overwriting window.customElements'
                );
              },
              configurable: false,
            });
          } catch (e) {
            // Ignore if already non-configurable
          }

          console.log('[The New Fuse] Custom Element Guard activated (FIRST) - Registry Locked');
        } catch (e) {
          console.error('[The New Fuse] Custom Element Guard failed to initialize', e);
        }
      })();
    </script>

    <!-- Content Security Policy: Allow unsafe-eval/inline as requested for legacy dependency support -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https: data: blob: wss:; connect-src 'self' https: wss:; img-src 'self' https: data: blob:; worker-src 'self' blob:;"

    <!-- Global CommonJS require() shim for bundled dependencies (ethers.js, bn.js, etc.) -->
    <script>
      // Shim for CommonJS require() calls that can't be polyfilled at build time
      // Some libraries use eval("require(...)") which bypasses Vite's transforms
      (function () {
        if (typeof window.require === 'undefined') {
          // Create a stub that returns empty modules for common Node.js modules
          const emptyModule = {};
          const bufferModule = {
            Buffer: typeof Buffer !== 'undefined' ? Buffer : { from: () => [], alloc: () => [] },
          };

          window.require = function (moduleName) {
            // Suppress warnings for expected browser-incompatible modules
            const ignoredModules = ['fs', 'path', 'os', 'crypto', 'buffer'];
            if (!ignoredModules.includes(moduleName) && !moduleName.startsWith('node:')) {
              console.warn('[The New Fuse] CommonJS require() called for:', moduleName);
            }

            // Return appropriate stubs for known modules
            if (moduleName === 'crypto') {
              return (
                window.crypto || {
                  createHash: () => ({ update: () => ({ digest: () => '' }), digest: () => '' }),
                  randomBytes: (size) => new Uint8Array(size),
                }
              );
            }
            if (moduleName === 'buffer' || moduleName === 'buffer/') {
              return bufferModule;
            }
            if (moduleName === 'bn.js') {
              // Return a functional BN implementation using BigInt
              // This handles the eval("require('bn.js')") pattern in some crypto libs
              if (window._BNCache) return window._BNCache;

              class BN {
                constructor(number, base, endian) {
                  if (number instanceof BN) {
                    this.value = number.value;
                  } else if (typeof number === 'bigint') {
                    this.value = number;
                  } else if (typeof number === 'number') {
                    this.value = BigInt(number);
                  } else if (typeof number === 'string') {
                    const b = base || 10;
                    this.value = BigInt(b === 16 ? '0x' + number.replace(/^0x/i, '') : number);
                  } else if (number && number.length !== undefined) {
                    // Array or Buffer
                    let hex = '0x';
                    for (let i = 0; i < number.length; i++)
                      hex += number[i].toString(16).padStart(2, '0');
                    this.value = BigInt(hex);
                  } else {
                    this.value = BigInt(0);
                  }
                }
                clone() {
                  return new BN(this.value);
                }
                add(b) {
                  return new BN(this.value + new BN(b).value);
                }
                sub(b) {
                  return new BN(this.value - new BN(b).value);
                }
                mul(b) {
                  return new BN(this.value * new BN(b).value);
                }
                div(b) {
                  return new BN(this.value / new BN(b).value);
                }
                mod(b) {
                  return new BN(this.value % new BN(b).value);
                }
                pow(b) {
                  return new BN(this.value ** new BN(b).value);
                }
                sqr() {
                  return new BN(this.value * this.value);
                }
                neg() {
                  return new BN(-this.value);
                }
                abs() {
                  return new BN(this.value < 0n ? -this.value : this.value);
                }
                isZero() {
                  return this.value === 0n;
                }
                isNeg() {
                  return this.value < 0n;
                }
                cmp(b) {
                  const bv = new BN(b).value;
                  return this.value < bv ? -1 : this.value > bv ? 1 : 0;
                }
                lt(b) {
                  return this.cmp(b) < 0;
                }
                lte(b) {
                  return this.cmp(b) <= 0;
                }
                gt(b) {
                  return this.cmp(b) > 0;
                }
                gte(b) {
                  return this.cmp(b) >= 0;
                }
                eq(b) {
                  return this.cmp(b) === 0;
                }
                toNumber() {
                  return Number(this.value);
                }
                toString(base) {
                  const b = base || 10;
                  if (b === 16) return this.value.toString(16);
                  return this.value.toString();
                }
                toArray(endian, length) {
                  let hex = this.value.toString(16);
                  if (hex.length % 2) hex = '0' + hex;
                  const arr = [];
                  for (let i = 0; i < hex.length; i += 2) arr.push(parseInt(hex.substr(i, 2), 16));
                  if (length && arr.length < length) {
                    while (arr.length < length) arr.unshift(0);
                  }
                  if (endian === 'le') arr.reverse();
                  return arr;
                }
                toBuffer(endian, length) {
                  return new Uint8Array(this.toArray(endian, length));
                }
                bitLength() {
                  return this.value.toString(2).length;
                }
                byteLength() {
                  return Math.ceil(this.bitLength() / 8);
                }
                and(b) {
                  return new BN(this.value & new BN(b).value);
                }
                or(b) {
                  return new BN(this.value | new BN(b).value);
                }
                xor(b) {
                  return new BN(this.value ^ new BN(b).value);
                }
                shln(n) {
                  return new BN(this.value << BigInt(n));
                }
                shrn(n) {
                  return new BN(this.value >> BigInt(n));
                }
                static isBN(obj) {
                  return obj instanceof BN;
                }
                static red(m) {
                  return { prime: null, m: new BN(m) };
                }
                toRed(ctx) {
                  this._red = ctx;
                  return this;
                }
                fromRed() {
                  return this.clone();
                }
                redAdd(b) {
                  return this.add(b).mod(this._red?.m || new BN(1));
                }
                redSub(b) {
                  return this.sub(b).mod(this._red?.m || new BN(1));
                }
                redMul(b) {
                  return this.mul(b).mod(this._red?.m || new BN(1));
                }
                redSqr() {
                  return this.sqr().mod(this._red?.m || new BN(1));
                }
                redPow(b) {
                  return this.pow(b).mod(this._red?.m || new BN(1));
                }
              }
              BN.BN = BN;
              BN.wordSize = 26;
              window._BNCache = BN;
              return BN;
            }
            if (moduleName === '@emotion/is-prop-valid') {
              return { default: () => true };
            }

            return emptyModule;
          };
          window.require.main = null;
          console.log('[The New Fuse] CommonJS require() shim installed');
        }
      })();
    </script>

    <!-- Critical CSS for initial render - Dark Theme -->
    <style>
      /* Critical above-the-fold styles - Premium Dark Theme */
      * {
        box-sizing: border-box;
      }

      html {
        color-scheme: dark;
      }

      body {
        font-family:
          'Plus Jakarta Sans',
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          sans-serif;
        margin: 0;
        padding: 0;
        background-color: #020617; /* Slate 950 - Deep Obsidian */
        background-image:
          radial-gradient(circle at 50% 0%, rgba(56, 189, 248, 0.08) 0%, transparent 50%),
          radial-gradient(circle at 100% 0%, rgba(168, 85, 247, 0.05) 0%, transparent 50%),
          linear-gradient(180deg, #020617 0%, #0f172a 100%);
        background-attachment: fixed;
        min-height: 100vh;
        color: #f8fafc; /* Slate 50 */
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #root {
        width: 100%;
        min-height: 100vh;
        background: transparent; /* CRITICAL: Was 'white', now transparent */
      }

      /* Optimized loading spinner - Dark Theme */
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        color: #60a5fa; /* Blue 400 */
        font-size: 18px;
        font-weight: 500;
      }

      .loading::after {
        content: '';
        width: 20px;
        height: 20px;
        margin-left: 10px;
        border: 3px solid #3b82f6;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Prevent layout shift */
      img,
      svg,
      video,
      canvas,
      iframe {
        max-width: 100%;
        height: auto;
      }
    </style>
