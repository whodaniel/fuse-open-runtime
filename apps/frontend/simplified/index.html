<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The New Fuse</title>
    <!-- CRITICAL: Custom Element Guard MUST be first -->
    <script>
      (function () {
        console.log('[The New Fuse] Custom Element Guard (V4-SIMPLIFIED) - Initializing...');
        window.addEventListener('error', function(event) {
          if (event.message && (event.message.includes('mce-autosize-textarea') || event.message.includes('already been defined'))) {
            event.preventDefault(); event.stopImmediatePropagation(); return true;
          }
        }, true);
        try {
          const originalDefine = customElements.define.bind(customElements);
          Object.defineProperty(customElements, 'define', {
            value: function (name, constructor, options) {
              if (customElements.get(name)) return;
              try { originalDefine(name, constructor, options); } catch (e) {}
            },
            configurable: false, writable: false,
          });
          console.log('[The New Fuse] Guard Activated (Simplified)');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.simplified.tsx"></script>
  </body>
</html>
