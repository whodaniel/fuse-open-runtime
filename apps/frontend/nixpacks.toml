# Nixpacks configuration for The New Fuse Frontend
# This builds from the monorepo root, not from apps/frontend subdirectory

[phases.setup]
nixPkgs = ['nodejs_22', 'pnpm']

[phases.install]
# Install from monorepo root to get all workspace dependencies
cmds = ['pnpm install --frozen-lockfile']

[phases.build]
# Build the frontend app
cmds = ['cd apps/frontend && pnpm run build']

[start]
# Serve the built frontend
cmd = 'cd apps/frontend && pnpm start'

