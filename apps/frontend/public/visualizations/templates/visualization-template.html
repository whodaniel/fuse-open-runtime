<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #020617;
      background-image: 
        radial-gradient(at 0% 0%, rgba(30, 58, 138, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.1) 0px, transparent 50%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 40px;
      color: #f8fafc;
    }

    header {
      color: white;
      text-align: left;
      margin-bottom: 32px;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
      width: 100%;
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      background: linear-gradient(to right, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      font-size: 1rem;
      color: #94a3b8;
    }

    main {
      flex: 1;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
      width: 100%;
    }

    #controls {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      align-items: center;
    }

    #controls label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
    }

    #controls select,
    #controls button {
      padding: 10px 18px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      background: rgba(30, 41, 59, 0.5);
      color: white;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #controls select:hover {
      background: rgba(51, 65, 85, 0.8);
      border-color: rgba(255, 255, 255, 0.2);
    }

    #controls button {
      background: #3b82f6;
      border-color: #3b82f6;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }

    #controls button:hover {
      background: #2563eb;
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
    }

    #chart {
      flex: 1;
      position: relative;
      min-height: 500px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    svg {
      width: 100%;
      height: 100%;
    }

    .node {
      cursor: pointer;
    }

    .node rect {
      stroke: rgba(0, 0, 0, 0.3);
      stroke-width: 1px;
      transition: all 0.3s ease;
    }

    .node:hover rect {
      filter: brightness(1.2);
      stroke: rgba(255, 255, 255, 0.5);
    }

    .node text {
      pointer-events: none;
      font-size: 11px;
      font-weight: 700;
      fill: rgba(255, 255, 255, 0.9);
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
    }

    #tooltip {
      position: absolute;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #f8fafc;
      padding: 16px 20px;
      border-radius: 12px;
      font-size: 13px;
      pointer-events: none;
      z-index: 1000;
      opacity: 0;
      transition: all 0.2s ease;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      max-width: 320px;
    }

    #tooltip.visible {
      opacity: 1;
      transform: translate(0, 0) scale(1);
    }

    #tooltip strong {
      color: #60a5fa;
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
      font-weight: 800;
    }

    #tooltip .stat {
      margin: 6px 0;
      display: flex;
      justify-content: space-between;
      color: #94a3b8;
    }

    #tooltip .stat-value {
      color: #f1f5f9;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
    }

    .breadcrumb {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 700;
      color: #64748b;
      margin-bottom: 16px;
      padding: 10px 16px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .breadcrumb span {
      cursor: pointer;
      color: #94a3b8;
      transition: color 0.2s;
    }

    .breadcrumb span:hover {
      color: #ffffff;
    }

    .breadcrumb .separator {
      color: #334155;
      cursor: default;
    }

    {{CUSTOM_CSS}}
  </style>
</head>
<body>
  <header>
    <h1>{{HEADER_TITLE}}</h1>
    <p>{{HEADER_SUBTITLE}}</p>
  </header>

  <main>
    <div id="controls">
      {{CONTROLS_HTML}}
    </div>

    <div id="breadcrumb" class="breadcrumb"></div>

    <div id="chart"></div>
    <div id="tooltip"></div>
  </main>

  <!-- Embedded D3.js Library -->
  <script>
    {{D3_LIBRARY}}
  </script>

  <!-- Embedded Data -->
  <script>
    const VISUALIZATION_DATA = {{DATA_JSON}};
    const CONFIG = {{CONFIG_JSON}};
  </script>

  <!-- Visualization Logic -->
  <script>
    // Configuration
    const config = {
      width: 0,
      height: 0,
      padding: CONFIG.padding || 2,
      topPadding: CONFIG.topPadding || 20,
      colorScheme: CONFIG.colorScheme || 'schemeSet3'
    };

    // State
    let currentRoot = null;
    let currentMetric = CONFIG.defaultMetric || Object.keys(CONFIG.metrics)[0];
    let svg, tooltip, breadcrumb;

    // Color scale
    const colorScale = d3.scaleOrdinal(d3[config.colorScheme]);

    // Initialize
    function init() {
      const container = document.getElementById('chart');
      tooltip = document.getElementById('tooltip');
      breadcrumb = document.getElementById('breadcrumb');

      // Get container dimensions
      const rect = container.getBoundingClientRect();
      config.width = rect.width;
      config.height = rect.height;

      // Create SVG
      svg = d3.select('#chart')
        .append('svg')
        .attr('width', config.width)
        .attr('height', config.height);

      // Setup event listeners
      setupEventListeners();

      // Handle window resize
      window.addEventListener('resize', debounce(() => {
        const rect = container.getBoundingClientRect();
        config.width = rect.width;
        config.height = rect.height;
        svg.attr('width', config.width).attr('height', config.height);
        render(currentRoot || VISUALIZATION_DATA);
      }, 250));

      // Initial render
      render(VISUALIZATION_DATA);
    }

    function setupEventListeners() {
      // Metric selector
      const metricSelect = document.getElementById('sizeMetric');
      if (metricSelect) {
        metricSelect.addEventListener('change', (e) => {
          currentMetric = e.target.value;
          render(currentRoot || VISUALIZATION_DATA);
        });
      }

      // Reset button
      const resetBtn = document.getElementById('resetBtn');
      if (resetBtn) {
        resetBtn.addEventListener('click', () => {
          render(VISUALIZATION_DATA);
        });
      }

      {{CUSTOM_EVENT_LISTENERS}}
    }

    // Main render function
    function render(data) {
      currentRoot = data;

      // Create hierarchy
      const root = d3.hierarchy(data)
        .sum(d => d[currentMetric] || 0)
        .sort((a, b) => b.value - a.value);

      // Create treemap layout
      const treemap = d3.treemap()
        .size([config.width, config.height])
        .padding(config.padding)
        .paddingTop(config.topPadding)
        .round(true);

      treemap(root);

      // Update breadcrumb
      updateBreadcrumb(data);

      // Clear previous content
      svg.selectAll('*').remove();

      // Create groups for each node
      const nodes = svg.selectAll('g')
        .data(root.leaves())
        .join('g')
        .attr('class', 'node')
        .attr('transform', d => `translate(${d.x0},${d.y0})`);

      // Add rectangles
      nodes.append('rect')
        .attr('width', d => d.x1 - d.x0)
        .attr('height', d => d.y1 - d.y0)
        .attr('fill', d => {
          // Color based on top-level category
          let topLevel = d;
          while (topLevel.parent && topLevel.parent.parent) {
            topLevel = topLevel.parent;
          }
          return colorScale(topLevel.data.name);
        })
        .on('click', (event, d) => {
          if (d.parent) {
            render(d.parent.data);
          }
        })
        .on('mouseenter', (event, d) => showTooltip(event, d))
        .on('mousemove', (event) => moveTooltip(event))
        .on('mouseleave', hideTooltip);

      // Add text labels
      nodes.append('text')
        .attr('x', 4)
        .attr('y', 14)
        .text(d => {
          const width = d.x1 - d.x0;
          const height = d.y1 - d.y0;
          if (width > 40 && height > 20) {
            const maxLength = Math.floor(width / 7);
            return d.data.name.length > maxLength
              ? d.data.name.slice(0, maxLength - 3) + '...'
              : d.data.name;
          }
          return '';
        })
        .attr('fill', '#2d3748');

      {{CUSTOM_RENDER_CODE}}
    }

    // Breadcrumb navigation
    function updateBreadcrumb(data) {
      const path = [];
      let current = data;
      path.unshift(current);

      breadcrumb.innerHTML = path.map((item, index) => {
        const isLast = index === path.length - 1;
        const name = item.name === 'root' ? '🏠 Home' : item.name;
        return `
          <span onclick="navigateTo(${index})">${name}</span>
          ${!isLast ? '<span class="separator">›</span>' : ''}
        `;
      }).join('');
    }

    window.navigateTo = function(index) {
      if (index === 0) {
        render(VISUALIZATION_DATA);
      }
    };

    // Tooltip functions
    function showTooltip(event, d) {
      const totalValue = d3.hierarchy(VISUALIZATION_DATA)
        .sum(n => n[currentMetric] || 0).value;
      const percentage = ((d.value / totalValue) * 100).toFixed(2);

      let tooltipContent = `<strong>${d.data.name}</strong>`;

      // Add metrics
      Object.entries(CONFIG.metrics).forEach(([key, label]) => {
        if (d.data[key] !== undefined) {
          const formatter = CONFIG.formatters[key] || ((v) => v);
          tooltipContent += `
            <div class="stat">
              <span>${label}:</span>
              <span class="stat-value">${formatter(d.data[key])}</span>
            </div>
          `;
        }
      });

      tooltipContent += `
        <div class="stat">Percentage: ${percentage}%</div>
        <div class="stat" style="margin-top: 8px; color: #a0aec0; font-size: 11px;">
          Click to zoom out
        </div>
      `;

      tooltip.innerHTML = tooltipContent;
      tooltip.classList.add('visible');
      moveTooltip(event);
    }

    function moveTooltip(event) {
      const x = event.clientX + 15;
      const y = event.clientY + 15;
      tooltip.style.left = x + 'px';
      tooltip.style.top = y + 'px';
    }

    function hideTooltip() {
      tooltip.classList.remove('visible');
    }

    // Utility functions
    function formatBytes(bytes) {
      if (bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return (bytes / Math.pow(k, i)).toFixed(2) + ' ' + sizes[i];
    }

    function formatNumber(num) {
      return num.toLocaleString();
    }

    function debounce(func, wait) {
      let timeout;
      return function executedFunction(...args) {
        const later = () => {
          clearTimeout(timeout);
          func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
      };
    }

    {{CUSTOM_FUNCTIONS}}

    // Start the application
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>

</body>
</html>
