<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TNF Visualizations Templates</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          "Apple Color Emoji", "Segoe UI Emoji";
        background: #0b1020;
        color: #e5e7eb;
      }
      .wrap {
        max-width: 880px;
        margin: 0 auto;
        padding: 48px 20px;
      }
      a {
        color: #93c5fd;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      .card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 20px;
      }
      h1 {
        font-size: 22px;
        margin: 0 0 12px;
      }
      p {
        margin: 0 0 10px;
        color: rgba(229, 231, 235, 0.85);
        line-height: 1.5;
      }
      .muted {
        color: rgba(229, 231, 235, 0.65);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Templates</h1>
        <p class="muted">
          This route exists to prevent dead links in generated visualization docs.
        </p>
        <p>

      </div>
