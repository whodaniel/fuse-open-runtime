[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"
watchPatterns = ["apps/frontend/**"]
# Explicitly disable Nixpacks to force Docker build
nixpacksConfigPath = ""

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[variables]
NODE_ENV = "production"
PORT = "80"