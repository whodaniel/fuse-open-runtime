worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Temporary directories for nginx in non-root environment
    client_body_temp_path /tmp/client_body;
    proxy_temp_path /tmp/proxy;
    fastcgi_temp_path /tmp/fastcgi;
    uwsgi_temp_path /tmp/uwsgi;
    scgi_temp_path /tmp/scgi;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml font/truetype font/opentype application/vnd.ms-fontobject;

    server {
        # CloudRuntime injects PORT env var - envsubst will replace $PORT
        listen $PORT;
        server_name _;
        root /app/dist;
        index index.html;
        absolute_redirect off;
        port_in_redirect off;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

        # Compatibility bridge: legacy frontend calls /api/v1/* while gateway exposes /v1/*.
        location ^~ /api/v1/ {
            rewrite ^/api(/v1/.*)$ $1 break;
            proxy_pass $BACKEND_URL;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $proxy_host;
            proxy_ssl_server_name on;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # Compatibility bridge: legacy auth calls /api/auth/* while gateway exposes /v1/auth/*.
        location ^~ /api/auth/ {
            rewrite ^/api/auth/(.*)$ /v1/auth/$1 break;
            proxy_pass $BACKEND_URL;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $proxy_host;
            proxy_ssl_server_name on;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # Legacy admin UI aliases under /api/admin/* should render the SPA route,
        # not proxy as backend API calls.
        location = /api/admin/database {
            try_files $uri /app.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        location = /api/admin/features {
            try_files $uri /app.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        location ~* ^/api/admin/features/[^/]+/evaluate$ {
            try_files $uri /app.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # Proxy API requests to backend service
        # Backend URL should be set via environment variable or internal CloudRuntime networking
        location /api {
            proxy_pass $BACKEND_URL;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $proxy_host;
            proxy_ssl_server_name on;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # Unified API Gateway versioned routes
        location /v1 {
            proxy_pass $BACKEND_URL;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $proxy_host;
            proxy_ssl_server_name on;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # Proxy WebSocket connections
        location /ws {
            proxy_pass $BACKEND_URL;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $proxy_host;
            proxy_ssl_server_name on;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

  # Serve marketing landing only on the root path.
  # On the landing domain (thenewfuse.com), always serve index.html.
  # On the app subdomain, functional routes get app.html (SPA).
  location = / {
    try_files /index.html =404;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  location = /index.html {
    try_files /index.html =404;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Landing page routes: serve index.html (static marketing page)
  # These paths should NOT load the SPA (app.html)
  location ~* ^/(community|support|contact|brand|design-system|blog|about|membership|visualizations|connect|landing|home)$ {
    try_files $uri /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  location ~* ^/(legal)/ {
    try_files $uri /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Handle client-side routing for SPA app routes.
  # IMPORTANT: non-static paths must resolve to app.html, not index.html,
  # so route pages render actual React views instead of the landing page.
  location / {
    try_files $uri /app.html;

    # Prevent browser download prompts
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

        # Force-clear stale browser cache/storage for auth entry routes.
        # This prevents users from getting stuck on old hashed bundles after deploys.
        location ~* ^/(login|auth/login)$ {
            try_files $uri /app.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Clear-Site-Data "\"cache\", \"storage\"" always;
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
