<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Flow - Algorithmic Art</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          'Poppins',
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        color: #333;
      }

      header {
        text-align: center;
        margin-bottom: 20px;
        color: white;
      }

      h1 {
        font-family: 'Lora', serif;
        font-size: 2.5rem;
        font-weight: 600;
        margin-bottom: 10px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
      }

      .subtitle {
        font-size: 1.1rem;
        opacity: 0.9;
        font-weight: 300;
      }

      .container {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        justify-content: center;
        align-items: flex-start;
        max-width: 1400px;
        width: 100%;
      }

      #canvas-container {
        background: white;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        padding: 10px;
        flex-shrink: 0;
      }

      canvas {
        display: block;
        border-radius: 8px;
      }

      .controls {
        background: white;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        padding: 20px;
        min-width: 300px;
        max-width: 350px;
        flex: 1;
      }

      .control-group {
        margin-bottom: 20px;
      }

      .control-group label {
        display: block;
        font-weight: 500;
        margin-bottom: 8px;
        color: #444;
      }

      .control-group input[type='range'] {
        width: 100%;
        height: 6px;
        border-radius: 3px;
        background: #e0e0e0;
        outline: none;
        -webkit-appearance: none;
        margin-bottom: 8px;
      }

      .control-group input[type='range']::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #667eea;
        cursor: pointer;
        transition: all 0.2s;
      }

      .control-group input[type='range']::-webkit-slider-thumb:hover {
        background: #764ba2;
        transform: scale(1.2);
      }

      .control-group input[type='range']::-moz-range-thumb {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #667eea;
        cursor: pointer;
        border: none;
        transition: all 0.2s;
      }

      .control-group input[type='range']::-moz-range-thumb:hover {
        background: #764ba2;
        transform: scale(1.2);
      }

      .value-display {
        display: inline-block;
        background: #f0f0f0;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 0.9rem;
        color: #666;
        min-width: 60px;
        text-align: center;
      }

      .button-group {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 20px;
      }

      button {
        flex: 1;
        min-width: 80px;
        padding: 10px 16px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        font-family: 'Poppins', sans-serif;
      }

      button:hover {
        background: #764ba2;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
      }

      button:active {
        transform: translateY(0);
      }

      .seed-section {
        background: #f8f9fa;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
      }

      .seed-controls {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-top: 10px;
      }

      .seed-display {
        font-size: 1.2rem;
        font-weight: 600;
        color: #667eea;
        min-width: 80px;
        text-align: center;
      }

      .seed-input {
        flex: 1;
        padding: 8px;
        border: 2px solid #e0e0e0;
        border-radius: 6px;
        font-size: 1rem;
        text-align: center;
        font-family: 'Poppins', sans-serif;
      }

      .seed-input:focus {
        outline: none;
        border-color: #667eea;
      }

      @media (max-width: 768px) {
        .container {
          flex-direction: column;
          align-items: center;
        }

        h1 {
          font-size: 2rem;
        }

        .controls {
          max-width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Neon Flow</h1>
      <p class="subtitle">Algorithmic Art with Flowing Lines and Neon Glow</p>
    </header>

    <div class="container">
      <div id="canvas-container"></div>
      <div class="controls">
        <div class="seed-section">
          <label>Seed: <span class="seed-display" id="seed-display">42</span></label>
          <div class="seed-controls">
            <button id="prev-seed">Prev</button>
            <button id="next-seed">Next</button>
            <button id="random-seed">Random</button>
            <input
              type="number"
              class="seed-input"
              id="seed-input"
              value="42"
              min="1"
              max="99999"
            />
            <button id="jump-seed">Go</button>
          </div>
        </div>

        <div class="control-group">
          <label
            >Flow Strength: <span class="value-display" id="flow-strength-value">0.02</span></label
          >
          <input type="range" id="flow-strength" min="0.005" max="0.05" step="0.001" value="0.02" />
        </div>

        <div class="control-group">
          <label
            >Particle Count:
            <span class="value-display" id="particle-count-value">5000</span></label
          >
          <input type="range" id="particle-count" min="1000" max="10000" step="500" value="5000" />
        </div>

        <div class="control-group">
          <label>Line Length: <span class="value-display" id="line-length-value">2</span></label>
          <input type="range" id="line-length" min="0.5" max="5" step="0.1" value="2" />
        </div>

        <div class="control-group">
          <label>Noise Scale: <span class="value-display" id="noise-scale-value">50</span></label>
          <input type="range" id="noise-scale" min="10" max="200" step="5" value="50" />
        </div>

        <div class="control-group">
          <label>Noise Speed: <span class="value-display" id="noise-speed-value">0.01</span></label>
          <input type="range" id="noise-speed" min="0.001" max="0.05" step="0.001" value="0.01" />
        </div>

        <div class="control-group">
          <label
            >Glow Intensity: <span class="value-display" id="glow-intensity-value">0.1</span></label
          >
          <input type="range" id="glow-intensity" min="0.01" max="0.3" step="0.01" value="0.1" />
        </div>

        <div class="button-group">
          <button id="regenerate">Regenerate</button>
          <button id="reset">Reset</button>
          <button id="download">Download PNG</button>
        </div>
      </div>
    </div>

    <script>
      // Algorithm parameters
      let params = {
        seed: 42,
        flowStrength: 0.02,
        particleCount: 5000,
        lineLength: 2,
        noiseScale: 50,
        noiseSpeed: 0.01,
        glowIntensity: 0.1,
      };

      // Particle system
      let particles = [];
      let time = 0;

      // Color palette
      const colors = {
        background: '#0a0a0f',
        neonBlue: '#00f3ff',
        neonPurple: '#8a2be2',
        neonPink: '#ff00ff',
      };

      // Particle class
      class Particle {
        constructor(x, y) {
          this.pos = createVector(x, y);
          this.vel = createVector(0, 0);
          this.acc = createVector(0, 0);
          this.maxSpeed = 2;
          this.hue = map(x, 0, width, 180, 280);
        }

        update() {
          // Get flow field force
          const noiseVal = noise(
            this.pos.x / params.noiseScale,
            this.pos.y / params.noiseScale,
            time
          );
          const angle = noiseVal * TWO_PI * 4;
          const force = p5.Vector.fromAngle(angle);
          force.setMag(params.flowStrength);

          this.acc.add(force);
          this.vel.add(this.acc);
          this.vel.limit(this.maxSpeed);
          this.pos.add(this.vel);
          this.acc.mult(0);

          // Wrap around edges
          if (this.pos.x < 0) this.pos.x = width;
          if (this.pos.x > width) this.pos.x = 0;
          if (this.pos.y < 0) this.pos.y = height;
          if (this.pos.y > height) this.pos.y = 0;
        }

        draw() {
          stroke(this.hue, 100, 100, 20);
          strokeWeight(0.5);
          line(
            this.pos.x,
            this.pos.y,
            this.pos.x + this.vel.x * params.lineLength,
            this.pos.y + this.vel.y * params.lineLength
          );
        }
      }

      // Initialize particles
      function initParticles() {
        particles = [];
        for (let i = 0; i < params.particleCount; i++) {
          particles.push(new Particle(random(width), random(height)));
        }
      }

      // Setup
      function setup() {
        const canvas = createCanvas(1024, 1024);
        canvas.parent('canvas-container');
        colorMode(HSB, 360, 100, 100, 1);
        noiseSeed(params.seed);
        randomSeed(params.seed);
        initParticles();
        background(colors.background);
      }

      // Draw
      function draw() {
        // Semi-transparent overlay for trail effect
        background(colors.background, params.glowIntensity);

        // Update and draw particles
        for (let particle of particles) {
          particle.update();
          particle.draw();
        }

        time += params.noiseSpeed;
      }

      // UI Event Handlers
      document.getElementById('flow-strength').addEventListener('input', (e) => {
        params.flowStrength = parseFloat(e.target.value);
        document.getElementById('flow-strength-value').textContent = e.target.value;
      });

      document.getElementById('particle-count').addEventListener('input', (e) => {
        params.particleCount = parseInt(e.target.value);
        document.getElementById('particle-count-value').textContent = e.target.value;
        initParticles();
      });

      document.getElementById('line-length').addEventListener('input', (e) => {
        params.lineLength = parseFloat(e.target.value);
        document.getElementById('line-length-value').textContent = e.target.value;
      });

      document.getElementById('noise-scale').addEventListener('input', (e) => {
        params.noiseScale = parseInt(e.target.value);
        document.getElementById('noise-scale-value').textContent = e.target.value;
      });

      document.getElementById('noise-speed').addEventListener('input', (e) => {
        params.noiseSpeed = parseFloat(e.target.value);
        document.getElementById('noise-speed-value').textContent = e.target.value;
      });

      document.getElementById('glow-intensity').addEventListener('input', (e) => {
        params.glowIntensity = parseFloat(e.target.value);
        document.getElementById('glow-intensity-value').textContent = e.target.value;
      });

      document.getElementById('prev-seed').addEventListener('click', () => {
        params.seed = Math.max(1, params.seed - 1);
        updateSeedDisplay();
        regenerate();
      });

      document.getElementById('next-seed').addEventListener('click', () => {
        params.seed = Math.min(99999, params.seed + 1);
        updateSeedDisplay();
        regenerate();
      });

      document.getElementById('random-seed').addEventListener('click', () => {
        params.seed = Math.floor(random(1, 100000));
        updateSeedDisplay();
        regenerate();
      });

      document.getElementById('jump-seed').addEventListener('click', () => {
        const input = document.getElementById('seed-input');
        const seed = parseInt(input.value);
        if (seed >= 1 && seed <= 99999) {
          params.seed = seed;
          updateSeedDisplay();
          regenerate();
        }
      });

      document.getElementById('seed-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          document.getElementById('jump-seed').click();
        }
      });

      document.getElementById('regenerate').addEventListener('click', regenerate);

      document.getElementById('reset').addEventListener('click', () => {
        params = {
          seed: 42,
          flowStrength: 0.02,
          particleCount: 5000,
          lineLength: 2,
          noiseScale: 50,
          noiseSpeed: 0.01,
          glowIntensity: 0.1,
        };

        document.getElementById('flow-strength').value = 0.02;
        document.getElementById('particle-count').value = 5000;
        document.getElementById('line-length').value = 2;
        document.getElementById('noise-scale').value = 50;
        document.getElementById('noise-speed').value = 0.01;
        document.getElementById('glow-intensity').value = 0.1;

        document.getElementById('flow-strength-value').textContent = '0.02';
        document.getElementById('particle-count-value').textContent = '5000';
        document.getElementById('line-length-value').textContent = '2';
        document.getElementById('noise-scale-value').textContent = '50';
        document.getElementById('noise-speed-value').textContent = '0.01';
        document.getElementById('glow-intensity-value').textContent = '0.1';

        updateSeedDisplay();
        regenerate();
      });

      document.getElementById('download').addEventListener('click', () => {
        saveCanvas('neon-flow-seed-' + params.seed, 'png');
      });

      function updateSeedDisplay() {
        document.getElementById('seed-display').textContent = params.seed;
        document.getElementById('seed-input').value = params.seed;
      }

      function regenerate() {
        noiseSeed(params.seed);
        randomSeed(params.seed);
        time = 0;
        initParticles();
        background(colors.background);
      }

      // Initial seed display update
      updateSeedDisplay();
    </script>
  </body>
</html>
