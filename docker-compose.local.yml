# ============================================================================
# Docker Compose - Local Development Environment
# ============================================================================
# This compose file sets up the entire application stack for local development
# and testing of the optimized Docker images.
#
# Usage:
#   Start all services:       docker-compose -f docker-compose.local.yml up
#   Build and start:          docker-compose -f docker-compose.local.yml up --build
#   Start specific service:   docker-compose -f docker-compose.local.yml up frontend
#   Stop all services:        docker-compose -f docker-compose.local.yml down
#   View logs:                docker-compose -f docker-compose.local.yml logs -f
#
# Services:
#   - frontend (port 8080)
#   - api-gateway (port 3002)
#   - api (port 3001)
#   - backend (port 3003)
#   - postgres (port 5432) - if needed
#   - redis (port 6379) - if needed
# ============================================================================

version: "3.8"

services:
  # ==========================================================================
  # Frontend Service
  # ==========================================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.railway
      cache_from:
        - the-new-fuse/frontend:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
        - SERVICE_PATH=frontend
    image: the-new-fuse/frontend:local
    container_name: tnf-frontend
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - tnf-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "com.thenewfuse.service=frontend"
      - "com.thenewfuse.description=React frontend application"

  # ==========================================================================
  # API Gateway Service
  # ==========================================================================
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.railway
      cache_from:
        - the-new-fuse/api-gateway:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
        - SERVICE_PATH=api-gateway
    image: the-new-fuse/api-gateway:local
    container_name: tnf-api-gateway
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/thenewfuse}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tnf-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "com.thenewfuse.service=api-gateway"
      - "com.thenewfuse.description=API Gateway service"

  # ==========================================================================
  # API Service
  # ==========================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile.railway
      cache_from:
        - the-new-fuse/api:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
        - SERVICE_PATH=api
    image: the-new-fuse/api:local
    container_name: tnf-api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/thenewfuse}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tnf-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "com.thenewfuse.service=api"
      - "com.thenewfuse.description=API service"

  # ==========================================================================
  # Backend Service
  # ==========================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.railway
      cache_from:
        - the-new-fuse/backend:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
        - SERVICE_PATH=backend
    image: the-new-fuse/backend:local
    container_name: tnf-backend
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
      - PORT=3003
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/thenewfuse}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tnf-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "com.thenewfuse.service=backend"
      - "com.thenewfuse.description=Backend service"

  # ==========================================================================
  # PostgreSQL Database
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: tnf-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-thenewfuse}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - tnf-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "com.thenewfuse.service=postgres"
      - "com.thenewfuse.description=PostgreSQL database"

  # ==========================================================================
  # Redis Cache
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: tnf-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - tnf-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "com.thenewfuse.service=redis"
      - "com.thenewfuse.description=Redis cache"

# ============================================================================
# Networks
# ============================================================================
networks:
  tnf-network:
    name: the-new-fuse-network
    driver: bridge

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres-data:
    name: tnf-postgres-data
    driver: local
  redis-data:
    name: tnf-redis-data
    driver: local

# ============================================================================
# Notes
# ============================================================================
# 1. Environment variables can be set in a .env.docker file
# 2. To use BuildKit for better caching, set: DOCKER_BUILDKIT=1
# 3. For production-like testing, this setup mimics the Railway deployment
# 4. Database migrations should be run separately before starting services
# 5. For development with hot-reload, use the regular pnpm dev scripts instead
# ============================================================================
