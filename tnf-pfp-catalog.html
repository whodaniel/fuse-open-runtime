<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TNF PFP Studio Redirect</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #070b14;
        --panel: #0f1725;
        --line: rgba(148, 163, 184, 0.25);
        --accent: #22d3ee;
        --accent2: #fb923c;
        --text: #e2e8f0;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", "Satoshi", "Segoe UI", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 20% 0%, rgba(34, 211, 238, 0.2), transparent 40%),
          radial-gradient(circle at 90% 0%, rgba(251, 146, 60, 0.18), transparent 35%),
          var(--bg);
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(760px, 100%);
        border: 1px solid var(--line);
        border-radius: 20px;
        background: linear-gradient(140deg, rgba(15, 23, 37, 0.9), rgba(8, 12, 20, 0.92));
        padding: 28px;
      }
      h1 { margin: 0 0 10px; font-size: 28px; }
      p { margin: 0 0 16px; line-height: 1.5; color: #cbd5e1; }
      .actions { display: flex; flex-wrap: wrap; gap: 10px; }
      a {
        text-decoration: none;
        color: #08111a;
        background: linear-gradient(120deg, var(--accent), #67e8f9);
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 700;
      }
      a.secondary {
        color: var(--text);
        background: transparent;
        border: 1px solid var(--line);
      }
      code {
        display: inline-block;
        margin-top: 12px;
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid var(--line);
        padding: 6px 8px;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>TNF PFP Studio Has Moved Into The SaaS App</h1>
      <p>
        This legacy static file is now a bridge. Use the in-app routes so regeneration, batch
        operations, prompt overrides, and cloud persistence all work inside deployment.
      </p>
      <div class="actions">
        <a href="/ai-portal/pfp-studio">Open PFP Studio</a>
        <a class="secondary" href="/ai-portal/pfp-prompts">Open Prompt Catalog</a>
      </div>
      <code>/ai-portal/pfp-studio</code>
    </main>
    <script>
      if (location.hostname.endsWith('thenewfuse.com')) {
        location.replace('/ai-portal/pfp-studio');
      }
    </script>
  </body>
</html>
