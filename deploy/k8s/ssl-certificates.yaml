# SSL/TLS Certificate Configuration for The New Fuse
# Uses cert-manager for automated certificate management

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    security.component: certificate-issuer
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@thenewfuse.com
    privateKeySecretRef:
      name: letsencrypt-prod-private-key
    solvers:
      - http01:
          ingress:
            class: nginx
            podTemplate:
              spec:
                nodeSelector:
                  "kubernetes.io/os": linux
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  labels:
    security.component: certificate-issuer
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@thenewfuse.com
    privateKeySecretRef:
      name: letsencrypt-staging-private-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
# Self-signed ClusterIssuer for development/internal services
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
  labels:
    security.component: certificate-issuer
spec:
  selfSigned: {}
---
# Certificate for API domain
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: api-tls-certificate
  namespace: production
  labels:
    app: fuse-api
    security.component: tls-certificate
spec:
  secretName: api-tls-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - api.thenewfuse.com
    - api-staging.thenewfuse.com
  usages:
    - digital signature
    - key encipherment
    - server auth
  duration: 2160h # 90 days
  renewBefore: 360h # 15 days
---
# Certificate for Frontend domain
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: frontend-tls-certificate
  namespace: production
  labels:
    app: fuse-frontend
    security.component: tls-certificate
spec:
  secretName: frontend-tls-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - app.thenewfuse.com
    - www.thenewfuse.com
    - thenewfuse.com
  usages:
    - digital signature
    - key encipherment
    - server auth
  duration: 2160h # 90 days
  renewBefore: 360h # 15 days
---
# Certificate for Monitoring services
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: monitoring-tls-certificate
  namespace: production
  labels:
    app: monitoring
    security.component: tls-certificate
spec:
  secretName: monitoring-tls-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - monitoring.thenewfuse.com
    - grafana.thenewfuse.com
    - prometheus.thenewfuse.com
  usages:
    - digital signature
    - key encipherment
    - server auth
  duration: 2160h # 90 days
  renewBefore: 360h # 15 days
