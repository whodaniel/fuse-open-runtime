# Root Nixpacks config for The New Fuse
# Builds minimal runtime and starts the Express server

[phases.setup]
nixPkgs = ["nodejs_20", "pnpm"]

[variables]
NODE_VERSION = "20"

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
# Optional: build workspaces if needed (leave empty for API-only)
cmds = []

[start]
cmd = "node server.js"