<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 400px;
            min-height: 500px;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .header {
            padding: 20px;
            text-align: center;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        
        .header h1 {
            margin: 0 0 10px 0;
            font-size: 1.5em;
            font-weight: 700;
        }
        
        .content {
            padding: 20px;
        }
        
        .btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin: 10px 0;
            transition: transform 0.2s ease;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
        }
        
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .results {
            background: rgba(255,255,255,0.95);
            color: #333;
            border-radius: 15px;
            padding: 15px;
            margin: 10px 0;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .tab-item {
            background: #f8f9ff;
            padding: 10px;
            border-radius: 8px;
            margin: 8px 0;
            border-left: 3px solid #667eea;
        }
        
        .tab-title {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .tab-summary {
            font-size: 0.9em;
            color: #666;
        }
        
        .connections {
            background: #fff3cd;
            border-left: 3px solid #ffc107;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }
        
        .connections h4 {
            margin: 0 0 10px 0;
            color: #856404;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔗 Tab Connections</h1>
        <p>Find connections across your tabs</p>
    </div>
    
    <div class="content">
        <button id="analyzeBtn" class="btn">🧠 Analyze Open Tabs</button>
        <button id="summaryBtn" class="btn">📝 Get Summaries</button>
        
        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Analyzing tabs...</p>
        </div>
        
        <div id="results"></div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
