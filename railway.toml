[build]
builder = "NIXPACKS"
nixpacksConfigPath = "apps/frontend/nixpacks.toml"
# Watch only frontend app and shared packages, ignore docs and other changes
watchPaths = ["apps/frontend/**", "packages/**"]
# Note: Railway may still deploy on any push; watchPaths is advisory only

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyMaxRetries = 10
restartPolicyType = "ON_FAILURE"
