# railway.toml for The New Fuse Monorepo
# NOTE: Do NOT set global [build] section - each service specifies its own builder

# API Gateway Service (uses Docker)
[services.api-gateway]
builder = "DOCKERFILE"
build = { dockerfilePath = "Dockerfile.railway", dockerBuildArgs = { SERVICE_PATH = "api-gateway", SERVICE_NAME = "@the-new-fuse/api-gateway" } }
deploy = { healthcheckPath = "/health" }

# API Service (uses Docker)
[services.api]
builder = "DOCKERFILE"
build = { dockerfilePath = "Dockerfile.railway", dockerBuildArgs = { SERVICE_PATH = "api", SERVICE_NAME = "@the-new-fuse/api-server" } }
deploy = { healthcheckPath = "/health" }
startCommand = "./run-service.sh"
restartPolicyType = "ON_FAILURE"
# Redis service is linked - REDIS_URL will be automatically provided by Railway

# Backend Service (uses Docker)
[services.backend]
builder = "DOCKERFILE"
build = { dockerfilePath = "Dockerfile.railway", dockerBuildArgs = { SERVICE_PATH = "backend", SERVICE_NAME = "@the-new-fuse/backend-app" } }
deploy = { healthcheckPath = "/health" }
# Redis service is linked - REDIS_URL will be automatically provided by Railway

# Frontend Service (uses root Dockerfile)
# IMPORTANT: Make sure "Root Directory" is NOT set in Railway UI
# This service MUST use Docker to properly build and serve production files
[services.TheNewFuse]
builder = "DOCKERFILE"
[services.TheNewFuse.build]
dockerfilePath = "Dockerfile"
# Build context is from repository root (not a subdirectory)
# This allows access to workspace files like pnpm-lock.yaml
watchPaths = ["apps/frontend/**", "packages/**"]
[services.TheNewFuse.deploy]
healthcheckPath = "/"

# Fallback for 'frontend' or "Frontend Application" service name
# Ensure production mode - NEVER run dev server in production
[services.frontend]
builder = "DOCKERFILE"
[services.frontend.build]
dockerfilePath = "Dockerfile"
watchPaths = ["apps/frontend/**", "packages/**"]
[services.frontend.deploy]
healthcheckPath = "/"

# Another fallback for "Frontend Application" service name (with space)
[services."Frontend Application"]
builder = "DOCKERFILE"
[services."Frontend Application".deploy]
healthcheckPath = "/"

[services."Frontend Application".build]
dockerfilePath = "Dockerfile"
watchPaths = ["apps/frontend/**", "packages/**"]
dockerBuildArgs = { VITE_FIREBASE_API_KEY = "${{VITE_FIREBASE_API_KEY}}", VITE_FIREBASE_AUTH_DOMAIN = "${{VITE_FIREBASE_AUTH_DOMAIN}}", VITE_FIREBASE_PROJECT_ID = "${{VITE_FIREBASE_PROJECT_ID}}", VITE_FIREBASE_STORAGE_BUCKET = "${{VITE_FIREBASE_STORAGE_BUCKET}}", VITE_FIREBASE_MESSAGING_SENDER_ID = "${{VITE_FIREBASE_MESSAGING_SENDER_ID}}", VITE_FIREBASE_APP_ID = "${{VITE_FIREBASE_APP_ID}}" }

# TNF Cloud Sandbox (MCP Server for Tauri bridge)
# Uses shared Dockerfile.railway from repository root
[services.tnf-cloud-sandbox]
builder = "DOCKERFILE"
[services.tnf-cloud-sandbox.build]
dockerfilePath = "Dockerfile.railway"
dockerBuildArgs = { SERVICE_PATH = "cloud-sandbox", SERVICE_NAME = "@the-new-fuse/cloud-sandbox" }
watchPaths = ["apps/cloud-sandbox/**", "packages/**"]
[services.tnf-cloud-sandbox.deploy]
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"

# Secure Cloud Sandbox V2 - Production deployment with RBAC and multi-tenant isolation
[services.tnf-cloud-sandbox-v2]
builder = "DOCKERFILE"
[services.tnf-cloud-sandbox-v2.build]
dockerfilePath = "apps/cloud-sandbox/Dockerfile.railway"
watchPaths = ["apps/cloud-sandbox/**", "packages/database/**", "packages/types/**"]
[services.tnf-cloud-sandbox-v2.deploy]
healthcheckPath = "/health"
healthcheckTimeout = 10
startCommand = "/app/start.sh"
restartPolicyType = "ON_FAILURE"

# Core Vector DB Service
[services.core-vector-db]
builder = "DOCKERFILE"
[services.core-vector-db.build]
dockerfilePath = "Dockerfile.railway"
dockerBuildArgs = { SERVICE_PATH = "core-vector-db", SERVICE_NAME = "@the-new-fuse/core-vector-db", SERVICE_ROOT = "packages" }
watchPaths = ["packages/core-vector-db/**", "packages/core/**"]
[services.core-vector-db.deploy]
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
