# Railway monorepo configuration
# This file defines default settings for the monorepo

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckTimeout = 300
restartPolicyMaxRetries = 10
restartPolicyType = "ON_FAILURE"

[[services]]
name = "api-gateway"
image = "api-gateway"
startCommand = "node dist/main.js"
healthcheckPath = "/health"
port = 3002

[[services]]
name = "frontend"
image = "frontend"
startCommand = "node server.js"
healthcheckPath = "/"
port = 3000

[[services]]
name = "backend"
image = "backend"
startCommand = "node dist/main.js"
healthcheckPath = "/health"
port = 3003
