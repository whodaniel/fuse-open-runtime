# railway.toml for The New Fuse Monorepo
# NOTE: Do NOT set global [build] section - each service specifies its own builder

# API Gateway Service (uses Docker)
[services.api-gateway]
builder = "DOCKERFILE"
build = { dockerfilePath = "Dockerfile.railway", dockerBuildArgs = { SERVICE_PATH = "api-gateway", SERVICE_NAME = "@the-new-fuse/api-gateway" } }
deploy = { healthcheckPath = "/health" }

# API Service (uses Docker)
[services.api]
builder = "DOCKERFILE"
build = { dockerfilePath = "Dockerfile.railway", dockerBuildArgs = { SERVICE_PATH = "api", SERVICE_NAME = "@the-new-fuse/api-server" } }
deploy = { healthcheckPath = "/health" }

# Backend Service (uses Docker)
[services.backend]
builder = "DOCKERFILE"
build = { dockerfilePath = "Dockerfile.railway", dockerBuildArgs = { SERVICE_PATH = "backend", SERVICE_NAME = "@the-new-fuse/backend-app" } }
deploy = { healthcheckPath = "/health" }

# Frontend Service (uses Dockerfile to properly handle monorepo)
# IMPORTANT: Make sure "Root Directory" is NOT set in Railway UI
[services.TheNewFuse]
builder = "DOCKERFILE"
[services.TheNewFuse.build]
dockerfilePath = "apps/frontend/Dockerfile"
# Build context is from repository root (not a subdirectory)
# This allows access to workspace files like pnpm-lock.yaml
watchPaths = ["apps/frontend/**", "packages/**"]

# Fallback for 'frontend' service name just in case
[services.frontend]
buildCommand = "NODE_ENV=production pnpm --filter @the-new-fuse/frontend-app build --mode production"
startCommand = "cd apps/frontend && NODE_ENV=production pnpm start"
restartPolicyType = "ON_FAILURE"
