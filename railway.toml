# railway.toml for The New Fuse Monorepo
# NOTE: Do NOT set global [build] section - each service specifies its own builder

# API Gateway Service (uses Docker)
[services.api-gateway]
builder = "DOCKERFILE"
build = { dockerfilePath = "Dockerfile.railway", dockerBuildArgs = { SERVICE_PATH = "api-gateway", SERVICE_NAME = "@the-new-fuse/api-gateway" } }
deploy = { healthcheckPath = "/health" }

# API Service (uses Docker)
[services.api]
builder = "DOCKERFILE"
build = { dockerfilePath = "Dockerfile.railway", dockerBuildArgs = { SERVICE_PATH = "api", SERVICE_NAME = "@the-new-fuse/api-server" } }
deploy = { healthcheckPath = "/health" }

# Backend Service (uses Docker)
[services.backend]
builder = "DOCKERFILE"
build = { dockerfilePath = "Dockerfile.railway", dockerBuildArgs = { SERVICE_PATH = "backend", SERVICE_NAME = "@the-new-fuse/backend-app" } }
deploy = { healthcheckPath = "/health" }

# Frontend Service (uses Nixpacks with custom config in apps/frontend/nixpacks.toml)
[services.TheNewFuse]
builder = "NIXPACKS"
nixpacksConfigPath = "apps/frontend"

# Nixpacks will read nixpacks.toml from apps/frontend/ directory
# which specifies: build command, start command, and Node.js setup
restartPolicyType = "ON_FAILURE"

# Fallback for 'frontend' service name just in case (uses Nixpacks)
[services.frontend]
builder = "NIXPACKS"
buildCommand = "pnpm --filter @the-new-fuse/frontend-app build"
startCommand = "/bin/sh -c \"cd apps/frontend && npx --yes serve dist -p ${PORT:-3000} -s\""
restartPolicyType = "ON_FAILURE"
