# railway.toml for The New Fuse Monorepo

[build]
builder = "DOCKERFILE"
installCommand = "pnpm install" # Explicitly use pnpm install
buildCommand = "pnpm --filter {service.name} build"

# API Gateway Service
[services.api-gateway]
build = { dockerfilePath = "Dockerfile.railway", dockerBuildArgs = { SERVICE_PATH = "api-gateway", SERVICE_NAME = "@the-new-fuse/api-gateway" } }
deploy = { healthcheckPath = "/health" }

# API Service
[services.api]
build = { dockerfilePath = "Dockerfile.railway", dockerBuildArgs = { SERVICE_PATH = "api", SERVICE_NAME = "@the-new-fuse/api-server" } }
deploy = { healthcheckPath = "/health" }

# Backend Service
[services.backend]
build = { dockerfilePath = "Dockerfile.railway", dockerBuildArgs = { SERVICE_PATH = "backend", SERVICE_NAME = "@the-new-fuse/backend-app" } }
deploy = { healthcheckPath = "/health" }

[services.TheNewFuse]
# 1. Build Phase: Goes into the folder, installs, and builds.
#    (This runs in the build environment where it has full permissions)
buildCommand = "cd apps/frontend && pnpm install && pnpm run build"

# 2. Start Phase: Just serves the files created in the build phase.
#    (This runs in the runtime environment)
startCommand = "/bin/sh -c \"cd apps/frontend && npx --yes http-server dist -p 3000 -a 0.0.0.0\""

# 3. Networking: Matches the port we hardcoded above
restartPolicyType = "ON_FAILURE"
