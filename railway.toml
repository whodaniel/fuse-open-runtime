# Railway Configuration for The New Fuse Monorepo
# This file configures all services in the monorepo

[build]
builder = "DOCKERFILE"

# API Gateway Service
[services.api-gateway.build]
dockerfilePath = "apps/api-gateway/Dockerfile"
watchPaths = ["apps/api-gateway/**", "packages/**"]

[services.api-gateway.deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyMaxRetries = 10
restartPolicyType = "ON_FAILURE"

# API Service
[services.api.build]
dockerfilePath = "apps/api/Dockerfile"
watchPaths = ["apps/api/**", "packages/**", "prisma/**"]

[services.api.deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyMaxRetries = 10
restartPolicyType = "ON_FAILURE"

# Backend Service
[services.backend.build]
dockerfilePath = "apps/backend/Dockerfile"
watchPaths = ["apps/backend/**", "packages/**", "prisma/**"]

[services.backend.deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyMaxRetries = 10
restartPolicyType = "ON_FAILURE"

# Frontend Service
[services.frontend.build]
dockerfilePath = "apps/frontend/Dockerfile"
watchPaths = ["apps/frontend/**", "packages/**"]

[services.frontend.deploy]
healthcheckTimeout = 300
restartPolicyMaxRetries = 10
restartPolicyType = "ON_FAILURE"
