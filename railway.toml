# railway.toml for The New Fuse Monorepo

[build]
builder = "DOCKERFILE"
installCommand = "pnpm install" # Explicitly use pnpm install
buildCommand = "pnpm --filter {service.name} build"

# API Gateway Service
[services.api-gateway]
build = { dockerfilePath = "Dockerfile.railway", dockerBuildArgs = { SERVICE_PATH = "apps/api-gateway" } }
deploy = { healthcheckPath = "/health" }

# Backend Service
[services.backend]
build = { dockerfilePath = "Dockerfile.railway", dockerBuildArgs = { SERVICE_PATH = "apps/backend" } }
deploy = { healthcheckPath = "/health" }

# Frontend Service
[services.frontend]
build = { dockerfilePath = "Dockerfile.railway", dockerBuildArgs = { SERVICE_PATH = "apps/frontend" } }
deploy = { healthcheckPath = "/" }
