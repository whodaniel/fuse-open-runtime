# Railway Configuration for The New Fuse
# Multi-service deployment with PostgreSQL and Redis

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile.production"

[deploy]
numReplicas = 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/api/health"
healthcheckTimeout = 300

# Services configuration
[[services]]
name = "api"
dockerfile = "apps/api/Dockerfile.production"
port = 3001
healthcheck = "/health"

[[services.env]]
DATABASE_URL = "${{POSTGRES.DATABASE_URL}}"
REDIS_URL = "${{REDIS.REDIS_URL}}"
NODE_ENV = "production"
PORT = "3000"

[[services]]
name = "api-gateway"
dockerfile = "apps/api-gateway/Dockerfile.production"
port = 3002
healthcheck = "/health"

[[services.env]]
DATABASE_URL = "${{POSTGRES.DATABASE_URL}}"
REDIS_URL = "${{REDIS.REDIS_URL}}"
NODE_ENV = "production"
PORT = "3002"
API_URL = "${{API.RAILWAY_PRIVATE_DOMAIN}}"

[[services]]
name = "backend"
dockerfile = "apps/backend/Dockerfile.production"
port = 3004
healthcheck = "/health"

[[services.env]]
DATABASE_URL = "${{POSTGRES.DATABASE_URL}}"
REDIS_URL = "${{REDIS.REDIS_URL}}"
NODE_ENV = "production"
PORT = "3004"

[[services]]
name = "frontend"
dockerfile = "apps/frontend/Dockerfile.production"
port = 80
healthcheck = "/health"

[[services.env]]
VITE_API_URL = "${{API_GATEWAY.RAILWAY_PUBLIC_DOMAIN}}"
NODE_ENV = "production"

[[services]]
name = "postgres"
image = "postgres:16-alpine"
port = 5432

[[services.env]]
POSTGRES_USER = "thenewfuse"
POSTGRES_PASSWORD = "${{POSTGRES_PASSWORD}}"
POSTGRES_DB = "thenewfuse"

[[services.volumes]]
mountPath = "/var/lib/postgresql/data"
name = "postgres-data"

[[services]]
name = "redis"
image = "redis:7-alpine"
port = 6379

[[services.volumes]]
mountPath = "/data"
name = "redis-data"
