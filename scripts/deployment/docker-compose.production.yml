version: '3.8'

services:
  # The New Fuse API Server
  api:
    build:
      context: ../../
      dockerfile: ./apps/api/Dockerfile
    container_name: tnf-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - WEBHOOK_SECRET_KEY=${WEBHOOK_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - PAYPAL_WEBHOOK_SECRET=${PAYPAL_WEBHOOK_SECRET}
      - SALESFORCE_WEBHOOK_SECRET=${SALESFORCE_WEBHOOK_SECRET}
      - HUBSPOT_WEBHOOK_SECRET=${HUBSPOT_WEBHOOK_SECRET}
      - NETSUITE_WEBHOOK_SECRET=${NETSUITE_WEBHOOK_SECRET}
      - LOGGING_LEVEL=info
      - METRICS_ENABLED=true
      - SSE_HEARTBEAT_INTERVAL=30000
      - MAX_SSE_CONNECTIONS=1000
    depends_on:
      - postgres
      - redis
    volumes:
      - api-logs:/app/logs
    networks:
      - tnf-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Frontend Application
  frontend:
    build:
      context: ../../
      dockerfile: ./apps/frontend/Dockerfile
    container_name: tnf-frontend
    ports:
      - "80:80"
      - "443:443"
    environment:
      - NODE_ENV=production
      - REACT_APP_API_URL=${REACT_APP_API_URL}
      - REACT_APP_SSE_URL=${REACT_APP_SSE_URL}
      - REACT_APP_CLOUDFLARE_WORKER_URL=${REACT_APP_CLOUDFLARE_WORKER_URL}
    depends_on:
      - api
    volumes:
      - frontend-assets:/usr/share/nginx/html/assets
      - nginx-logs:/var/log/nginx
    networks:
      - tnf-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: tnf-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - tnf-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: tnf-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - tnf-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Prometheus Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: tnf-prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - tnf-network
    restart: unless-stopped

  # Grafana Monitoring Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: tnf-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./monitoring/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./monitoring/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - tnf-network
    restart: unless-stopped

  # Nginx Load Balancer & SSL Termination
  nginx:
    image: nginx:alpine
    container_name: tnf-nginx
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - nginx-logs:/var/log/nginx
    depends_on:
      - api
      - frontend
    networks:
      - tnf-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Log Aggregation
  fluentd:
    build:
      context: ./logging
      dockerfile: Dockerfile.fluentd
    container_name: tnf-fluentd
    volumes:
      - ./logging/fluentd.conf:/fluentd/etc/fluent.conf
      - api-logs:/var/log/api
      - nginx-logs:/var/log/nginx
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    environment:
      - FLUENTD_CONF=fluent.conf
    networks:
      - tnf-network
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  api-logs:
    driver: local
  nginx-logs:
    driver: local
  frontend-assets:
    driver: local

networks:
  tnf-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16