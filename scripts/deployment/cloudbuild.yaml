# TNF Cloud Build configuration for api-server
# Builds the api-server Docker image and deploys to Cloud Run
substitutions:
  _IMAGE_TAG: 'latest'

steps:
  # Step 1: Build the api-server image
  - name: 'gcr.io/cloud-builders/docker'
    args:
    - 'build'
    - '--file'
    - 'Dockerfile.api'
    - '--tag'
    - 'us-central1-docker.pkg.dev/$PROJECT_ID/tnf-services/api-server:${_IMAGE_TAG}'
    - '--progress=plain'
    - '.'
    timeout: '1200s'
    id: 'build-api-server'

  # Step 2: Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
    - 'push'
    - 'us-central1-docker.pkg.dev/$PROJECT_ID/tnf-services/api-server:${_IMAGE_TAG}'
    waitFor: ['build-api-server']
    id: 'push-api-server'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
    - 'run'
    - 'deploy'
    - 'api-server'
    - '--image'
    - 'us-central1-docker.pkg.dev/$PROJECT_ID/tnf-services/api-server:${_IMAGE_TAG}'
    - '--region'
    - 'us-central1'
    - '--platform'
    - 'managed'
    - '--allow-unauthenticated'
    - '--port'
    - '8080'
    - '--memory'
    - '1Gi'
    - '--cpu'
    - '1'
    - '--min-instances'
    - '0'
    - '--max-instances'
    - '10'
    - '--set-env-vars'
    - 'NODE_ENV=production'
    waitFor: ['push-api-server']
    id: 'deploy-api-server'

# Store images in Artifact Registry
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/tnf-services/api-server:${_IMAGE_TAG}'

# Build options
options:
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'
