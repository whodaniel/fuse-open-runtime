version: '3.8'

services:
  # Multiple API Server Instances for Load Distribution
  api1:
    build:
      context: ../../
      dockerfile: ./apps/api/Dockerfile
    container_name: tnf-api-1
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - WEBHOOK_SECRET_KEY=${WEBHOOK_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - PAYPAL_WEBHOOK_SECRET=${PAYPAL_WEBHOOK_SECRET}
      - SALESFORCE_WEBHOOK_SECRET=${SALESFORCE_WEBHOOK_SECRET}
      - HUBSPOT_WEBHOOK_SECRET=${HUBSPOT_WEBHOOK_SECRET}
      - NETSUITE_WEBHOOK_SECRET=${NETSUITE_WEBHOOK_SECRET}
      - LOGGING_LEVEL=info
      - METRICS_ENABLED=true
      - SSE_HEARTBEAT_INTERVAL=30000
      - MAX_SSE_CONNECTIONS=2000
      - INSTANCE_ID=api-1
    depends_on:
      - postgres
      - redis
    volumes:
      - api-logs:/app/logs
    networks:
      - tnf-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  api2:
    build:
      context: ../../
      dockerfile: ./apps/api/Dockerfile
    container_name: tnf-api-2
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - WEBHOOK_SECRET_KEY=${WEBHOOK_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - PAYPAL_WEBHOOK_SECRET=${PAYPAL_WEBHOOK_SECRET}
      - SALESFORCE_WEBHOOK_SECRET=${SALESFORCE_WEBHOOK_SECRET}
      - HUBSPOT_WEBHOOK_SECRET=${HUBSPOT_WEBHOOK_SECRET}
      - NETSUITE_WEBHOOK_SECRET=${NETSUITE_WEBHOOK_SECRET}
      - LOGGING_LEVEL=info
      - METRICS_ENABLED=true
      - SSE_HEARTBEAT_INTERVAL=30000
      - MAX_SSE_CONNECTIONS=2000
      - INSTANCE_ID=api-2
    depends_on:
      - postgres
      - redis
    volumes:
      - api-logs:/app/logs
    networks:
      - tnf-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  api3:
    build:
      context: ../../
      dockerfile: ./apps/api/Dockerfile
    container_name: tnf-api-3
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - WEBHOOK_SECRET_KEY=${WEBHOOK_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - PAYPAL_WEBHOOK_SECRET=${PAYPAL_WEBHOOK_SECRET}
      - SALESFORCE_WEBHOOK_SECRET=${SALESFORCE_WEBHOOK_SECRET}
      - HUBSPOT_WEBHOOK_SECRET=${HUBSPOT_WEBHOOK_SECRET}
      - NETSUITE_WEBHOOK_SECRET=${NETSUITE_WEBHOOK_SECRET}
      - LOGGING_LEVEL=info
      - METRICS_ENABLED=true
      - SSE_HEARTBEAT_INTERVAL=30000
      - MAX_SSE_CONNECTIONS=2000
      - INSTANCE_ID=api-3
    depends_on:
      - postgres
      - redis
    volumes:
      - api-logs:/app/logs
    networks:
      - tnf-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Backup API Instance
  api4:
    build:
      context: ../../
      dockerfile: ./apps/api/Dockerfile
    container_name: tnf-api-4
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - WEBHOOK_SECRET_KEY=${WEBHOOK_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - PAYPAL_WEBHOOK_SECRET=${PAYPAL_WEBHOOK_SECRET}
      - SALESFORCE_WEBHOOK_SECRET=${SALESFORCE_WEBHOOK_SECRET}
      - HUBSPOT_WEBHOOK_SECRET=${HUBSPOT_WEBHOOK_SECRET}
      - NETSUITE_WEBHOOK_SECRET=${NETSUITE_WEBHOOK_SECRET}
      - LOGGING_LEVEL=info
      - METRICS_ENABLED=true
      - SSE_HEARTBEAT_INTERVAL=30000
      - MAX_SSE_CONNECTIONS=2000
      - INSTANCE_ID=api-4-backup
    depends_on:
      - postgres
      - redis
    volumes:
      - api-logs:/app/logs
    networks:
      - tnf-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 3G
        reservations:
          cpus: '0.5'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Multiple Frontend Instances
  frontend1:
    build:
      context: ../../
      dockerfile: ./apps/frontend/Dockerfile
    container_name: tnf-frontend-1
    environment:
      - NODE_ENV=production
      - REACT_APP_API_URL=${REACT_APP_API_URL}
      - REACT_APP_SSE_URL=${REACT_APP_SSE_URL}
      - REACT_APP_CLOUDFLARE_WORKER_URL=${REACT_APP_CLOUDFLARE_WORKER_URL}
      - INSTANCE_ID=frontend-1
    depends_on:
      - api1
      - api2
      - api3
    volumes:
      - frontend-assets:/usr/share/nginx/html/assets
    networks:
      - tnf-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend2:
    build:
      context: ../../
      dockerfile: ./apps/frontend/Dockerfile
    container_name: tnf-frontend-2
    environment:
      - NODE_ENV=production
      - REACT_APP_API_URL=${REACT_APP_API_URL}
      - REACT_APP_SSE_URL=${REACT_APP_SSE_URL}
      - REACT_APP_CLOUDFLARE_WORKER_URL=${REACT_APP_CLOUDFLARE_WORKER_URL}
      - INSTANCE_ID=frontend-2
    depends_on:
      - api1
      - api2
      - api3
    volumes:
      - frontend-assets:/usr/share/nginx/html/assets
    networks:
      - tnf-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend3:
    build:
      context: ../../
      dockerfile: ./apps/frontend/Dockerfile
    container_name: tnf-frontend-3
    environment:
      - NODE_ENV=production
      - REACT_APP_API_URL=${REACT_APP_API_URL}
      - REACT_APP_SSE_URL=${REACT_APP_SSE_URL}
      - REACT_APP_CLOUDFLARE_WORKER_URL=${REACT_APP_CLOUDFLARE_WORKER_URL}
      - INSTANCE_ID=frontend-3
    depends_on:
      - api1
      - api2
      - api3
    volumes:
      - frontend-assets:/usr/share/nginx/html/assets
    networks:
      - tnf-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Enhanced PostgreSQL with Connection Pooling
  postgres:
    image: postgres:15-alpine
    container_name: tnf-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256
      - POSTGRES_MAX_CONNECTIONS=500
      - POSTGRES_SHARED_BUFFERS=256MB
      - POSTGRES_EFFECTIVE_CACHE_SIZE=1GB
      - POSTGRES_MAINTENANCE_WORK_MEM=64MB
      - POSTGRES_CHECKPOINT_COMPLETION_TARGET=0.9
      - POSTGRES_WAL_BUFFERS=16MB
      - POSTGRES_DEFAULT_STATISTICS_TARGET=100
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf
    networks:
      - tnf-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Enhanced Redis with Clustering Support
  redis:
    image: redis:7-alpine
    container_name: tnf-redis
    command: >
      redis-server 
      --appendonly yes 
      --maxmemory 2gb 
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 300
      --timeout 0
      --tcp-backlog 511
      --databases 16
      --save 900 1
      --save 300 10
      --save 60 10000
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - tnf-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
        reservations:
          cpus: '1.0'
          memory: 2G
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Enhanced Nginx Load Balancer
  nginx:
    image: nginx:alpine
    container_name: tnf-nginx-lb
    ports:
      - "80:80"
      - "8080:8080"
      - "8081:8081"
      - "443:443"
      - "8443:8443"
    volumes:
      - ../../config/nginx/load-balancer.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - nginx-logs:/var/log/nginx
      - nginx-cache:/var/cache/nginx
    depends_on:
      - api1
      - api2
      - api3
      - frontend1
      - frontend2
      - frontend3
    networks:
      - tnf-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Enhanced Prometheus with More Targets
  prometheus:
    image: prom/prometheus:latest
    container_name: tnf-prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=720h'
      - '--storage.tsdb.retention.size=50GB'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    volumes:
      - ./monitoring/prometheus-scalable.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - tnf-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  # Enhanced Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: tnf-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-worldmap-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./monitoring/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./monitoring/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - tnf-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # Node Exporter for System Metrics
  node-exporter:
    image: prom/node-exporter:latest
    container_name: tnf-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - tnf-network
    restart: unless-stopped

  # cAdvisor for Container Metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: tnf-cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    networks:
      - tnf-network
    restart: unless-stopped

  # Enhanced Log Aggregation
  fluentd:
    build:
      context: ./logging
      dockerfile: Dockerfile.fluentd
    container_name: tnf-fluentd
    volumes:
      - ./logging/fluentd-scalable.conf:/fluentd/etc/fluent.conf
      - api-logs:/var/log/api
      - nginx-logs:/var/log/nginx
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    environment:
      - FLUENTD_CONF=fluent.conf
    networks:
      - tnf-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  api-logs:
    driver: local
  nginx-logs:
    driver: local
  nginx-cache:
    driver: local
  frontend-assets:
    driver: local

networks:
  tnf-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
    driver_opts:
      com.docker.network.bridge.name: tnf-bridge
      com.docker.network.driver.mtu: 1500