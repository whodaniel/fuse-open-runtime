        }

        function generatePrompt(agent) {
            return `Future-retro ultra realistic humanoid portrait, premium cinematic science-fiction editorial photography, chest-up composition, 1:1 profile image framing. A ${agent.age}-year-old ${agent.ethnicity} humanoid operator. Her skin is ${agent.skin}. Her expression is ${agent.expression}. Tactile analog-meets-cybernetic wardrobe, photoreal skin texture, subtle retro-futurist hardware, badge-ready negative space, dramatic but clean studio lighting, grounded realism, no cartoon styling, no text in image. ${agent.name} interpreted as a ${agent.role}. Core role: ${agent.tagline}. ${agent.desc} Specialties visible through props and costume language: ${agent.motifs.join(", ")}. Color story: ${agent.colorStory.join(", ")}. Wardrobe: ${agent.wardrobe}. Environment: ${agent.background}. Visual motifs: ${agent.motifs.join(", ")}. Emotional tone: ${agent.expression.split(",")[0]}. Make the subject look like a memorable humanoid operator with strong personality, deeply intelligent eyes, and premium retro-future craftsmanship. Design for later TNF badge overlays inspired by: ${agent.badges.join(", ")}.`;
        }

        function createAgentCard(agent) {
            const prompt = generatePrompt(agent);
            const card = document.createElement("div");
            card.className = `agent-card ${agent.hasImage ? "has-image" : ""}`;
            
            let imageHTML = "";
            if (agent.hasImage) {
                imageHTML = `<img src="file://${imageBasePath}${agent.imageFile}" alt="${agent.name}" onerror="this.parentElement.innerHTML='<div class=\\'pfp-placeholder\\'>❌</div>'">`;
            } else {
                imageHTML = `<div class="pfp-placeholder">⏳</div>`;
            }

            card.innerHTML = `
                <div class="pfp-container">
                    ${imageHTML}
                    <div class="badge-overlay">
                        ${agent.badges.slice(0,4).map((b, i) => `<span class="badge badge-${i+1}">${b}</span>`).join("")}
                    </div>
                </div>
                <div class="card-body">
                    <div class="agent-name">${agent.name}</div>
                    <div class="agent-role">${agent.role}</div>
                    <div class="agent-desc">${agent.desc}</div>
                    <button class="details-toggle" onclick="this.nextElementSibling.classList.toggle('open')">
                        ▼ View Prompt Details
                    </button>
                    <div class="prompt-details">
                        <div class="prompt-section">
                            <div class="prompt-label">Character Details</div>
                            <div class="prompt-text">
                                <strong>Age:</strong> ${agent.age} | <strong>Ethnicity:</strong> ${agent.ethnicity}<br>
                                <strong>Expression:</strong> ${agent.expression}<br>
                                <strong>Environment:</strong> ${agent.background}
                            </div>
                        </div>
                        <div class="prompt-section">
                            <div class="prompt-label">Visual Design</div>
                            <div class="color-story">
                                ${agent.colorStory.map(c => `<div class="color-swatch" style="background:${getColorHex(c)}" title="${c}"></div>`).join("")}
                            </div>
                            <div class="visual-motifs">
                                ${agent.motifs.map(m => `<span class="motif-tag">${m}</span>`).join("")}
                            </div>
                        </div>
                        <div class="prompt-section">
                            <div class="prompt-label">Full PFP Prompt</div>
                            <div class="prompt-text">${prompt}</div>
                            <button class="copy-btn" onclick="navigator.clipboard.writeText(this.previousElementSibling.textContent)">Copy Prompt</button>
                        </div>
                    </div>
                </div>
            `;
            return card;
        }

        function renderAgents(filteredAgents) {
            const grid = document.getElementById("agentGrid");
            grid.innerHTML = "";
            filteredAgents.forEach(agent => {
                grid.appendChild(createAgentCard(agent));
            });
        }

        // Initial render
        renderAgents(agents);

        // Search functionality
        document.getElementById("searchInput").addEventListener("input", (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = agents.filter(a => 
                a.name.toLowerCase().includes(term) || 
                a.role.toLowerCase().includes(term) ||
                a.desc.toLowerCase().includes(term)
            );
            renderAgents(filtered);
        });

        // Role filter
        document.getElementById("roleFilter").addEventListener("change", (e) => {
            const role = e.target.value;
            const filtered = role ? agents.filter(a => a.role === role) : agents;
            renderAgents(filtered);
        });
    </script>
</body>
</html>
