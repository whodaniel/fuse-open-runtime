<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TNF Prompt Catalog Redirect</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050913;
        --panel: #111827;
        --line: rgba(148, 163, 184, 0.22);
        --accent: #22d3ee;
        --accent2: #38bdf8;
        --text: #e2e8f0;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", "Satoshi", "Segoe UI", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 15% 10%, rgba(56, 189, 248, 0.2), transparent 40%),
          radial-gradient(circle at 90% 0%, rgba(34, 211, 238, 0.2), transparent 35%),
          var(--bg);
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(760px, 100%);
        border: 1px solid var(--line);
        border-radius: 20px;
        background: linear-gradient(160deg, rgba(17, 24, 39, 0.92), rgba(15, 23, 42, 0.94));
        padding: 28px;
      }
      h1 { margin: 0 0 10px; font-size: 28px; }
      p { margin: 0 0 16px; color: #cbd5e1; line-height: 1.5; }
      .actions { display: flex; flex-wrap: wrap; gap: 10px; }
      a {
        text-decoration: none;
        color: #041018;
        background: linear-gradient(120deg, var(--accent), var(--accent2));
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 700;
      }
      a.secondary {
        color: var(--text);
        background: transparent;
        border: 1px solid var(--line);
      }
      code {
        display: inline-block;
        margin-top: 12px;
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid var(--line);
        padding: 6px 8px;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>TNF Prompt Catalog Is Now In-App</h1>
      <p>
        Prompt editing and image overrides now run in the deployed SaaS flow, synchronized with PFP
        Studio and the rest of the Agent Factory.
      </p>
      <div class="actions">
        <a href="/ai-portal/pfp-prompts">Open Prompt Catalog</a>
        <a class="secondary" href="/ai-portal/pfp-studio">Open PFP Studio</a>
      </div>
      <code>/ai-portal/pfp-prompts</code>
    </main>
    <script>
      if (location.hostname.endsWith('thenewfuse.com')) {
        location.replace('/ai-portal/pfp-prompts');
      }
    </script>
  </body>
</html>
