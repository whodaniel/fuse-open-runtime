<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="1280" viewBox="0 0 2000 1280" role="img" aria-label="TNF communication infrastructure and active patterns">
  <defs>
    <style>
      .title { font: 700 34px 'Menlo', 'DejaVu Sans Mono', monospace; fill: #0f172a; }
      .subtitle { font: 500 16px 'Menlo', 'DejaVu Sans Mono', monospace; fill: #334155; }
      .lane { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 16; }
      .lane-title { font: 700 20px 'Menlo', 'DejaVu Sans Mono', monospace; fill: #0f172a; }
      .node { fill: #ffffff; stroke: #64748b; stroke-width: 2; rx: 12; }
      .node-cloud { fill: #f0f9ff; stroke: #0284c7; stroke-width: 2; rx: 12; }
      .node-data { fill: #f8fafc; stroke: #475569; stroke-width: 2; rx: 12; }
      .node-hot { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 12; }
      .node-text { font: 600 15px 'Menlo', 'DejaVu Sans Mono', monospace; fill: #0f172a; }
      .node-sub { font: 500 12px 'Menlo', 'DejaVu Sans Mono', monospace; fill: #334155; }
      .edge-label { font: 600 12px 'Menlo', 'DejaVu Sans Mono', monospace; }
      .runtime { font: 500 13px 'Menlo', 'DejaVu Sans Mono', monospace; fill: #111827; }
      .legend { font: 600 13px 'Menlo', 'DejaVu Sans Mono', monospace; fill: #0f172a; }
    </style>
    <marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2563eb" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#059669" />
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#ea580c" />
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#7c3aed" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#dc2626" />
    </marker>
  </defs>

  <rect x="0" y="0" width="2000" height="1280" fill="#ffffff" />
  <text x="50" y="55" class="title">TNF Communication Infrastructure and Active Patterns</text>
  <text x="50" y="85" class="subtitle">Snapshot date: 2026-03-22 | Derived from relay-core, agency-hub, websocket, handoff, unified-ledger, Cloudflare relay/sharedstate</text>

  <rect class="lane" x="40" y="120" width="430" height="910" />
  <text x="60" y="155" class="lane-title">Client Surfaces</text>

  <rect class="lane" x="500" y="120" width="560" height="910" />
  <text x="520" y="155" class="lane-title">TNF API and Orchestration</text>

  <rect class="lane" x="1090" y="120" width="520" height="910" />
  <text x="1110" y="155" class="lane-title">Relay and Messaging Backbone</text>

  <rect class="lane" x="1640" y="120" width="320" height="910" />
  <text x="1660" y="155" class="lane-title">Cloud Plane</text>

  <rect class="node" x="70" y="190" width="370" height="110" />
  <text x="88" y="220" class="node-text">Frontend App (A2AProtocolService)</text>
  <text x="88" y="245" class="node-sub">POST /api/a2a/messages/send</text>
  <text x="88" y="265" class="node-sub">POST /api/a2a/messages/broadcast</text>

  <rect class="node" x="70" y="330" width="370" height="120" />
  <text x="88" y="360" class="node-text">WebSocket Clients</text>
  <text x="88" y="385" class="node-sub">JWT socket auth</text>
  <text x="88" y="405" class="node-sub">room events: agent:message</text>
  <text x="88" y="425" class="node-sub">presence + online cache</text>

  <rect class="node" x="70" y="485" width="370" height="140" />
  <text x="88" y="515" class="node-text">VSCode + Chrome + External Agents</text>
  <text x="88" y="540" class="node-sub">relay /ws channel</text>
  <text x="88" y="560" class="node-sub">AGENT_REGISTER, MESSAGE_SEND, HEARTBEAT</text>
  <text x="88" y="580" class="node-sub">legacy socket.io bridge support</text>
  <text x="88" y="600" class="node-sub">qwen_to_vscode / vscode_to_qwen</text>

  <rect class="node-hot" x="70" y="665" width="370" height="160" />
  <text x="88" y="695" class="node-text">Runtime State (from ~/.tnf)</text>
  <text x="88" y="720" class="node-sub">stall-defense: active</text>
  <text x="88" y="740" class="node-sub">handoff matrix: operational</text>
  <text x="88" y="760" class="node-sub">chrome extension v6: live + transcript sync</text>
  <text x="88" y="780" class="node-sub">cloud health: degraded (drift alerts)</text>
  <text x="88" y="800" class="node-sub">local listeners seen: 3000, 6379</text>

  <rect class="node" x="530" y="190" width="500" height="145" />
  <text x="548" y="220" class="node-text">Agency Hub A2A Broker Controller + Service</text>
  <text x="548" y="245" class="node-sub">/a2a/messages/send, /broadcast, /channels</text>
  <text x="548" y="265" class="node-sub">queue/inbox, presence, status/metrics</text>
  <text x="548" y="285" class="node-sub">Redis mode + in-memory fallback</text>
  <text x="548" y="305" class="node-sub">key prefix: tnf:a2a:broker:*</text>

  <rect class="node" x="530" y="365" width="500" height="120" />
  <text x="548" y="395" class="node-text">WebSocket Gateway</text>
  <text x="548" y="420" class="node-sub">validated socket sessions</text>
  <text x="548" y="440" class="node-sub">room-targeted message fanout</text>
  <text x="548" y="460" class="node-sub">online user cache updates</text>

  <rect class="node" x="530" y="520" width="500" height="130" />
  <text x="548" y="550" class="node-text">Agent Handoff Service</text>
  <text x="548" y="575" class="node-sub">creates handoff packets and acks</text>
  <text x="548" y="595" class="node-sub">uses HandoffStoreService (Redis-backed)</text>
  <text x="548" y="615" class="node-sub">timeline lifecycle emits to unified ledger</text>

  <rect class="node" x="530" y="685" width="500" height="120" />
  <text x="548" y="715" class="node-text">Task Controller + Execution Logs</text>
  <text x="548" y="740" class="node-sub">/tasks/:id/execution-logs write/read</text>
  <text x="548" y="760" class="node-sub">mirrors task events into timeline stream</text>
  <text x="548" y="780" class="node-sub">links execution to observability plane</text>

  <rect class="node-data" x="530" y="840" width="500" height="140" />
  <text x="548" y="870" class="node-text">Unified Ledger Service</text>
  <text x="548" y="895" class="node-sub">createTimelineEvent(...)</text>
  <text x="548" y="915" class="node-sub">persistent store: data/unified-task-ledger.json</text>
  <text x="548" y="935" class="node-sub">cross-cut trace for comms + workflow state</text>
  <text x="548" y="955" class="node-sub">used by task/handoff channels</text>

  <rect class="node" x="1120" y="190" width="460" height="155" />
  <text x="1138" y="220" class="node-text">Standalone Relay (relay-core)</text>
  <text x="1138" y="245" class="node-sub">WS: /ws | HTTP: /health /agents /channels</text>
  <text x="1138" y="265" class="node-sub">/status /bridge/* /activity/recent</text>
  <text x="1138" y="285" class="node-sub">routes direct + channel + broadcast messages</text>
  <text x="1138" y="305" class="node-sub">persists activity stream records</text>
  <text x="1138" y="325" class="node-sub">keys: tnf:activity:stream, tnf:activity:channel:*</text>

  <rect class="node" x="1120" y="380" width="460" height="120" />
  <text x="1138" y="410" class="node-text">Redis Relay Bridge</text>
  <text x="1138" y="435" class="node-sub">ingress: tnf:bus:ingress</text>
  <text x="1138" y="455" class="node-sub">egress: tnf:bus:egress:{agentId}</text>
  <text x="1138" y="475" class="node-sub">forwards relay envelopes + orchestrator replies</text>

  <rect class="node-data" x="1120" y="535" width="460" height="145" />
  <text x="1138" y="565" class="node-text">Redis (Core Shared Bus + Presence)</text>
  <text x="1138" y="590" class="node-sub">message queues, channel fanout, heartbeats</text>
  <text x="1138" y="610" class="node-sub">A2A broker keys + relay bus keys</text>
  <text x="1138" y="630" class="node-sub">handoff packet index keyspace: tnf:handoff:v1:*</text>
  <text x="1138" y="650" class="node-sub">single local listener observed on :6379</text>

  <rect class="node-data" x="1120" y="715" width="460" height="115" />
  <text x="1138" y="745" class="node-text">HandoffStoreService</text>
  <text x="1138" y="770" class="node-sub">session + inbox + packet + ack records</text>
  <text x="1138" y="790" class="node-sub">reads/writes through Redis for handoff sync</text>
  <text x="1138" y="810" class="node-sub">supports resume + recovery paths</text>

  <rect class="node-hot" x="1120" y="865" width="460" height="115" />
  <text x="1138" y="895" class="node-text">Event Escalation + Stall Defense</text>
  <text x="1138" y="920" class="node-sub">heartbeat-derived stall events</text>
  <text x="1138" y="940" class="node-sub">EventEmitter2 escalation + recovery signaling</text>
  <text x="1138" y="960" class="node-sub">active per runtime status snapshot</text>

  <rect class="node-cloud" x="1670" y="220" width="260" height="170" />
  <text x="1688" y="250" class="node-text">Cloudflare ZeroClaw Relay</text>
  <text x="1688" y="275" class="node-sub">/webhook + /health</text>
  <text x="1688" y="295" class="node-sub">secret header validation</text>
  <text x="1688" y="315" class="node-sub">primary + secondary /api/chat failover</text>
  <text x="1688" y="335" class="node-sub">bridges browser-extension traffic</text>
  <text x="1688" y="355" class="node-sub">status currently flagged degraded</text>

  <rect class="node-cloud" x="1670" y="430" width="260" height="240" />
  <text x="1688" y="460" class="node-text">Cloudflare SharedState</text>
  <text x="1688" y="485" class="node-sub">canonical receipts + mirrors + gates</text>
  <text x="1688" y="505" class="node-sub">Worker endpoints:</text>
  <text x="1688" y="525" class="node-sub">/deposit, /withdraw, /mirror/:runtime</text>
  <text x="1688" y="545" class="node-sub">/context/:runtime, /gates/*/evaluate</text>
  <text x="1688" y="565" class="node-sub">storage: Durable Object sequencer</text>
  <text x="1688" y="585" class="node-sub">plus D1 + R2 bindings</text>
  <text x="1688" y="605" class="node-sub">coordinates multi-runtime consistency</text>
  <text x="1688" y="625" class="node-sub">and transcript/state synchronization</text>

  <line x1="440" y1="235" x2="530" y2="235" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)" />
  <text x="455" y="225" class="edge-label" fill="#2563eb">HTTP A2A send/broadcast</text>

  <line x1="440" y1="385" x2="530" y2="425" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)" />
  <text x="452" y="370" class="edge-label" fill="#2563eb">socket auth + room bind</text>

  <line x1="440" y1="555" x2="1120" y2="265" stroke="#059669" stroke-width="3" marker-end="url(#arrow-green)" />
  <text x="720" y="420" class="edge-label" fill="#059669">agent envelopes via /ws</text>

  <line x1="1030" y1="260" x2="1120" y2="430" stroke="#059669" stroke-width="3" marker-end="url(#arrow-green)" />
  <text x="1045" y="340" class="edge-label" fill="#059669">broker to relay bus</text>

  <line x1="1350" y1="345" x2="1350" y2="380" stroke="#059669" stroke-width="3" marker-end="url(#arrow-green)" />
  <text x="1360" y="368" class="edge-label" fill="#059669">bridge attach</text>

  <line x1="1350" y1="500" x2="1350" y2="535" stroke="#059669" stroke-width="3" marker-end="url(#arrow-green)" />
  <text x="1362" y="528" class="edge-label" fill="#059669">ingress/egress keys</text>

  <line x1="1030" y1="575" x2="1120" y2="775" stroke="#ea580c" stroke-width="3" marker-end="url(#arrow-orange)" />
  <text x="1032" y="665" class="edge-label" fill="#ea580c">handoff packets + ack</text>

  <line x1="1030" y1="575" x2="1030" y2="910" stroke="#ea580c" stroke-width="3" marker-end="url(#arrow-orange)" />
  <text x="1040" y="760" class="edge-label" fill="#ea580c">handoff lifecycle to timeline</text>

  <line x1="1030" y1="740" x2="1030" y2="910" stroke="#ea580c" stroke-width="3" marker-end="url(#arrow-orange)" />
  <text x="1040" y="855" class="edge-label" fill="#ea580c">execution logs mirrored</text>

  <line x1="530" y1="425" x2="440" y2="390" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)" />
  <text x="445" y="412" class="edge-label" fill="#2563eb">agent:message fanout</text>

  <line x1="1580" y1="265" x2="1670" y2="295" stroke="#7c3aed" stroke-width="3" marker-end="url(#arrow-purple)" />
  <text x="1590" y="285" class="edge-label" fill="#7c3aed">extension/webhook flow</text>

  <line x1="1800" y1="390" x2="1800" y2="430" stroke="#7c3aed" stroke-width="3" marker-end="url(#arrow-purple)" />
  <text x="1810" y="415" class="edge-label" fill="#7c3aed">relay to sharedstate</text>

  <line x1="1580" y1="580" x2="1670" y2="560" stroke="#7c3aed" stroke-width="3" marker-end="url(#arrow-purple)" />
  <text x="1588" y="545" class="edge-label" fill="#7c3aed">mirror/context sync</text>

  <line x1="1820" y1="670" x2="1600" y2="920" stroke="#dc2626" stroke-width="3" stroke-dasharray="10 8" marker-end="url(#arrow-red)" />
  <text x="1680" y="820" class="edge-label" fill="#dc2626">degraded cloud health signal</text>

  <rect x="40" y="1060" width="1920" height="180" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" rx="12" />
  <text x="60" y="1090" class="lane-title">Legend and Pattern Types</text>
  <line x1="65" y1="1120" x2="160" y2="1120" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)" />
  <text x="170" y="1125" class="legend">Blue: API/WebSocket request-reply and fanout</text>
  <line x1="650" y1="1120" x2="745" y2="1120" stroke="#059669" stroke-width="3" marker-end="url(#arrow-green)" />
  <text x="755" y="1125" class="legend">Green: Redis bus/event transport</text>
  <line x1="1125" y1="1120" x2="1220" y2="1120" stroke="#ea580c" stroke-width="3" marker-end="url(#arrow-orange)" />
  <text x="1230" y="1125" class="legend">Orange: workflow lifecycle + timeline persistence</text>
  <line x1="65" y1="1160" x2="160" y2="1160" stroke="#7c3aed" stroke-width="3" marker-end="url(#arrow-purple)" />
  <text x="170" y="1165" class="legend">Purple: Cloudflare relay/sharedstate synchronization paths</text>
  <line x1="870" y1="1160" x2="965" y2="1160" stroke="#dc2626" stroke-width="3" stroke-dasharray="10 8" marker-end="url(#arrow-red)" />
  <text x="975" y="1165" class="legend">Red dashed: observed risk/degradation patterns in current runtime snapshot</text>

  <text x="60" y="1205" class="runtime">Primary communication pattern in TNF: Client/API to Broker, Relay-to-Redis bus, Redis-backed handoff persistence, timeline mirroring, and cloud state synchronization.</text>
  <text x="60" y="1228" class="runtime">This view combines static architecture (code paths) and active-state indicators (local status artifacts and open listeners) as of 2026-03-22.</text>
</svg>
