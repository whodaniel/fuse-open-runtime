<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNF Agent PFP Generator</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        body { font-family: monospace; background: #0a0a0f; color: #00d4ff; padding: 20px; }
        .log { margin: 10px 0; padding: 10px; background: #1a1a2e; border-radius: 5px; }
        .success { color: #50C878; }
        .error { color: #ff6b6b; }
        .pending { color: #ffa500; }
        #status { white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>TNF Agent PFP Generator - Puter.js</h1>
    <div id="status"></div>
    <script>
        const status = document.getElementById('status');
        let logCount = 0;
        
        function log(msg, type = 'info') {
            status.textContent += `[${++logCount}] ${type.toUpperCase()}: ${msg}\n`;
            console.log(`[${type}]`, msg);
        }
        
        const agents = [
            {
                id: "auth-blocker-sentinel",
                name: "Auth Blocker Sentinel",
                age: "53",
                ethnicity: "Japanese female",
                skin: "weathered yet resilient, with distinct character lines marking years of service",
                expression: "stern, unyielding, highly alert, vigilant, and unmistakably authoritarian",
                background: "clean sci-fi portrait studio with subtle signal architecture serving as security checkpoint",
                colorStory: ["slate", "silver", "electric blue"],
                wardrobe: "refined retro-future authoritarian uniform with prominent security clasps",
                motifs: ["lock and shield glyphs", "signal rings", "precision hardware", "ambient light traces"],
                desc: "Sentinel that monitors archaeology blocked states, especially authentication or approval requirements."
            },
            {
                id: "backend-specialist",
                name: "Backend Specialist",
                age: "47",
                ethnicity: "Middle-Eastern female",
                skin: "mature skin with a commanding, seasoned texture",
                expression: "stern, unyielding, highly alert, vigilant, and unmistakably authoritarian",
                background: "quiet command bunker with holographic shield interfaces and access checkpoints",
                colorStory: ["obsidian", "emerald", "gunmetal"],
                wardrobe: "armored midnight trench with luminous emerald seam work",
                motifs: ["threat-map holograms", "shield glyphs", "forensic lenses"],
                desc: "Expert backend architect for API development, server-side logic, database integration, and security."
            }
        ];
        
        const imageBasePath = "/Users/danielgoldberg/.gemini/antigravity/brain/129a6f84-97a9-4c46-88c8-4b5f066454aa/";
        
        function generatePrompt(agent) {
            return `Future-retro ultra realistic humanoid portrait, premium cinematic science-fiction editorial photography, chest-up composition, 1:1 profile image framing. A ${agent.age}-year-old ${agent.ethnicity} humanoid operator. Her skin is ${agent.skin}. Her expression is ${agent.expression}. Tactile analog-meets-cybernetic wardrobe, photoreal skin texture, subtle retro-futurist hardware, badge-ready negative space, dramatic but clean studio lighting, grounded realism, no cartoon styling, no text in image. ${agent.name}. Specialties visible through props and costume language: ${agent.motifs.join(", ")}. Color story: ${agent.colorStory.join(", ")}. Wardrobe: ${agent.wardrobe}. Environment: ${agent.background}.`;
        }
        
        async function generateImage(agent) {
            const prompt = generatePrompt(agent);
            const filename = `${agent.id}_${Date.now()}.png`;
            
            log(`Generating PFP for: ${agent.name}`, 'pending');
            
            try {
                const result = await puter.ai.txt2img(prompt, { 
                    model: "gpt-image-1",
                    quality: "low"
                });
                
                log(`Image generated for ${agent.name}`, 'success');
                log(`Filename: ${filename}`, 'info');
                
                if (result && result.length > 0) {
                    const imgData = result[0];
                    return { success: true, filename, imgData };
                }
                return { success: false, error: 'No image returned' };
            } catch (err) {
                log(`Error for ${agent.name}: ${err.message}`, 'error');
                return { success: false, error: err.message };
            }
        }
        
        async function main() {
            log('Starting TNF Agent PFP Generator with Puter.js');
            log(`Total agents to process: ${agents.length}`);
            
            for (const agent of agents) {
                const result = await generateImage(agent);
                await new Promise(r => setTimeout(r, 3000));
            }
            
            log('Done!', 'success');
        }
        
        main();
    </script>
</body>
</html>
