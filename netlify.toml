# Netlify Deployment Configuration for pnpm Monorepo
#
# This configuration file instructs Netlify on how to build and deploy the frontend application
# from the monorepo structure. It specifies the base directory, build command, publish directory,
# and other essential settings for a successful deployment.

[build]
  command = "pnpm run build --filter=@the-new-fuse/client"
  publish = "packages/client/build"

[build.environment]
  # Set Node.js version for consistency across environments.
  # This should match the version specified in the root .nvmrc file.
  NODE_VERSION = "22.21.1"
  
  # Increase memory allocation for the build process to prevent out-of-memory errors,
  # which can occur in larger monorepos.
  NODE_OPTIONS = "--max-old-space-size=4096"

# Redirects and Rewrites
#
# This section ensures that client-side routing works correctly for Single Page Applications (SPAs).
# Any request that doesn't match a static file will be redirected to `index.html`,
# allowing the client-side router (e.g., React Router) to handle it.
[[redirects]]
  # From: The path to match for all routes.
  from = "/*"
  # To: The file to serve for any unmatched route.
  to = "/index.html"
  # Status: 200 indicates a rewrite (serving the content of the file) rather than a 301/302 redirect.
  status = 200

# Custom Headers
#
# This section adds security and caching headers to improve the application's security and performance.
[[headers]]
  for = "/*"
  [headers.values]
    # Security Headers
    # X-Frame-Options: Prevents clickjacking by disallowing the site to be embedded in iframes.
    X-Frame-Options = "DENY"
    # X-XSS-Protection: Enables the browser's built-in XSS protection.
    X-XSS-Protection = "1; mode=block"
    # Content-Security-Policy: A placeholder for a strict Content Security Policy.
    # This should be customized based on your application's specific needs.
    # Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self';"
    # Referrer-Policy: Controls how much referrer information is sent with requests.
    Referrer-Policy = "no-referrer"
    # X-Content-Type-Options: Prevents the browser from MIME-sniffing a response away from the declared content-type.
    X-Content-Type-Options = "nosniff"

[[headers]]
  # Caching Headers for Static Assets
  # These headers instruct browsers to cache immutable static assets (like JS, CSS, and images)
  # for a long time to improve performance on subsequent visits.
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"