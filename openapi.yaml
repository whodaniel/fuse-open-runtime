openapi: 3.1.0
info:
  title: The New Fuse API
  version: 1.0.0
  description: |
    Comprehensive API documentation for The New Fuse platform - a multi-agent orchestration system with blockchain integration, workflow automation, and AI-powered capabilities.

    ## Features
    - **Agent Management**: Create, manage, and orchestrate AI agents
    - **Workflow Engine**: Build and execute complex workflows
    - **Chat System**: Real-time messaging and communication
    - **Web3 Integration**: Wallet management, transactions, and smart accounts (ERC-4337)
    - **MCP Protocol**: Model Context Protocol for agent communication
    - **Authentication**: JWT-based secure authentication
    - **Rate Limiting**: Tiered rate limiting based on user roles

    ## Authentication
    Most endpoints require JWT authentication. Include the Bearer token in the Authorization header:
    ```
    Authorization: Bearer <your-jwt-token>
    ```

    ## Base URLs
    - Development: `http://localhost:3001/api`
    - API Gateway: `http://localhost:4000/api/v1`
    - Production: `https://api.thenewfuse.com/api`

  contact:
    name: The New Fuse API Support
    url: https://thenewfuse.com/support
    email: support@thenewfuse.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3001/api
    description: Development API Server
  - url: http://localhost:4000/api/v1
    description: API Gateway (Development)
  - url: https://api.thenewfuse.com/api
    description: Production API Server

tags:
  - name: auth
    description: Authentication and authorization endpoints
  - name: Agents
    description: Agent management and orchestration
  - name: chat
    description: Chat rooms and messaging
  - name: workflows
    description: Workflow creation and execution
  - name: wallets
    description: Web3 wallet management
  - name: transactions
    description: Blockchain transaction operations
  - name: smart-accounts
    description: ERC-4337 Smart Account operations
  - name: mcp
    description: Model Context Protocol operations
  - name: resources
    description: Resource catalog search and retrieval
  - name: webhooks
    description: Webhook management
  - name: monitoring
    description: System monitoring and health checks

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT authentication token obtained from /auth/login

  schemas:
    # Authentication Schemas
    LoginDto:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: SecurePass123!

    RegisterDto:
      type: object
      required:
        - email
        - password
        - firstName
        - lastName
      properties:
        email:
          type: string
          format: email
          example: newuser@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: SecurePass123!
        firstName:
          type: string
          minLength: 2
          maxLength: 50
          example: John
        lastName:
          type: string
          minLength: 2
          maxLength: 50
          example: Doe
        phone:
          type: string
          format: phone
          example: "+1234567890"

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: JWT access token (15 minutes expiry)
        refreshToken:
          type: string
          description: JWT refresh token (7 days expiry)
        user:
          $ref: "#/components/schemas/User"
        expiresIn:
          type: integer
          description: Token expiration time in seconds
          example: 900

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174000"
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [user, admin, agent]
        emailVerified:
          type: boolean
        createdAt:
          type: string
          format: date-time
        lastLogin:
          type: string
          format: date-time

    # Agent Schemas
    AgentType:
      type: string
      enum:
        - BASIC
        - CHAT
        - WORKFLOW
        - TASK
        - ASSISTANT
        - ANALYSIS
        - CONVERSATIONAL
        - IDE_EXTENSION
        - API

    AgentStatus:
      type: string
      enum:
        - active
        - inactive
        - paused
        - busy
        - error

    AgentCapability:
      type: string
      enum:
        - natural_language
        - code_generation
        - data_analysis
        - image_processing
        - web_scraping
        - api_integration
        - workflow_execution

    CreateAgentDto:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
          example: "Customer Support Bot"
        type:
          $ref: "#/components/schemas/AgentType"
        description:
          type: string
          maxLength: 500
          example: "Handles customer inquiries and support tickets"
        systemPrompt:
          type: string
          example: "You are a helpful customer support assistant"
        capabilities:
          type: array
          items:
            $ref: "#/components/schemas/AgentCapability"
        configuration:
          type: object
          additionalProperties: true
          example:
            maxConcurrent: 10
            responseTimeout: 30

    UpdateAgentDto:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        systemPrompt:
          type: string
        capabilities:
          type: array
          items:
            $ref: "#/components/schemas/AgentCapability"
        configuration:
          type: object
          additionalProperties: true
        status:
          $ref: "#/components/schemas/AgentStatus"

    AgentResponseDto:
      type: object
      properties:
        id:
          type: string
          example: "agent123"
        name:
          type: string
        type:
          $ref: "#/components/schemas/AgentType"
        status:
          $ref: "#/components/schemas/AgentStatus"
        description:
          type: string
        capabilities:
          type: array
          items:
            $ref: "#/components/schemas/AgentCapability"
        configuration:
          type: object
          additionalProperties: true
        metrics:
          type: object
          properties:
            uptime:
              type: number
              format: float
            avgResponseTime:
              type: number
              format: float
            satisfaction:
              type: number
              format: float
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastActiveAt:
          type: string
          format: date-time

    # Chat Schemas
    ChatRoom:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [public, private, group]
        memberCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateMessageDto:
      type: object
      required:
        - content
        - type
      properties:
        content:
          type: string
          maxLength: 10000
        type:
          type: string
          enum: [text, image, file, system]
        metadata:
          type: object
          additionalProperties: true
        replyTo:
          type: string
          description: ID of message being replied to

    Message:
      type: object
      properties:
        id:
          type: string
        content:
          type: string
        type:
          type: string
        sender:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            avatar:
              type: string
        createdAt:
          type: string
          format: date-time
        reactions:
          type: array
          items:
            type: object
            properties:
              emoji:
                type: string
              count:
                type: integer
              users:
                type: array
                items:
                  type: string

    # Workflow Schemas
    WorkflowStatus:
      type: string
      enum: [draft, active, paused, completed, failed, cancelled]

    CreateWorkflowDto:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
        nodes:
          type: array
          items:
            type: object
        edges:
          type: array
          items:
            type: object
        tags:
          type: array
          items:
            type: string

    Workflow:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        status:
          $ref: "#/components/schemas/WorkflowStatus"
        nodes:
          type: array
          items:
            type: object
        edges:
          type: array
          items:
            type: object
        version:
          type: integer
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WorkflowExecution:
      type: object
      properties:
        id:
          type: string
        workflowId:
          type: string
        status:
          type: string
          enum: [running, completed, failed, cancelled, paused]
        input:
          type: object
          additionalProperties: true
        output:
          type: object
          additionalProperties: true
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        createdBy:
          type: string

    # Web3 Schemas
    CreateWalletDto:
      type: object
      required:
        - userId
        - verifierId
      properties:
        userId:
          type: string
        verifierId:
          type: string
        chainId:
          type: integer
          example: 1
        userType:
          type: string
          enum: [HUMAN, AI]
          default: HUMAN
        enableSmartAccount:
          type: boolean
          default: true

    Wallet:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        address:
          type: string
          example: "0x742d35Cc6634C0532925a3b844Bc9e7595f0bEb"
        chainId:
          type: integer
        userType:
          type: string
        smartAccountEnabled:
          type: boolean
        createdAt:
          type: string
          format: date-time

    TransactionDto:
      type: object
      required:
        - to
        - value
      properties:
        to:
          type: string
          example: "0x742d35Cc6634C0532925a3b844Bc9e7595f0bEb"
        value:
          type: string
          example: "1000000000000000000"
        data:
          type: string
          example: "0x"
        useSmartAccount:
          type: boolean
          default: false

    Transaction:
      type: object
      properties:
        id:
          type: string
        walletId:
          type: string
        txHash:
          type: string
        to:
          type: string
        value:
          type: string
        status:
          type: string
          enum: [PENDING, SUCCESS, FAILED]
        createdAt:
          type: string
          format: date-time

    # MCP Schemas
    MCPServer:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        endpoint:
          type: string
        status:
          type: string
          enum: [online, offline, error]
        capabilities:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time

    # Error Schemas
    Error:
      type: object
      properties:
        message:
          type: string
        error:
          type: string
        statusCode:
          type: integer
        timestamp:
          type: string
          format: date-time

    ValidationError:
      type: object
      properties:
        message:
          type: string
        errors:
          type: array
          items:
            type: string

    # Pagination
    Pagination:
      type: object
      properties:
        page:
          type: integer
          minimum: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
        total:
          type: integer
        pages:
          type: integer

    # Resource Search Schemas
    ResourceSearchRequest:
      type: object
      properties:
        search:
          type: string
          description: Free-text search string
          example: alpha workflow
        type:
          type: string
          enum: [skill, workflow, template, tool, integration, all]
          default: all
        category:
          type: string
          enum: [development, productivity, communication, data, automation, ai, other, all]
          default: all
        tags:
          type: array
          items:
            type: string
          default: []
        featured:
          type: boolean
          default: false
        sortBy:
          type: string
          enum: [popular, recent, rating, name]
          default: popular
        traitScreen:
          type: boolean
          default: true
          description: Enable trait-based screening/ranking
        traitLimit:
          type: integer
          minimum: 1
          example: 8
        traitThreshold:
          type: number
          minimum: 0
          maximum: 1
          example: 0.42
        includeTraitMeta:
          type: boolean
          default: false
          description: When true, returns envelope with trait metadata

    Resource:
      type: object
      required:
        - id
        - name
        - description
        - type
        - category
        - tags
        - author
        - version
        - downloads
        - rating
        - reviews
        - featured
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        type:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        author:
          type: string
        version:
          type: string
        downloads:
          type: integer
        rating:
          type: number
        reviews:
          type: integer
        featured:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        icon:
          type: string
        previewImage:
          type: string

    ResourceSearchMeta:
      type: object
      required:
        - enabled
        - used
        - confidence
        - traitFilters
        - requiredAgentIds
        - fallbackToBroadSearch
        - beforeTraitCount
        - afterTraitCount
      properties:
        enabled:
          type: boolean
        used:
          type: boolean
        confidence:
          type: string
          nullable: true
          enum: [high, medium, low]
        traitFilters:
          type: array
          items:
            type: string
        requiredAgentIds:
          type: array
          items:
            type: string
        fallbackToBroadSearch:
          type: boolean
        beforeTraitCount:
          type: integer
        afterTraitCount:
          type: integer

    ResourceSearchEnvelope:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Resource"
        traitScreen:
          $ref: "#/components/schemas/ResourceSearchMeta"

    ResourceSearchProtocolActor:
      type: object
      properties:
        id:
          type: string
        roles:
          type: array
          items:
            type: string

    ResourceSearchProtocolTrace:
      type: object
      required:
        - correlation_id
        - causation_id
      properties:
        correlation_id:
          type: string
        causation_id:
          type: string
          nullable: true

    ResourceSearchProtocolRequestEnvelope:
      type: object
      required:
        - id
        - spec
        - type
        - tenant
        - resource
        - sent_at
        - trace
        - payload
      properties:
        id:
          type: string
        spec:
          type: string
          example: sgp/0.1
        type:
          type: string
          enum: [RESOURCE.SEARCH.REQUEST]
        tenant:
          type: string
        resource:
          type: string
        sent_at:
          type: string
          format: date-time
        actor:
          $ref: "#/components/schemas/ResourceSearchProtocolActor"
        trace:
          $ref: "#/components/schemas/ResourceSearchProtocolTrace"
        payload:
          $ref: "#/components/schemas/ResourceSearchRequest"

    ResourceSearchProtocolResponseEnvelope:
      type: object
      required:
        - id
        - spec
        - type
        - tenant
        - resource
        - sent_at
        - trace
        - payload
      properties:
        id:
          type: string
        spec:
          type: string
          example: sgp/0.1
        type:
          type: string
          enum: [RESOURCE.SEARCH.RESPONSE]
        tenant:
          type: string
        resource:
          type: string
        sent_at:
          type: string
          format: date-time
        actor:
          $ref: "#/components/schemas/ResourceSearchProtocolActor"
        trace:
          $ref: "#/components/schemas/ResourceSearchProtocolTrace"
        payload:
          oneOf:
            - type: array
              items:
                $ref: "#/components/schemas/Resource"
            - $ref: "#/components/schemas/ResourceSearchEnvelope"

    ResourceSearchProtocolValidationError:
      type: object
      properties:
        message:
          type: string
          example: Invalid RESOURCE.SEARCH.REQUEST envelope
        errors:
          type: array
          items:
            type: string

paths:
  # Authentication Endpoints
  /auth/login:
    post:
      tags:
        - auth
      summary: User login
      description: Authenticate user and generate JWT tokens
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginDto"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Too many requests - rate limit exceeded

  /auth/register:
    post:
      tags:
        - auth
      summary: User registration
      description: Create a new user account
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterDto"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid registration data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "409":
          description: Email already registered

  /auth/refresh:
    post:
      tags:
        - auth
      summary: Refresh authentication token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid refresh token

  /auth/logout:
    post:
      tags:
        - auth
      summary: User logout
      operationId: logout
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
        "401":
          description: Not authenticated

  /auth/me:
    get:
      tags:
        - auth
      summary: Get current user
      operationId: getCurrentUser
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Current user information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated

  # Resource Endpoints
  /resources/search:
    post:
      tags:
        - resources
      summary: Search resources with optional trait screening
      description: |
        Returns a legacy resource array by default.
        When `includeTraitMeta=true`, returns an envelope with `{ items, traitScreen }`.
      operationId: searchResources
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResourceSearchRequest"
      responses:
        "200":
          description: Resource search results
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items:
                      $ref: "#/components/schemas/Resource"
                  - $ref: "#/components/schemas/ResourceSearchEnvelope"
        "400":
          description: Invalid request body

  /resources/search/protocol:
    post:
      tags:
        - resources
      summary: Protocol-envelope resource search bridge
      description: |
        Accepts either:
        - `RESOURCE.SEARCH.REQUEST` protocol envelope, or
        - plain `ResourceSearchRequest` filter object.

        Always returns a `RESOURCE.SEARCH.RESPONSE` envelope.
      operationId: searchResourcesProtocol
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/ResourceSearchProtocolRequestEnvelope"
                - $ref: "#/components/schemas/ResourceSearchRequest"
      responses:
        "200":
          description: Protocol-envelope search response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceSearchProtocolResponseEnvelope"
        "400":
          description: Invalid protocol envelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceSearchProtocolValidationError"

  # Agent Endpoints
  /agents:
    get:
      tags:
        - Agents
      summary: Get all agents
      operationId: getAgents
      security:
        - BearerAuth: []
      parameters:
        - name: type
          in: query
          schema:
            $ref: "#/components/schemas/AgentType"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/AgentStatus"
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentResponseDto"

    post:
      tags:
        - Agents
      summary: Create a new agent
      operationId: createAgent
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentDto"
      responses:
        "201":
          description: Agent created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentResponseDto"
        "400":
          description: Invalid agent data

  /agents/active:
    get:
      tags:
        - Agents
      summary: Get active agents
      operationId: getActiveAgents
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of active agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentResponseDto"

  /agents/stats/types:
    get:
      tags:
        - Agents
      summary: Get agent count by type
      operationId: getAgentTypeCounts
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Agent counts by type
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: integer

  /agents/{id}:
    get:
      tags:
        - Agents
      summary: Get agent by ID
      operationId: getAgentById
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentResponseDto"
        "404":
          description: Agent not found

    put:
      tags:
        - Agents
      summary: Update agent
      operationId: updateAgent
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentDto"
      responses:
        "200":
          description: Agent updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentResponseDto"
        "404":
          description: Agent not found

    delete:
      tags:
        - Agents
      summary: Delete agent
      operationId: deleteAgent
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Agent deleted successfully
        "404":
          description: Agent not found

  /agents/{id}/stats:
    get:
      tags:
        - Agents
      summary: Get agent statistics
      operationId: getAgentStats
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent statistics
          content:
            application/json:
              schema:
                type: object
