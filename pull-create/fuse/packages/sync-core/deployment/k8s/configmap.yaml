apiVersion: v1
kind: ConfigMap
metadata:
  name: sync-core-config
  namespace: the-new-fuse
  labels:
    app: sync-core
data:
  sync-batch-size: "50"
  sync-timeout: "30000"
  conflict-strategy: "latest_wins"
  cache-size-mb: "256"
  max-connections: "100"
  log-level: "info"

  # Performance tuning
  debounce-file-changes-ms: "500"
  notification-batch-size: "100"
  redis-pool-size: "10"

  # Feature flags
  enable-metrics: "true"
  enable-health-checks: "true"
  enable-audit-logs: "true"
