name: Debug and Remediate Deployment Failure

on:
  workflow_run:
    workflows: ["Deploy to Railway"]
    types:
      - completed

jobs:
  debug-failure:
    name: Debug Deployment Failure
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download logs from failed run
        uses: actions/download-artifact@v4
        with:
          name: railway-deploy-logs-${{ github.event.workflow_run.id }}
          path: ./deployment-logs

      - name: Analyze Failure for Known Issues
        id: analysis
        run: |
          if ! [ -d "./deployment-logs" ] || [ -z "$(ls -A ./deployment-logs)" ]; then
            echo "No log files found. Skipping analysis."
            echo "error_type=unknown" >> $GITHUB_OUTPUT
            exit 0
          fi

          LOG_FILE=$(find ./deployment-logs -type f | head -n 1)
          if grep -q "ReferenceError: require is not defined" "$LOG_FILE"; then
            echo "Detected ESM/CJS module issue."
            echo "error_type=module_conflict" >> $GITHUB_OUTPUT
            grep "file://" "$LOG_FILE" | head -n 1 | sed -n 's/.*file:\/\/\.\/\(.*\):[0-9]*:[0-9]*.*/\1/p' > failing_file.txt
          fi

      - name: Analyze logs and create issue
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const logDir = './deployment-logs';
            let logContent = 'Could not retrieve deployment logs.';

            if (fs.existsSync(logDir)) {
              const logFiles = fs.readdirSync(logDir);
              if (logFiles.length > 0) {
                logContent = fs.readFileSync(path.join(logDir, logFiles[0]), 'utf8');
              }
            }

            const issueBody = `###  автоматическая диагностика сбоя развертывания :mag:

**Workflow Run:** ${{ github.event.workflow_run.id }}
**Commit:** ${{ github.event.workflow_run.head_sha }}

An automated analysis of the deployment failure has been initiated.

#### Deployment Logs:
<details>
<summary>Click to expand</summary>

` + "```\n" + logContent.slice(-5000) + "\n```" + `

</details>

Next steps for the remediation agent:
- Analyze the logs for common error patterns.
- Correlate failure with recent code changes.
- Attempt automated fixes for known issues.
`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Automated Debug: Deployment Failure in run ${{ github.event.workflow_run.id }}',
              body: issueBody,
              labels: ['bug', 'deployment-failure', 'agent-task']
            });

      - name: Upload failing file path artifact
        if: steps.analysis.outputs.error_type == 'module_conflict'
        uses: actions/upload-artifact@v4
        with:
          name: failing-file-${{ github.event.workflow_run.head_sha }}
          path: failing_file.txt

      - name: Trigger Module Fixer Agent
        if: steps.analysis.outputs.error_type == 'module_conflict'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'module-fixer.yml',
              ref: 'main',
              inputs: {
                failed_commit_sha: '${{ github.event.workflow_run.head_sha }}'
              }
            });
