groups:
  - name: infrastructure_recording_rules
    interval: 30s
    rules:
      # CPU usage recording rules
      - record: instance:cpu_usage:rate5m
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)

      - record: instance:cpu_usage:rate1m
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[1m])) * 100)

      # Memory usage recording rules
      - record: instance:memory_usage:percentage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100

      - record: instance:memory_available:bytes
        expr: node_memory_MemAvailable_bytes

      # Disk usage recording rules
      - record: instance:disk_usage:percentage
        expr: (node_filesystem_size_bytes{fstype!="tmpfs"} - node_filesystem_avail_bytes{fstype!="tmpfs"}) / node_filesystem_size_bytes{fstype!="tmpfs"} * 100

      - record: instance:disk_available:percentage
        expr: node_filesystem_avail_bytes{fstype!="tmpfs"} / node_filesystem_size_bytes{fstype!="tmpfs"} * 100

      # Network I/O recording rules
      - record: instance:network_receive:rate5m
        expr: rate(node_network_receive_bytes_total[5m])

      - record: instance:network_transmit:rate5m
        expr: rate(node_network_transmit_bytes_total[5m])

      # Load average recording rules
      - record: instance:load1
        expr: node_load1

      - record: instance:load5
        expr: node_load5

      - record: instance:load15
        expr: node_load15

  - name: application_recording_rules
    interval: 30s
    rules:
      # HTTP request rate recording rules
      - record: job:http_requests:rate5m
        expr: sum(rate(http_requests_total[5m])) by (job)

      - record: job:http_requests:rate1m
        expr: sum(rate(http_requests_total[1m])) by (job)

      # HTTP error rate recording rules
      - record: job:http_errors:rate5m
        expr: sum(rate(http_requests_total{status=~"5.."}[5m])) by (job)

      - record: job:http_error_rate:percentage
        expr: sum(rate(http_requests_total{status=~"5.."}[5m])) by (job) / sum(rate(http_requests_total[5m])) by (job) * 100

      # Response time recording rules
      - record: job:http_request_duration:p50
        expr: histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket[5m])) by (job, le))

      - record: job:http_request_duration:p95
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (job, le))

      - record: job:http_request_duration:p99
        expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (job, le))

      # Service availability recording rules
      - record: job:up:percentage
        expr: avg(up) by (job) * 100

  - name: database_recording_rules
    interval: 30s
    rules:
      # PostgreSQL connection recording rules
      - record: postgres:connections:percentage
        expr: pg_stat_database_numbackends / pg_settings_max_connections * 100

      - record: postgres:connections:active
        expr: pg_stat_database_numbackends

      # PostgreSQL query performance recording rules
      - record: postgres:queries:rate5m
        expr: rate(pg_stat_database_xact_commit[5m]) + rate(pg_stat_database_xact_rollback[5m])

      - record: postgres:query_efficiency:percentage
        expr: rate(pg_stat_database_tup_returned[5m]) / rate(pg_stat_database_tup_fetched[5m]) * 100

      # PostgreSQL cache hit ratio
      - record: postgres:cache_hit_ratio:percentage
        expr: pg_stat_database_blks_hit / (pg_stat_database_blks_hit + pg_stat_database_blks_read) * 100

      # PostgreSQL locks
      - record: postgres:locks:count
        expr: pg_locks_count

  - name: redis_recording_rules
    interval: 30s
    rules:
      # Redis memory recording rules
      - record: redis:memory_usage:percentage
        expr: redis_memory_used_bytes / redis_memory_max_bytes * 100

      - record: redis:memory_used:bytes
        expr: redis_memory_used_bytes

      # Redis operations recording rules
      - record: redis:commands:rate5m
        expr: rate(redis_commands_processed_total[5m])

      - record: redis:keyspace_hits:rate5m
        expr: rate(redis_keyspace_hits_total[5m])

      - record: redis:keyspace_misses:rate5m
        expr: rate(redis_keyspace_misses_total[5m])

      # Redis hit rate recording rules
      - record: redis:hit_rate:percentage
        expr: rate(redis_keyspace_hits_total[5m]) / (rate(redis_keyspace_hits_total[5m]) + rate(redis_keyspace_misses_total[5m])) * 100

      # Redis connections recording rules
      - record: redis:connected_clients:count
        expr: redis_connected_clients

      - record: redis:blocked_clients:count
        expr: redis_blocked_clients

  - name: container_recording_rules
    interval: 30s
    rules:
      # Container CPU recording rules
      - record: container:cpu_usage:rate5m
        expr: rate(container_cpu_usage_seconds_total[5m]) * 100

      - record: container:cpu_usage:percentage
        expr: rate(container_cpu_usage_seconds_total[5m]) / container_spec_cpu_quota * 100

      # Container memory recording rules
      - record: container:memory_usage:percentage
        expr: container_memory_usage_bytes / container_spec_memory_limit_bytes * 100

      - record: container:memory_usage:bytes
        expr: container_memory_usage_bytes

      # Container network recording rules
      - record: container:network_receive:rate5m
        expr: rate(container_network_receive_bytes_total[5m])

      - record: container:network_transmit:rate5m
        expr: rate(container_network_transmit_bytes_total[5m])

      # Container restart recording rules
      - record: container:restarts:rate1h
        expr: increase(container_start_time_seconds[1h])

  - name: nginx_recording_rules
    interval: 30s
    rules:
      # Nginx request recording rules
      - record: nginx:requests:rate5m
        expr: rate(nginx_http_requests_total[5m])

      - record: nginx:requests:rate1m
        expr: rate(nginx_http_requests_total[1m])

      # Nginx error recording rules
      - record: nginx:errors:rate5m
        expr: rate(nginx_http_requests_total{status=~"5.."}[5m])

      - record: nginx:error_rate:percentage
        expr: rate(nginx_http_requests_total{status=~"5.."}[5m]) / rate(nginx_http_requests_total[5m]) * 100

      # Nginx response time recording rules
      - record: nginx:response_time:average
        expr: nginx_http_request_duration_seconds_sum / nginx_http_request_duration_seconds_count

      - record: nginx:upstream_response_time:average
        expr: nginx_upstream_response_time

      # Nginx connections recording rules
      - record: nginx:active_connections:count
        expr: nginx_connections_active

      - record: nginx:waiting_connections:count
        expr: nginx_connections_waiting