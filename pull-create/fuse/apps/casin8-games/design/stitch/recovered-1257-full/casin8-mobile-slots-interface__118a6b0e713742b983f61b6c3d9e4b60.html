<html class="dark"><head>
<meta charset="utf-8"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#f4c025",
            "background-light": "#f8f8f5",
            "background-dark": "#221e10",
          },
          fontFamily: {
            "display": ["Spline Sans"]
          },
          borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
        },
      },
    }
  </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<!-- Mobile Wrapper (Simulating 390px) -->
<div class="relative mx-auto min-h-screen w-full max-w-[390px] flex flex-col bg-background-dark overflow-hidden border-x border-primary/10">
<!-- Top Navigation -->
<header class="flex items-center justify-between px-6 py-4 border-b border-primary/10 bg-background-dark/80 backdrop-blur-md sticky top-0 z-50">
<div class="flex items-center gap-2">
<div class="text-primary">
<svg class="w-6 h-6" fill="currentColor" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M24 45.8096C19.6865 45.8096 15.4698 44.5305 11.8832 42.134C8.29667 39.7376 5.50128 36.3314 3.85056 32.3462C2.19985 28.361 1.76794 23.9758 2.60947 19.7452C3.451 15.5145 5.52816 11.6284 8.57829 8.5783C11.6284 5.52817 15.5145 3.45101 19.7452 2.60948C23.9758 1.76795 28.361 2.19986 32.3462 3.85057C36.3314 5.50129 39.7376 8.29668 42.134 11.8833C44.5305 15.4698 45.8096 19.6865 45.8096 24L24 24L24 45.8096Z"></path>
</svg>
</div>
<h1 class="text-lg font-bold tracking-tight">Casin8</h1>
</div>
<div class="flex items-center gap-3">
<div class="bg-primary/10 px-3 py-1 rounded-full flex items-center gap-1 border border-primary/20">
<span class="material-symbols-outlined text-primary text-sm">payments</span>
<span class="text-xs font-bold text-primary">0.024 ETH</span>
</div>
<div class="size-8 rounded-full bg-slate-800 border border-primary/20 overflow-hidden">
<img class="w-full h-full object-cover" data-alt="User profile avatar placeholder" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC8YZ8Okh7M2r_bnHiuIOxoM5FnLRZbKy34XE61xGROFOtM-oTrhboNZHOnRcLOaUChz4hG5Yn0IunnD8F1p9Ch_hBIjc6s_p3pcmRANDvs2pXyrIipdVKKuGi3nAyvEmM-J4pR-9vlIawvG-YRMar61z1qctx_CCli37QtssDiEKLcf-O-qkj-i0lJrt_JcUjWdxFOnq8wu0W8h-TVWlJtvmdeBQWBiQv9eAV9bnyxoZO8WqKM5Gu_JQjTZRsi9m6Nd-HZ0YjPojdI"/>
</div>
</div>
</header>
<!-- Main Game Area -->
<main class="flex-1 flex flex-col items-center py-6 px-4">
<!-- Title & Jackpot -->
<div class="text-center mb-6">
<h2 class="text-2xl font-bold text-white mb-1">Emerald Fortune</h2>
<div class="flex items-center justify-center gap-2">
<span class="text-[10px] uppercase tracking-widest text-primary font-bold">Jackpot</span>
<span class="text-lg font-mono font-bold text-white">Ξ 12.450</span>
</div>
</div>
<!-- Slot Machine View -->
<div class="w-full aspect-[4/5] bg-gradient-to-b from-primary/5 to-background-dark border-4 border-primary/20 rounded-xl relative overflow-hidden shadow-2xl shadow-primary/5">
<!-- Reel Reflections -->
<div class="absolute inset-0 bg-gradient-to-r from-background-dark/40 via-transparent to-background-dark/40 z-10 pointer-events-none"></div>
<div class="absolute inset-0 bg-gradient-to-b from-background-dark/30 via-transparent to-background-dark/30 z-10 pointer-events-none"></div>
<!-- Three Reels -->
<div class="flex h-full p-2 gap-2">
<!-- Reel 1 -->
<div class="flex-1 bg-slate-900/50 rounded-lg flex flex-col gap-4 py-4 overflow-hidden border border-white/5">
<div class="w-full aspect-square flex items-center justify-center grayscale opacity-30">
<span class="material-symbols-outlined text-5xl text-emerald-400">diamond</span>
</div>
<div class="w-full aspect-square flex items-center justify-center bg-emerald-500/10 rounded-lg border border-emerald-500/30 scale-110 shadow-lg shadow-emerald-500/10">
<span class="material-symbols-outlined text-5xl text-emerald-400">eco</span>
</div>
<div class="w-full aspect-square flex items-center justify-center grayscale opacity-30">
<span class="material-symbols-outlined text-5xl text-emerald-400">stat_3</span>
</div>
</div>
<!-- Reel 2 -->
<div class="flex-1 bg-slate-900/50 rounded-lg flex flex-col gap-4 py-4 overflow-hidden border border-white/5">
<div class="w-full aspect-square flex items-center justify-center grayscale opacity-30">
<span class="material-symbols-outlined text-5xl text-emerald-400">stat_3</span>
</div>
<div class="w-full aspect-square flex items-center justify-center bg-emerald-500/10 rounded-lg border border-emerald-500/30 scale-110 shadow-lg shadow-emerald-500/10">
<span class="material-symbols-outlined text-5xl text-emerald-400">eco</span>
</div>
<div class="w-full aspect-square flex items-center justify-center grayscale opacity-30">
<span class="material-symbols-outlined text-5xl text-emerald-400">diamond</span>
</div>
</div>
<!-- Reel 3 -->
<div class="flex-1 bg-slate-900/50 rounded-lg flex flex-col gap-4 py-4 overflow-hidden border border-white/5">
<div class="w-full aspect-square flex items-center justify-center grayscale opacity-30">
<span class="material-symbols-outlined text-5xl text-emerald-400">diamond</span>
</div>
<div class="w-full aspect-square flex items-center justify-center bg-emerald-500/10 rounded-lg border border-emerald-500/30 scale-110 shadow-lg shadow-emerald-500/10">
<span class="material-symbols-outlined text-5xl text-emerald-400">eco</span>
</div>
<div class="w-full aspect-square flex items-center justify-center grayscale opacity-30">
<span class="material-symbols-outlined text-5xl text-emerald-400">stat_3</span>
</div>
</div>
</div>
<!-- Win Line -->
<div class="absolute top-1/2 left-0 w-full h-0.5 bg-primary/40 z-20 shadow-[0_0_10px_rgba(244,192,37,0.5)]"></div>
</div>
<!-- Stats -->
<div class="w-full grid grid-cols-2 gap-4 mt-6">
<div class="bg-primary/5 border border-primary/10 p-3 rounded-lg text-center">
<p class="text-[10px] uppercase text-slate-400 font-bold mb-1">Total Bet</p>
<p class="text-white font-bold">0.005 ETH</p>
</div>
<div class="bg-emerald-500/5 border border-emerald-500/10 p-3 rounded-lg text-center">
<p class="text-[10px] uppercase text-emerald-400 font-bold mb-1">Last Win</p>
<p class="text-emerald-400 font-bold">0.000 ETH</p>
</div>
</div>
</main>
<!-- Controls & Actions -->
<div class="mt-auto bg-background-dark/95 backdrop-blur-xl border-t border-primary/10 p-6 space-y-6">
<!-- Bet Stepper and Auto Spin -->
<div class="flex items-center justify-between gap-4">
<div class="flex items-center bg-slate-800/50 rounded-full border border-primary/20 p-1">
<button class="size-8 flex items-center justify-center text-primary hover:bg-primary/10 rounded-full">
<span class="material-symbols-outlined text-xl">remove</span>
</button>
<div class="px-4 text-center">
<p class="text-[10px] text-slate-400 leading-none">BET</p>
<p class="font-bold text-sm">0.005</p>
</div>
<button class="size-8 flex items-center justify-center text-primary hover:bg-primary/10 rounded-full">
<span class="material-symbols-outlined text-xl">add</span>
</button>
</div>
<div class="flex items-center gap-2">
<span class="text-xs font-medium text-slate-400">AUTO</span>
<button class="w-10 h-6 bg-slate-800 rounded-full relative p-1 border border-primary/20">
<div class="w-4 h-4 bg-slate-500 rounded-full"></div>
</button>
</div>
</div>
<!-- Spin Button Container -->
<div class="relative group">
<!-- Low Balance Badge Overlay -->
<div class="absolute -top-3 left-1/2 -translate-x-1/2 z-20 bg-red-600 text-white text-[10px] font-bold px-3 py-1 rounded-full shadow-lg border border-red-400 whitespace-nowrap">
          LOW BALANCE
        </div>
<button class="w-full py-5 bg-primary text-background-dark rounded-xl font-black text-xl tracking-widest shadow-[0_0_30px_rgba(244,192,37,0.4)] flex items-center justify-center gap-3 active:scale-95 transition-transform opacity-70 cursor-not-allowed overflow-hidden relative">
<!-- Gold Glow Effect -->
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full"></div>
<span class="material-symbols-outlined text-3xl">play_arrow</span>
          SPIN
        </button>
</div>
</div>
<!-- Bottom Tab Bar -->
<nav class="flex items-center justify-around py-3 px-2 bg-background-dark border-t border-primary/5">
<button class="flex flex-col items-center gap-1 text-slate-500">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium">Home</span>
</button>
<button class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">casino</span>
<span class="text-[10px] font-medium">Games</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-500">
<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="text-[10px] font-medium">Wallet</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-500">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-medium">Profile</span>
</button>
</nav>
<!-- SafeArea Bottom -->
<div class="h-6 bg-background-dark w-full"></div>
</div>
</body></html>
