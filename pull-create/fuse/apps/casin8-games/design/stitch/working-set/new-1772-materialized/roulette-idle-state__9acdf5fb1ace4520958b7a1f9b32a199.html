<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Roulette Idle State - Casin8</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2bee6c",
                        "background-light": "#f6f8f6",
                        "background-dark": "#0a120d",
                        "surface-dark": "#162a1c",
                        "accent-gold": "#d4af37"
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .cinematic-gradient {
            background: radial-gradient(circle at center, #1a3a2a 0%, #0a120d 100%);
        }
        .glass-panel {
            background: rgba(22, 42, 28, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(43, 238, 108, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 overflow-hidden">
<div class="relative flex h-screen w-full flex-col max-w-[430px] mx-auto shadow-2xl cinematic-gradient">
<!-- Header Section -->
<header class="flex items-center justify-between p-4 pt-6">
<div class="flex items-center gap-2">
<div class="bg-primary p-1.5 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-background-dark font-bold text-xl">casino</span>
</div>
<h1 class="text-xl font-bold tracking-tight text-slate-100 uppercase">Casin8</h1>
</div>
<div class="flex items-center gap-3">
<div class="bg-primary/10 border border-primary/20 px-3 py-1 rounded-full flex items-center gap-1.5">
<span class="size-2 bg-primary rounded-full animate-pulse"></span>
<span class="text-[10px] font-bold uppercase tracking-widest text-primary">Low Latency</span>
</div>
<div class="flex flex-col items-end">
<span class="text-[10px] text-primary/60 font-medium uppercase tracking-tighter">Balance</span>
<p class="text-slate-100 font-bold leading-none">$12,450.00</p>
</div>
</div>
</header>
<!-- Main Stage: 3D Roulette Wheel -->
<main class="flex-1 flex flex-col items-center justify-center relative px-4 overflow-hidden">
<div class="relative w-full aspect-square flex items-center justify-center">
<!-- Outer Glow -->
<div class="absolute inset-0 bg-primary/5 rounded-full blur-3xl"></div>
<!-- Placeholder for 3D Roulette Wheel -->
<div class="relative w-64 h-64 md:w-80 md:h-80 rounded-full border-[8px] border-slate-800 shadow-[0_0_50px_rgba(0,0,0,0.8)] overflow-hidden flex items-center justify-center group" data-alt="Premium gold and black 3D roulette wheel detail" style="background: conic-gradient(from 0deg, #111, #222, #111, #222, #111);">
<!-- Decorative inner rings -->
<div class="absolute inset-2 border border-accent-gold/20 rounded-full"></div>
<div class="absolute inset-8 border-4 border-slate-900 rounded-full shadow-inner"></div>
<!-- Roulette Center Hub -->
<div class="w-24 h-24 rounded-full bg-gradient-to-br from-accent-gold via-yellow-200 to-accent-gold shadow-lg flex items-center justify-center z-10 border-4 border-slate-900">
<span class="material-symbols-outlined text-slate-900 text-3xl font-bold">star</span>
</div>
<!-- Number slots decoration -->
<div class="absolute inset-0 opacity-40">
<div class="w-full h-full border-[20px] border-dashed border-slate-700 rounded-full"></div>
</div>
</div>
<!-- Last Results Floating -->
<div class="absolute top-0 right-4 flex flex-col gap-2">
<div class="size-8 rounded-full bg-red-600 flex items-center justify-center text-xs font-bold border-2 border-white/10">32</div>
<div class="size-8 rounded-full bg-slate-900 flex items-center justify-center text-xs font-bold border-2 border-white/10">15</div>
<div class="size-8 rounded-full bg-primary flex items-center justify-center text-xs font-bold border-2 border-slate-900 text-background-dark">0</div>
</div>
</div>
<!-- Compact Betting Grid -->
<div class="w-full mt-6 grid grid-cols-6 gap-1 glass-panel p-2 rounded-xl">
<div class="col-span-1 bg-primary/20 border border-primary/40 h-10 rounded flex items-center justify-center text-primary font-bold text-xs italic">0</div>
<div class="col-span-5 grid grid-cols-5 gap-1">
<!-- Sample squares for visual -->
<div class="h-10 bg-red-600/30 border border-red-500/30 rounded flex items-center justify-center text-[10px] font-bold">1</div>
<div class="h-10 bg-slate-800 border border-slate-700 rounded flex items-center justify-center text-[10px] font-bold">2</div>
<div class="h-10 bg-red-600/30 border border-red-500/30 rounded flex items-center justify-center text-[10px] font-bold">3</div>
<div class="h-10 bg-slate-800 border border-slate-700 rounded flex items-center justify-center text-[10px] font-bold">4</div>
<div class="h-10 bg-red-600/30 border border-red-500/30 rounded flex items-center justify-center text-[10px] font-bold">5</div>
</div>
<!-- Controls Row -->
<div class="col-span-6 flex justify-between gap-1 mt-1">
<div class="flex-1 bg-slate-800/50 py-1.5 rounded text-[9px] text-center font-bold uppercase text-slate-400">1st 12</div>
<div class="flex-1 bg-red-600/20 py-1.5 rounded text-[9px] text-center font-bold uppercase text-red-400">Red</div>
<div class="flex-1 bg-slate-800/50 py-1.5 rounded text-[9px] text-center font-bold uppercase text-slate-100">Black</div>
<div class="flex-1 bg-slate-800/50 py-1.5 rounded text-[9px] text-center font-bold uppercase text-slate-400">Even</div>
</div>
</div>
</main>
<!-- Trust Drawer -->
<div class="mx-4 mb-4 glass-panel rounded-xl p-3 flex items-center justify-between border-t border-primary/10">
<div class="flex flex-col">
<span class="text-[10px] font-bold uppercase text-primary/60 tracking-widest">Provably Fair Seed</span>
<p class="text-[11px] font-mono text-slate-400 truncate w-40">f7a2...9b1c5e4d8a2f1b0c9e8d7a6</p>
</div>
<button class="bg-primary/20 hover:bg-primary/30 text-primary text-xs font-bold px-4 py-2 rounded-lg transition-colors flex items-center gap-1">
<span class="material-symbols-outlined text-sm">verified_user</span>
                Verify
            </button>
</div>
<!-- Sticky Bottom Bar -->
<div class="bg-background-dark/95 border-t border-slate-800 p-4 pb-8 backdrop-blur-md">
<div class="flex items-center justify-between gap-4">
<!-- Chip Selector -->
<div class="flex gap-2">
<button class="size-10 rounded-full bg-slate-800 border-2 border-slate-600 flex items-center justify-center text-[10px] font-bold text-slate-300 shadow-lg active:scale-95 transition-transform">10</button>
<button class="size-10 rounded-full bg-blue-600 border-2 border-blue-400 flex items-center justify-center text-[10px] font-bold text-white shadow-lg active:scale-95 transition-transform">50</button>
<button class="size-10 rounded-full bg-primary border-2 border-white/30 flex items-center justify-center text-[10px] font-bold text-background-dark shadow-lg ring-4 ring-primary/20 active:scale-95 transition-transform">100</button>
<button class="size-10 rounded-full bg-purple-600 border-2 border-purple-400 flex items-center justify-center text-[10px] font-bold text-white shadow-lg active:scale-95 transition-transform">500</button>
</div>
<!-- Action Buttons -->
<div class="flex-1 flex gap-2">
<button class="flex-1 bg-primary text-background-dark font-black py-3 rounded-xl flex items-center justify-center gap-2 shadow-[0_0_20px_rgba(43,238,108,0.4)] active:brightness-90 uppercase tracking-tighter">
<span class="material-symbols-outlined fill-1">play_arrow</span>
                        Spin
                    </button>
</div>
</div>
</div>
<!-- System Nav Tab -->
<nav class="flex justify-around items-center border-t border-slate-800 bg-background-dark px-4 py-2">
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined">casino</span>
<span class="text-[9px] font-medium uppercase">Play</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined">history</span>
<span class="text-[9px] font-medium uppercase">History</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="text-[9px] font-medium uppercase">Wallet</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="text-[9px] font-medium uppercase">Settings</span>
</a>
</nav>
</div>
</body></html>
