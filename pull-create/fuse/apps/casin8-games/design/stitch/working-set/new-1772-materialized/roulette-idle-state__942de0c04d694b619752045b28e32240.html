<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Royal Blue Space-Tech Roulette - Casin8</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&amp;family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "royal-blue": "#002366",
                        "midnight": "#020817",
                        "cyan-tech": "#00f2ff",
                        "titanium": "#a1a1aa",
                        "glass-border": "rgba(0, 242, 255, 0.2)"
                    },
                    fontFamily: {
                        "display": ["Orbitron", "sans-serif"],
                        "body": ["Space Grotesk", "sans-serif"]
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        :root {
            --bg-gradient: radial-gradient(circle at 70% 30%, #0a1931 0%, #020817 100%);
            --titanium-texture: linear-gradient(145deg, #27272a 0%, #09090b 100%);
        }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-gradient);
            -webkit-tap-highlight-color: transparent;
        }
        .tech-font { font-family: 'Orbitron', sans-serif; }
        .glass-morphism {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
        }
        .holographic-glow {
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.15), inset 0 0 15px rgba(0, 242, 255, 0.1);
        }
        .vertical-text {
            writing-mode: vertical-rl;
            text-orientation: mixed;
        }
        .titanium-brushed {
            background: var(--titanium-texture);
            border: 1px solid #3f3f46;
        }
        .cyan-pulse {
            text-shadow: 0 0 8px rgba(0, 242, 255, 0.6);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-slate-100 overflow-hidden">
<div class="relative flex h-screen w-full flex-col max-w-[430px] mx-auto shadow-2xl border-x border-white/5">
<header class="flex items-center justify-between p-5 pt-8 z-20">
<div class="flex items-center gap-3">
<div class="size-10 rounded bg-cyan-tech/10 border border-cyan-tech flex items-center justify-center shadow-[0_0_15px_rgba(0,242,255,0.3)]">
<span class="material-symbols-outlined text-cyan-tech font-bold text-2xl">rocket_launch</span>
</div>
<div>
<h1 class="text-lg font-black tracking-[0.2em] text-white uppercase tech-font">Casin8</h1>
<div class="flex items-center gap-1.5">
<span class="size-1.5 bg-cyan-tech rounded-full animate-pulse shadow-[0_0_5px_#00f2ff]"></span>
<span class="text-[8px] font-bold uppercase tracking-widest text-cyan-tech tech-font">System Nominal</span>
</div>
</div>
</div>
<div class="flex flex-col items-end">
<span class="text-[9px] text-titanium font-bold uppercase tracking-widest tech-font">Credits</span>
<p class="text-cyan-tech text-xl font-black tech-font cyan-pulse">$12,450.00</p>
</div>
</header>
<main class="flex-1 flex relative px-4 overflow-hidden">
<div class="w-16 h-full py-4 flex flex-col gap-2 z-10">
<div class="flex-1 titanium-brushed rounded-xl flex flex-col items-center justify-around py-4 opacity-90 border-r-2 border-cyan-tech/30">
<div class="vertical-text text-[10px] font-bold text-titanium tracking-widest tech-font uppercase">Outside Bets</div>
<button class="size-10 rounded border border-white/10 bg-red-600/20 text-red-400 text-[10px] font-black tech-font">R</button>
<button class="size-10 rounded border border-white/10 bg-slate-900 text-white text-[10px] font-black tech-font">B</button>
<button class="size-10 rounded border border-white/10 bg-cyan-tech/10 text-cyan-tech text-[10px] font-black tech-font">1-18</button>
<button class="size-10 rounded border border-white/10 bg-cyan-tech/10 text-cyan-tech text-[10px] font-black tech-font">EVN</button>
<div class="h-px w-8 bg-white/10"></div>
<button class="size-10 rounded-full titanium-brushed border border-cyan-tech/50 flex items-center justify-center">
<span class="material-symbols-outlined text-cyan-tech text-xl">layers</span>
</button>
</div>
</div>
<div class="flex-1 relative flex flex-col items-center justify-center ml-2">
<div class="absolute w-[120%] aspect-square bg-cyan-tech/5 rounded-full blur-[80px] -right-20"></div>
<div class="relative w-full aspect-square flex items-center justify-center -right-8 scale-110">
<div class="absolute inset-0 rounded-full border-2 border-cyan-tech/20 holographic-glow animate-[spin_20s_linear_infinite]"></div>
<div class="absolute inset-4 rounded-full border border-cyan-tech/10 border-dashed"></div>
<div class="relative size-64 rounded-full border-[10px] border-zinc-800 shadow-[20px_20px_60px_rgba(0,0,0,0.8)] overflow-hidden flex items-center justify-center group" style="background: conic-gradient(from 0deg, #020617, #1e1b4b, #020617, #1e1b4b, #020617);">
<div class="size-20 rounded-full titanium-brushed border-4 border-cyan-tech/30 shadow-2xl flex items-center justify-center z-20">
<div class="size-12 rounded-full bg-cyan-tech/10 border border-cyan-tech/40 flex items-center justify-center">
<span class="material-symbols-outlined text-cyan-tech text-2xl animate-pulse">radar</span>
</div>
</div>
<div class="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
<div class="absolute inset-0 border-[16px] border-dashed border-cyan-tech/10 rounded-full"></div>
</div>
</div>
<div class="absolute top-20 right-0 glass-morphism p-2 rounded-lg border-l-2 border-l-cyan-tech">
<p class="text-[8px] text-cyan-tech tech-font uppercase mb-1">Last Sequence</p>
<div class="flex flex-col gap-1">
<span class="text-xs font-bold tech-font text-white">32 <span class="text-[8px] text-red-500">RED</span></span>
<span class="text-xs font-bold tech-font text-white">15 <span class="text-[8px] text-slate-400">BLK</span></span>
<span class="text-xs font-bold tech-font text-cyan-tech">00 <span class="text-[8px]">NEU</span></span>
</div>
</div>
</div>
</main>
<div class="mx-4 mb-4 glass-morphism rounded-xl p-4 flex items-center justify-between">
<div class="flex flex-col">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-cyan-tech text-xs">security</span>
<span class="text-[9px] font-black uppercase text-cyan-tech/80 tracking-widest tech-font">Quantum Hash Protocol</span>
</div>
<p class="text-[10px] font-mono text-titanium/80 truncate w-44">SHA-256: 0x8f2d...b4e1</p>
</div>
<button class="bg-cyan-tech/10 border border-cyan-tech/30 hover:bg-cyan-tech/20 text-cyan-tech text-[10px] font-black tech-font px-4 py-2 rounded uppercase transition-all shadow-sm">
                Verify
            </button>
</div>
<div class="bg-midnight/90 border-t border-white/10 p-5 pb-10 backdrop-blur-2xl">
<div class="flex items-end justify-between gap-6">
<div class="flex-1">
<p class="text-[8px] tech-font text-titanium uppercase tracking-[0.2em] mb-3 ml-1">Selection Module</p>
<div class="flex gap-2.5">
<button class="size-11 rounded-lg titanium-brushed border border-white/20 flex items-center justify-center text-[11px] font-black text-white tech-font shadow-inner">10</button>
<button class="size-11 rounded-lg titanium-brushed border border-cyan-tech/40 flex items-center justify-center text-[11px] font-black text-cyan-tech tech-font shadow-[0_0_10px_rgba(0,242,255,0.2)] scale-110">100</button>
<button class="size-11 rounded-lg titanium-brushed border border-white/20 flex items-center justify-center text-[11px] font-black text-white tech-font">500</button>
<button class="size-11 rounded-lg titanium-brushed border border-white/20 flex items-center justify-center text-[11px] font-black text-white tech-font">1K</button>
</div>
</div>
<button class="h-16 w-32 bg-cyan-tech rounded-sm flex flex-col items-center justify-center relative overflow-hidden group">
<div class="absolute inset-0 bg-black/10 group-active:bg-black/30"></div>
<div class="absolute top-1 left-1 size-1.5 border-t border-l border-midnight"></div>
<div class="absolute bottom-1 right-1 size-1.5 border-b border-r border-midnight"></div>
<span class="text-midnight font-black text-lg tech-font tracking-tighter uppercase relative z-10">Ignite</span>
<span class="text-[8px] text-midnight/60 font-bold tech-font uppercase relative z-10">Sequence</span>
</button>
</div>
</div>
<nav class="flex justify-around items-center border-t border-white/5 bg-midnight px-6 py-3">
<a class="flex flex-col items-center gap-1.5 text-cyan-tech" href="#">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1">grid_view</span>
<span class="text-[8px] font-bold uppercase tech-font">Terminal</span>
</a>
<a class="flex flex-col items-center gap-1.5 text-titanium hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined text-2xl">monitoring</span>
<span class="text-[8px] font-bold uppercase tech-font">Stats</span>
</a>
<a class="flex flex-col items-center gap-1.5 text-titanium hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined text-2xl">account_balance_wallet</span>
<span class="text-[8px] font-bold uppercase tech-font">Vault</span>
</a>
<a class="flex flex-col items-center gap-1.5 text-titanium hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined text-2xl">settings_input_component</span>
<span class="text-[8px] font-bold uppercase tech-font">Config</span>
</a>
</nav>
</div>
<div class="fixed top-1/2 left-0 -translate-y-1/2 w-1 h-32 bg-cyan-tech/20 blur-sm pointer-events-none"></div>
<div class="fixed top-0 left-0 w-full h-px bg-gradient-to-r from-transparent via-cyan-tech/20 to-transparent pointer-events-none"></div>

</body></html>
