<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col overflow-hidden relative">
<!-- Background Tech Grid Overlay -->

<div class="flex flex-col items-center">

</div>

</div>

</div>
</div>

<div class="w-full px-2">
<div class="flex justify-between items-end mb-2">

<span class="text-white text-sm font-bold">68% <span class="text-slate-500 text-xs font-normal">vs</span> 32%</span>
</div>
<div class="h-3 w-full bg-slate-800 rounded-full overflow-hidden flex shadow-inner border border-slate-700">

<div class="h-full bg-slate-600/30" style="width: 32%"></div>

<div>

<span class="material-symbols-outlined text-[14px]">analytics</span>
                                Win: 68%
                            </div>
</div>
</div>
<!-- Trust Panel Badge -->
<div class="flex items-center gap-1.5 px-2 py-1 bg-green-900/20 border border-green-500/30 rounded text-green-400">
<span class="material-symbols-outlined text-[16px] fill-current">check_circle</span>
<div class="flex flex-col leading-none">
<span class="text-[8px] uppercase opacity-70">Tx Lifecycle</span>
<span class="text-[10px] font-bold uppercase tracking-wide">Committed</span>
</div>
</div>
</div>
<!-- Hand Cards -->
<div class="flex justify-center -space-x-2 relative z-10 pb-2">
<!-- Card 1 -->
<div class="w-16 h-24 bg-white rounded-lg border border-slate-300 shadow-2xl transform -rotate-3 hover:rotate-0 transition-transform duration-300 flex flex-col items-center justify-center relative overflow-hidden">
<span class="absolute top-1 left-1 text-xs font-bold text-slate-900">Q</span>
<span class="text-2xl text-slate-900">Q<span class="text-black">♠</span></span>
<span class="absolute bottom-1 right-1 text-xs font-bold text-slate-900 transform rotate-180">Q</span>
</div>
<!-- Card 2 -->
<div class="w-16 h-24 bg-white rounded-lg border border-slate-300 shadow-2xl transform rotate-6 hover:rotate-0 transition-transform duration-300 flex flex-col items-center justify-center relative overflow-hidden">
<span class="absolute top-1 left-1 text-xs font-bold text-slate-900">Q</span>
<span class="text-2xl text-slate-900">Q<span class="text-red-600">♦</span></span>
<span class="absolute bottom-1 right-1 text-xs font-bold text-slate-900 transform rotate-180">Q</span>
