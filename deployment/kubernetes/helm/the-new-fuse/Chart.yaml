apiVersion: v2
name: the-new-fuse
description: The New Fuse Platform - AI-Powered Development Environment
type: application
version: 1.0.0
appVersion: "1.0.0"
home: https://github.com/the-new-fuse/the-new-fuse
sources:
  - https://github.com/the-new-fuse/the-new-fuse
maintainers:
  - name: The New Fuse Team
    email: team@thenewfuse.com
keywords:
  - ai
  - development
  - mcp
  - agents
  - workflow
dependencies:
  - name: postgresql
    version: 12.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 17.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: prometheus
    version: 15.x.x
    repository: https://prometheus-community.github.io/helm-charts
    condition: monitoring.prometheus.enabled
  - name: grafana
    version: 6.x.x
    repository: https://grafana.github.io/helm-charts
    condition: monitoring.grafana.enabled
