{{- range $service := list "apiServer" "a2aService" "syncCore" "mcpCore" }}
{{- $config := index $.Values $service }}
{{- if $config.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $config.name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ $config.name }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/version: {{ $.Chart.AppVersion }}
    app.kubernetes.io/component: {{ $service }}
    app.kubernetes.io/part-of: the-new-fuse
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
spec:
  replicas: {{ $config.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $config.name }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $config.name }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/component: {{ $service }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ $config.service.port }}"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ $.Values.security.rbac.serviceAccountName }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: {{ $config.name }}
          image: "{{ $.Values.global.imageRegistry }}/{{ $.Values.global.imageRepository }}/{{ $config.image.repository }}:{{ $config.image.tag | default $.Values.global.imageTag }}"
          imagePullPolicy: {{ $config.image.pullPolicy | default $.Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $config.service.targetPort }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: {{ $.Values.global.environment }}
            - name: PORT
              value: "{{ $config.service.targetPort }}"
            {{- if $config.env }}
            {{- range $key, $value := $config.env }}
            - name: {{ $key }}
              value: "{{ $value }}"
            {{- end }}
            {{- end }}
            # Database connection
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.secrets.secretNames.database }}
                  key: url
            # Redis connection
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.secrets.secretNames.redis }}
                  key: url
            # JWT secrets
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.secrets.secretNames.jwt }}
                  key: secret
            # AI API keys
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.secrets.secretNames.ai }}
                  key: openai-key
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.secrets.secretNames.ai }}
                  key: anthropic-key
            # AWS credentials
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.secrets.secretNames.aws }}
                  key: access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.secrets.secretNames.aws }}
                  key: secret-access-key
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml $config.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/.cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
      {{- with $.Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}