<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>The New Fuse - Workflow Dependencies</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            overflow: hidden;
        }

        #header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        #header h1 {
            margin: 0;
            font-size: 28px;
        }

        #header p {
            margin: 5px 0 0 0;
            opacity: 0.9;
            font-size: 14px;
        }

        #controls {
            background: #1e293b;
            padding: 15px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        #controls button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        #controls button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        #controls select {
            background: #334155;
            color: white;
            border: 1px solid #475569;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
        }

        #visualization {
            width: 100%;
            height: calc(100vh - 140px);
        }

        .node circle {
            stroke: #fff;
            stroke-width: 2px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .node:hover circle {
            stroke-width: 4px;
            filter: brightness(1.2);
        }

        .node text {
            fill: #e2e8f0;
            font-size: 12px;
            font-weight: 500;
            pointer-events: none;
        }

        .link {
            fill: none;
            stroke: #64748b;
            stroke-width: 2px;
            opacity: 0.6;
            marker-end: url(#arrowhead);
        }

        .link.critical {
            stroke: #ef4444;
            stroke-width: 3px;
            opacity: 0.8;
        }

        .link.highlighted {
            stroke: #fbbf24;
            stroke-width: 4px;
            opacity: 1;
        }

        #tooltip {
            position: absolute;
            padding: 12px;
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid #475569;
            border-radius: 8px;
            color: white;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 13px;
            max-width: 300px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        #tooltip.visible {
            opacity: 1;
        }

        #tooltip h3 {
            margin: 0 0 8px 0;
            color: #a78bfa;
            font-size: 16px;
        }

        #tooltip .stat {
            margin: 4px 0;
        }

        #tooltip .label {
            color: #94a3b8;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>🔄 Workflow Dependencies</h1>
        <p>Interactive dependency graph showing workflow relationships and execution paths</p>
    </div>

    <div id="controls">
        <button onclick="resetZoom()">Reset View</button>
        <button onclick="togglePhysics()">Toggle Physics</button>
        <select id="layoutSelect" onchange="changeLayout()">
            <option value="force">Force Layout</option>
            <option value="hierarchy">Hierarchical</option>
            <option value="radial">Radial</option>
        </select>
        <select id="filterSelect" onchange="filterWorkflows()">
            <option value="all">All Workflows</option>
            <option value="critical">Critical Path Only</option>
            <option value="user">User Initiated</option>
            <option value="automated">Automated</option>
        </select>
    </div>

    <svg id="visualization"></svg>
    <div id="tooltip"></div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
        // Configuration
        const width = window.innerWidth;
        const height = window.innerHeight - 140;

        // Create SVG
        const svg = d3.select("#visualization")
            .attr("width", width)
            .attr("height", height);

        // Add zoom behavior
        const g = svg.append("g");
        const zoom = d3.zoom()
            .scaleExtent([0.1, 4])
            .on("zoom", (event) => g.attr("transform", event.transform));
        svg.call(zoom);

        // Add arrow marker
        svg.append("defs").append("marker")
            .attr("id", "arrowhead")
            .attr("viewBox", "0 -5 10 10")
            .attr("refX", 25)
            .attr("refY", 0)
            .attr("markerWidth", 8)
            .attr("markerHeight", 8)
            .attr("orient", "auto")
            .append("path")
            .attr("d", "M0,-5L10,0L0,5")
            .attr("fill", "#64748b");

        // Sample workflow data
        const workflows = {
            nodes: [
                { id: "user-signup", name: "User Signup", type: "user", critical: true, duration: 2.3, success: 98.5 },
                { id: "validate-email", name: "Email Validation", type: "automated", critical: true, duration: 0.5, success: 99.2 },
                { id: "create-profile", name: "Create Profile", type: "automated", critical: true, duration: 1.2, success: 99.8 },
                { id: "send-welcome", name: "Send Welcome Email", type: "automated", critical: false, duration: 0.8, success: 97.5 },
                { id: "setup-workspace", name: "Setup Workspace", type: "automated", critical: true, duration: 3.5, success: 99.1 },
                { id: "init-agents", name: "Initialize Agents", type: "automated", critical: true, duration: 2.1, success: 98.9 },
                { id: "configure-mcp", name: "Configure MCP", type: "automated", critical: true, duration: 1.8, success: 99.5 },
                { id: "load-plugins", name: "Load Plugins", type: "automated", critical: false, duration: 1.5, success: 96.8 },
                { id: "user-dashboard", name: "User Dashboard", type: "user", critical: true, duration: 0.9, success: 99.9 },
                { id: "create-workflow", name: "Create Workflow", type: "user", critical: false, duration: 5.2, success: 98.2 },
                { id: "assign-agents", name: "Assign Agents", type: "user", critical: false, duration: 2.7, success: 99.0 },
                { id: "workflow-validation", name: "Workflow Validation", type: "automated", critical: false, duration: 1.3, success: 97.8 },
                { id: "start-execution", name: "Start Execution", type: "user", critical: false, duration: 0.4, success: 99.6 },
                { id: "agent-orchestration", name: "Agent Orchestration", type: "automated", critical: false, duration: 8.5, success: 95.5 },
                { id: "monitor-progress", name: "Monitor Progress", type: "automated", critical: false, duration: 0.2, success: 99.9 },
                { id: "generate-report", name: "Generate Report", type: "automated", critical: false, duration: 2.1, success: 98.7 }
            ],
            links: [
                { source: "user-signup", target: "validate-email", type: "critical" },
                { source: "validate-email", target: "create-profile", type: "critical" },
                { source: "create-profile", target: "send-welcome", type: "normal" },
                { source: "create-profile", target: "setup-workspace", type: "critical" },
                { source: "setup-workspace", target: "init-agents", type: "critical" },
                { source: "init-agents", target: "configure-mcp", type: "critical" },
                { source: "configure-mcp", target: "load-plugins", type: "normal" },
                { source: "configure-mcp", target: "user-dashboard", type: "critical" },
                { source: "load-plugins", target: "user-dashboard", type: "normal" },
                { source: "user-dashboard", target: "create-workflow", type: "normal" },
                { source: "create-workflow", target: "assign-agents", type: "normal" },
                { source: "assign-agents", target: "workflow-validation", type: "normal" },
                { source: "workflow-validation", target: "start-execution", type: "normal" },
                { source: "start-execution", target: "agent-orchestration", type: "normal" },
                { source: "agent-orchestration", target: "monitor-progress", type: "normal" },
                { source: "monitor-progress", target: "generate-report", type: "normal" }
            ]
        };

        // Color scheme
        const typeColors = {
            user: "#a78bfa",
            automated: "#06b6d4"
        };

        // Create force simulation
        let simulation = d3.forceSimulation(workflows.nodes)
            .force("link", d3.forceLink(workflows.links).id(d => d.id).distance(150))
            .force("charge", d3.forceManyBody().strength(-400))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collision", d3.forceCollide().radius(50));

        // Create links
        const link = g.append("g")
            .selectAll("path")
            .data(workflows.links)
            .join("path")
            .attr("class", d => `link ${d.type === "critical" ? "critical" : ""}`)
            .attr("stroke-dasharray", d => d.type === "critical" ? "0" : "5,5");

        // Create nodes
        const node = g.append("g")
            .selectAll("g")
            .data(workflows.nodes)
            .join("g")
            .attr("class", "node")
            .call(drag(simulation));

        node.append("circle")
            .attr("r", d => d.critical ? 20 : 15)
            .attr("fill", d => typeColors[d.type])
            .on("mouseover", showTooltip)
            .on("mouseout", hideTooltip)
            .on("click", highlightPath);

        node.append("text")
            .attr("dy", 30)
            .attr("text-anchor", "middle")
            .text(d => d.name);

        // Update positions on tick
        simulation.on("tick", () => {
            link.attr("d", d => {
                const dx = d.target.x - d.source.x;
                const dy = d.target.y - d.source.y;
                const dr = Math.sqrt(dx * dx + dy * dy);
                return `M${d.source.x},${d.source.y}A${dr},${dr} 0 0,1 ${d.target.x},${d.target.y}`;
            });

            node.attr("transform", d => `translate(${d.x},${d.y})`);
        });

        // Tooltip functions
        function showTooltip(event, d) {
            const tooltip = d3.select("#tooltip");
            tooltip.html(`
                <h3>${d.name}</h3>
                <div class="stat"><span class="label">Type:</span> ${d.type}</div>
                <div class="stat"><span class="label">Duration:</span> ${d.duration}s</div>
                <div class="stat"><span class="label">Success Rate:</span> ${d.success}%</div>
                <div class="stat"><span class="label">Critical Path:</span> ${d.critical ? "Yes" : "No"}</div>
            `)
            .style("left", (event.pageX + 10) + "px")
            .style("top", (event.pageY + 10) + "px")
            .classed("visible", true);
        }

        function hideTooltip() {
            d3.select("#tooltip").classed("visible", false);
        }

        function highlightPath(event, d) {
            // Reset all
            link.classed("highlighted", false);
            node.selectAll("circle").style("opacity", 0.3);

            // Find all connected nodes
            const connected = new Set([d.id]);
            workflows.links.forEach(l => {
                if (l.source.id === d.id) connected.add(l.target.id);
                if (l.target.id === d.id) connected.add(l.source.id);
            });

            // Highlight connected
            link.filter(l => l.source.id === d.id || l.target.id === d.id)
                .classed("highlighted", true);

            node.selectAll("circle")
                .filter(n => connected.has(n.id))
                .style("opacity", 1);
        }

        // Drag behavior
        function drag(simulation) {
            function dragstarted(event) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            }

            function dragged(event) {
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            }

            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0);
                event.subject.fx = null;
                event.subject.fy = null;
            }

            return d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended);
        }

        // Control functions
        function resetZoom() {
            svg.transition().duration(750).call(
                zoom.transform,
                d3.zoomIdentity
            );
        }

        let physicsEnabled = true;
        function togglePhysics() {
            physicsEnabled = !physicsEnabled;
            if (physicsEnabled) {
                simulation.alpha(0.3).restart();
            } else {
                simulation.stop();
            }
        }

        function changeLayout() {
            const layout = document.getElementById("layoutSelect").value;

            if (layout === "hierarchy") {
                // Hierarchical layout
                const levels = {};
                workflows.nodes.forEach(n => {
                    const inDegree = workflows.links.filter(l => l.target.id === n.id).length;
                    levels[n.id] = inDegree === 0 ? 0 : Math.max(...workflows.links.filter(l => l.target.id === n.id).map(l => levels[l.source.id] + 1));
                });

                workflows.nodes.forEach((n, i) => {
                    n.fx = 100 + (levels[n.id] * 200);
                    n.fy = 100 + (i * 50);
                });
                simulation.alpha(0.3).restart();
            } else if (layout === "radial") {
                // Radial layout
                const centerNode = workflows.nodes[0];
                const radius = 200;
                workflows.nodes.forEach((n, i) => {
                    if (n === centerNode) {
                        n.fx = width / 2;
                        n.fy = height / 2;
                    } else {
                        const angle = (i / workflows.nodes.length) * 2 * Math.PI;
                        n.fx = width / 2 + radius * Math.cos(angle);
                        n.fy = height / 2 + radius * Math.sin(angle);
                    }
                });
                simulation.alpha(0.3).restart();
            } else {
                // Force layout
                workflows.nodes.forEach(n => {
                    n.fx = null;
                    n.fy = null;
                });
                simulation.alpha(0.3).restart();
            }
        }

        function filterWorkflows() {
            const filter = document.getElementById("filterSelect").value;

            node.style("display", d => {
                if (filter === "all") return "block";
                if (filter === "critical") return d.critical ? "block" : "none";
                if (filter === "user") return d.type === "user" ? "block" : "none";
                if (filter === "automated") return d.type === "automated" ? "block" : "none";
            });

            link.style("display", l => {
                const sourceVisible = filter === "all" ||
                    (filter === "critical" && l.source.critical) ||
                    (filter === "user" && l.source.type === "user") ||
                    (filter === "automated" && l.source.type === "automated");
                const targetVisible = filter === "all" ||
                    (filter === "critical" && l.target.critical) ||
                    (filter === "user" && l.target.type === "user") ||
                    (filter === "automated" && l.target.type === "automated");
                return sourceVisible && targetVisible ? "block" : "none";
            });
        }

        // Handle window resize
        window.addEventListener("resize", () => {
            const newWidth = window.innerWidth;
            const newHeight = window.innerHeight - 140;
            svg.attr("width", newWidth).attr("height", newHeight);
            simulation.force("center", d3.forceCenter(newWidth / 2, newHeight / 2));
            simulation.alpha(0.3).restart();
        });
    </script>
</body>
</html>
