<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Casin8 - Cashier Buy Tokens</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#eccb13",
              "background-light": "#f8f8f6",
              "background-dark": "#221f10",
              "glass-border": "rgba(255, 255, 255, 0.08)",
              "glass-surface": "rgba(30, 28, 16, 0.6)",
            },
            fontFamily: {
              "display": ["Space Grotesk", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
            boxShadow: {
                'glow': '0 0 20px -5px rgba(236, 203, 19, 0.3)',
                'inner-light': 'inset 0 1px 0 0 rgba(255, 255, 255, 0.05)'
            }
          },
        },
      }
    </script>
<style>
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(236, 203, 19, 0.2);
            border-radius: 4px;
        }
        
        .glass-panel {
            background: rgba(34, 31, 16, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .shimmer-text {
            background: linear-gradient(to right, #eccb13 20%, #fff 50%, #eccb13 80%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col antialiased selection:bg-primary/30">
<!-- Header -->
<header class="flex items-center justify-between p-4 pb-2 sticky top-0 z-20 bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-white/5 active:scale-95 transition-all text-slate-900 dark:text-white">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-lg font-bold tracking-tight flex-1 text-center pr-10 text-slate-900 dark:text-white">Cashier</h2>
</header>
<!-- Main Content -->
<main class="flex-1 px-4 py-6 flex flex-col gap-6 overflow-y-auto pb-24">
<!-- Balance Section -->
<section class="flex flex-col items-center justify-center py-6 gap-2">
<p class="text-sm font-medium text-slate-500 dark:text-slate-400 uppercase tracking-widest">Current Balance</p>
<div class="relative">
<div class="absolute -inset-4 bg-primary/20 blur-3xl rounded-full opacity-20 pointer-events-none"></div>
<h1 class="text-5xl font-bold tracking-tighter shimmer-text relative z-10">5,240 <span class="text-2xl align-top opacity-80">TKN</span></h1>
</div>
<div class="flex items-center gap-2 px-3 py-1 rounded-full bg-primary/10 border border-primary/20 mt-2">
<span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
<span class="text-xs font-medium text-primary uppercase tracking-wide">Network Live</span>
</div>
</section>
<!-- Buy Card -->
<section class="glass-panel rounded-2xl p-6 shadow-xl flex flex-col gap-6 relative overflow-hidden">
<!-- Decorative gradient -->
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/10 rounded-full blur-3xl -mr-16 -mt-16 pointer-events-none"></div>
<div class="flex items-center justify-between">
<h3 class="text-xl font-bold text-slate-900 dark:text-white">Buy Tokens</h3>
<div class="flex items-center bg-slate-200 dark:bg-white/5 rounded-lg p-1">
<button class="px-3 py-1 rounded-md text-xs font-semibold bg-white dark:bg-primary text-slate-900 dark:text-background-dark shadow-sm">USD</button>
<button class="px-3 py-1 rounded-md text-xs font-semibold text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors">EUR</button>
</div>
</div>
<!-- Amount Input -->
<div class="flex flex-col gap-2">
<label class="text-xs font-medium text-slate-500 dark:text-slate-400 ml-1">Purchase Amount</label>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 font-medium text-lg">$</span>
<input class="w-full bg-slate-100 dark:bg-black/20 border border-slate-200 dark:border-white/10 rounded-xl py-4 pl-8 pr-4 text-2xl font-bold text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-600 focus:ring-2 focus:ring-primary/50 focus:border-primary/50 outline-none transition-all group-hover:border-white/20" placeholder="0.00" type="number"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-bold text-primary bg-primary/10 hover:bg-primary/20 px-2 py-1 rounded uppercase transition-colors">Max</button>
</div>
<div class="flex justify-between px-1">
<button class="text-xs font-medium text-slate-500 hover:text-primary transition-colors">$50</button>
<button class="text-xs font-medium text-slate-500 hover:text-primary transition-colors">$100</button>
<button class="text-xs font-medium text-slate-500 hover:text-primary transition-colors">$250</button>
<button class="text-xs font-medium text-slate-500 hover:text-primary transition-colors">$500</button>
</div>
</div>
<!-- Provider Selection -->
<div class="flex flex-col gap-3">
<label class="text-xs font-medium text-slate-500 dark:text-slate-400 ml-1">Select Provider</label>
<div class="grid grid-cols-2 gap-3">
<label class="cursor-pointer relative">
<input checked="" class="peer sr-only" name="provider" type="radio"/>
<div class="p-3 rounded-xl border border-slate-200 dark:border-white/10 bg-slate-50 dark:bg-white/5 peer-checked:border-primary peer-checked:bg-primary/10 transition-all hover:bg-slate-100 dark:hover:bg-white/10 flex flex-col gap-2 h-full">
<div class="flex items-center justify-between">
<span class="material-symbols-outlined text-slate-400 dark:text-slate-500" style="font-size: 20px;">credit_card</span>
<div class="w-4 h-4 rounded-full border border-slate-400 dark:border-slate-500 peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center">
<div class="w-2 h-2 rounded-full bg-primary opacity-0 peer-checked:opacity-100 transition-opacity"></div>
</div>
</div>
<div>
<p class="text-sm font-bold text-slate-900 dark:text-white">AlphaPay</p>
<p class="text-[10px] text-slate-500 dark:text-slate-400">Instant • 1.2% fee</p>
</div>
</div>
</label>
<label class="cursor-pointer relative">
<input class="peer sr-only" name="provider" type="radio"/>
<div class="p-3 rounded-xl border border-slate-200 dark:border-white/10 bg-slate-50 dark:bg-white/5 peer-checked:border-primary peer-checked:bg-primary/10 transition-all hover:bg-slate-100 dark:hover:bg-white/10 flex flex-col gap-2 h-full">
<div class="flex items-center justify-between">
<span class="material-symbols-outlined text-slate-400 dark:text-slate-500" style="font-size: 20px;">account_balance_wallet</span>
<div class="w-4 h-4 rounded-full border border-slate-400 dark:border-slate-500 peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center"></div>
</div>
<div>
<p class="text-sm font-bold text-slate-900 dark:text-white">BetaLink</p>
<p class="text-[10px] text-slate-500 dark:text-slate-400">~2 mins • 0.8% fee</p>
</div>
</div>
</label>
</div>
</div>
<!-- Summary -->
<div class="pt-4 border-t border-slate-200 dark:border-white/10 flex flex-col gap-4">
<div class="flex items-center justify-between">
<span class="text-sm text-slate-500 dark:text-slate-400">Processing Fee</span>
<span class="text-sm font-medium text-slate-900 dark:text-white">$2.40</span>
</div>
<div class="flex items-center justify-between p-4 rounded-xl bg-emerald-500/10 border border-emerald-500/20">
<span class="text-sm font-semibold text-emerald-700 dark:text-emerald-400">Total to Receive</span>
<div class="flex flex-col items-end">
<span class="text-xl font-bold text-emerald-700 dark:text-emerald-400">197.60 TKN</span>
<span class="text-[10px] text-emerald-600/70 dark:text-emerald-400/70">1 USD = 1.00 TKN</span>
</div>
</div>
<button class="w-full bg-primary hover:bg-yellow-400 text-background-dark font-bold text-lg py-4 rounded-xl shadow-glow transition-all active:scale-[0.98] flex items-center justify-center gap-2 group">
<span class="material-symbols-outlined group-hover:rotate-12 transition-transform">bolt</span>
                    Purchase Tokens
                </button>
</div>
</section>
<!-- Promo Banner -->
<section class="rounded-xl overflow-hidden relative group cursor-pointer">
<div class="absolute inset-0 bg-gradient-to-r from-purple-900/80 to-blue-900/80 z-10"></div>
<img class="w-full h-24 object-cover object-center group-hover:scale-105 transition-transform duration-700" data-alt="Abstract vibrant geometric shapes dark background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBzuqHzJFWvzNvWtbUNStKdxSPb07MgYVJzfuiC82fmwcs89yzBqJptbTZCVueUGvJSiov7J1W16vbHEcy2sV7DUb5QdhjfMgF6-ZX1Wl7bgIb3MiJdvmSlivYe1MkB6RK5ILlbuG398EcsXb2hAoqJ6wQO39nvBXMJ1BvrDLDhv4g92FnQ_tQH5ZZTWNjdKRMzlNZM1BvbruAVDzndENNG0kpve2mUWJXDLShidcmP-aOXhJaze9asHbVQwqdczsDVllY3pRdyZFkz"/>
<div class="absolute inset-0 z-20 flex items-center justify-between px-6">
<div class="flex flex-col">
<span class="text-xs font-bold text-purple-200 uppercase tracking-wider mb-1">Limited Offer</span>
<span class="text-lg font-bold text-white">Get +10% Bonus</span>
</div>
<div class="w-8 h-8 rounded-full bg-white/20 backdrop-blur-sm flex items-center justify-center">
<span class="material-symbols-outlined text-white text-sm">arrow_forward</span>
</div>
</div>
</section>
</main>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-0 right-0 border-t border-slate-200 dark:border-white/10 bg-background-light dark:bg-background-dark/95 backdrop-blur-xl pb-6 pt-2 px-6 z-50">
<div class="flex justify-between items-end">
<a class="flex flex-col items-center gap-1 group w-16" href="#">
<span class="material-symbols-outlined text-slate-400 dark:text-slate-500 group-hover:text-primary transition-colors text-2xl">grid_view</span>
<span class="text-[10px] font-medium text-slate-400 dark:text-slate-500 group-hover:text-primary transition-colors">Lobby</span>
</a>
<a class="flex flex-col items-center gap-1 group w-16" href="#">
<div class="relative">
<span class="material-symbols-outlined text-primary fill-1 text-2xl" style="font-variation-settings: 'FILL' 1;">payments</span>
<span class="absolute -top-1 -right-1 w-2 h-2 bg-red-500 rounded-full"></span>
</div>
<span class="text-[10px] font-medium text-primary">Cashier</span>
</a>
<div class="w-12"></div> <!-- Spacer for center FAB if needed later, currently just spacing -->
<a class="flex flex-col items-center gap-1 group w-16" href="#">
<span class="material-symbols-outlined text-slate-400 dark:text-slate-500 group-hover:text-primary transition-colors text-2xl">star</span>
<span class="text-[10px] font-medium text-slate-400 dark:text-slate-500 group-hover:text-primary transition-colors">Rewards</span>
</a>
<a class="flex flex-col items-center gap-1 group w-16" href="#">
<span class="material-symbols-outlined text-slate-400 dark:text-slate-500 group-hover:text-primary transition-colors text-2xl">person</span>
<span class="text-[10px] font-medium text-slate-400 dark:text-slate-500 group-hover:text-primary transition-colors">Profile</span>
</a>
</div>
<!-- Central Floating Action Button (Optional Aesthetic Touch) -->
<div class="absolute left-1/2 -translate-x-1/2 -top-6">
<button class="w-14 h-14 rounded-full bg-slate-800 dark:bg-white/10 border-4 border-background-light dark:border-background-dark flex items-center justify-center shadow-lg hover:scale-105 transition-transform">
<span class="material-symbols-outlined text-primary text-3xl">add</span>
</button>
</div>
</nav>
</body></html>
