<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Casin8 Mobile - 3-Reel Mega Win State</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f4c025",
                        "background-light": "#f8f8f5",
                        "background-dark": "#221e10",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased min-h-screen flex items-center justify-center p-4">
<!-- Mobile Container Emulator -->
<div class="relative w-[390px] h-[844px] bg-background-light dark:bg-background-dark shadow-2xl overflow-hidden rounded-[3rem] border-8 border-slate-800 dark:border-slate-900 flex flex-col">
<!-- Top Status Bar (System) -->
<div class="h-10 w-full flex justify-between items-center px-8 pt-4 pb-2 bg-background-light dark:bg-background-dark">
<span class="text-xs font-bold">9:41</span>
<div class="flex gap-1.5">
<span class="material-symbols-outlined text-sm">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-sm">wifi</span>
<span class="material-symbols-outlined text-sm">battery_full</span>
</div>
</div>
<!-- Header / Chain Settlement -->
<header class="px-4 py-2 flex items-center justify-between border-b border-slate-200 dark:border-primary/20">
<div class="flex items-center gap-2">
<div class="size-6 bg-primary rounded-lg flex items-center justify-center text-background-dark">
<span class="material-symbols-outlined text-lg font-bold">casino</span>
</div>
<h1 class="font-black text-lg tracking-tight">CASIN8</h1>
</div>
<div class="flex items-center bg-emerald-500/10 border border-emerald-500/20 px-3 py-1 rounded-full gap-1.5">
<span class="size-2 rounded-full bg-emerald-500 animate-pulse"></span>
<span class="text-[10px] font-bold text-emerald-500 uppercase tracking-wider">Settled</span>
</div>
</header>
<!-- Main Game Area -->
<main class="flex-1 relative flex flex-col items-center justify-center px-4 overflow-hidden">
<!-- Background Flourish (Subtle particle simulation) -->
<div class="absolute inset-0 pointer-events-none overflow-hidden">
<div class="absolute top-1/4 left-1/4 size-32 bg-primary/10 blur-[60px] rounded-full"></div>
<div class="absolute bottom-1/4 right-1/4 size-48 bg-primary/20 blur-[80px] rounded-full"></div>
</div>
<!-- 10x Multiplier Badge (Pulsing Cyan) -->
<div class="z-20 mb-4 scale-110">
<div class="bg-cyan-500 text-slate-900 px-4 py-1.5 rounded-full font-black text-sm shadow-[0_0_20px_rgba(6,182,212,0.5)] flex items-center gap-1 border-2 border-cyan-300">
<span class="material-symbols-outlined text-base">bolt</span>
                    10X MULTIPLIER
                </div>
</div>
<!-- Reels Container -->
<div class="relative w-full aspect-square grid grid-cols-3 gap-2 bg-slate-900/50 dark:bg-primary/5 p-2 rounded-2xl border border-white/10 backdrop-blur-sm">
<!-- High-legibility symbols on the reels -->
<!-- Reel 1 -->
<div class="flex flex-col gap-2 overflow-hidden">
<div class="bg-slate-800/40 rounded-xl aspect-square flex items-center justify-center opacity-40">
<span class="material-symbols-outlined text-4xl text-primary/50">diamond</span>
</div>
<div class="bg-slate-800 rounded-xl aspect-square flex items-center justify-center border-2 border-primary shadow-[0_0_15px_rgba(244,192,37,0.4)]">
<span class="material-symbols-outlined text-6xl text-primary">brightness_7</span>
</div>
<div class="bg-slate-800/40 rounded-xl aspect-square flex items-center justify-center opacity-40">
<span class="material-symbols-outlined text-4xl text-primary/50">star</span>
</div>
</div>
<!-- Reel 2 -->
<div class="flex flex-col gap-2 overflow-hidden">
<div class="bg-slate-800/40 rounded-xl aspect-square flex items-center justify-center opacity-40">
<span class="material-symbols-outlined text-4xl text-primary/50">token</span>
</div>
<div class="bg-slate-800 rounded-xl aspect-square flex items-center justify-center border-2 border-primary shadow-[0_0_15px_rgba(244,192,37,0.4)]">
<span class="material-symbols-outlined text-6xl text-primary">brightness_7</span>
</div>
<div class="bg-slate-800/40 rounded-xl aspect-square flex items-center justify-center opacity-40">
<span class="material-symbols-outlined text-4xl text-primary/50">favorite</span>
</div>
</div>
<!-- Reel 3 -->
<div class="flex flex-col gap-2 overflow-hidden">
<div class="bg-slate-800/40 rounded-xl aspect-square flex items-center justify-center opacity-40">
<span class="material-symbols-outlined text-4xl text-primary/50">pentagon</span>
</div>
<div class="bg-slate-800 rounded-xl aspect-square flex items-center justify-center border-2 border-primary shadow-[0_0_15px_rgba(244,192,37,0.4)]">
<span class="material-symbols-outlined text-6xl text-primary">brightness_7</span>
</div>
<div class="bg-slate-800/40 rounded-xl aspect-square flex items-center justify-center opacity-40">
<span class="material-symbols-outlined text-4xl text-primary/50">diamond</span>
</div>
</div>
<!-- Win Line Indicator -->
<div class="absolute inset-0 pointer-events-none flex items-center">
<div class="w-full h-1 bg-gradient-to-r from-transparent via-primary to-transparent blur-[2px]"></div>
</div>
</div>
<!-- Mega Win State Overlay -->
<div class="mt-6 text-center z-10">
<h2 class="text-5xl font-black text-primary tracking-tighter drop-shadow-[0_4px_10px_rgba(0,0,0,0.5)] italic">MEGA WIN!</h2>
<div class="mt-2 bg-gradient-to-b from-white to-slate-400 bg-clip-text text-transparent text-3xl font-bold">
                    $1,250.00
                </div>
</div>
</main>
<!-- Controls Section -->
<div class="px-6 py-4 relative">
<!-- Bet Info -->
<div class="flex items-center justify-between mb-4 bg-slate-900/40 p-3 rounded-xl border border-white/5">
<div>
<p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Current Bet</p>
<p class="text-lg font-bold text-white">$125.00</p>
</div>
<div class="text-right">
<p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Balance</p>
<p class="text-lg font-bold text-primary">$42,910.42</p>
</div>
</div>
<!-- Action Buttons -->
<div class="flex items-end justify-between gap-4">
<div class="flex flex-col gap-2">
<button class="size-12 rounded-full bg-slate-800 dark:bg-slate-900 border border-white/10 flex items-center justify-center text-slate-300">
<span class="material-symbols-outlined">settings</span>
</button>
<button class="size-12 rounded-full bg-slate-800 dark:bg-slate-900 border border-white/10 flex items-center justify-center text-slate-300">
<span class="material-symbols-outlined">speed</span>
</button>
</div>
<!-- Primary Spin Button -->
<div class="relative">
<div class="absolute -inset-2 bg-primary/20 blur-xl rounded-full"></div>
<button class="relative size-24 bg-primary rounded-full flex flex-col items-center justify-center text-background-dark border-4 border-white/20 shadow-xl active:scale-95 transition-transform">
<span class="material-symbols-outlined text-4xl font-black">refresh</span>
<span class="text-[10px] font-black uppercase tracking-widest">Spin</span>
</button>
</div>
</div>
</div>
<!-- Bottom Tab Bar -->
<nav class="flex items-center justify-around border-t border-slate-200 dark:border-primary/10 py-3 bg-white dark:bg-background-dark px-4 pb-8">
<button class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-bold">Home</span>
</button>
<button class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined fill-1">casino</span>
<span class="text-[10px] font-bold">Games</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="text-[10px] font-bold">Wallet</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-bold">Profile</span>
</button>
</nav>
<!-- Home Indicator (System) -->
<div class="absolute bottom-1.5 left-1/2 -translate-x-1/2 w-32 h-1 bg-slate-800/20 dark:bg-white/10 rounded-full"></div>
</div>
</body></html>
