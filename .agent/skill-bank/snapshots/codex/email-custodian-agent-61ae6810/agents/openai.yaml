interface:
  display_name: "Email Custodian Agent"
  short_description: "Create and link inbox and ChatGPT accounts"
  default_prompt: >
    Use $email-custodian-agent to provision exactly one identity at a time.
    Existing mailbox/account reuse is forbidden for new terminal agents.
    Hard rules: first open StackCP Email Accounts at https://www.stackcp.com/services/be2e4e715ddd64f5/email/email-accounts and set/reset mailbox password for the target identity; ChatGPT/Codex auth pages only in Chrome incognito; never open auth in normal profile;
    use a visible top-level Terminal.app window only (no background terminal); run
    codex login --device-auth; persona name must be a real human first+last name;
    DOB must produce age 25-75; verify spinbutton values and input[name="birthday"]=YYYY-MM-DD before submit;
    for 2026-03-24 enforce DOB window 03/25/1950-03/24/2001 (safe core years 1951-2000);
    if any trouble occurs, stop and refine SKILL.md with a concrete guard, reload, and restart preflight;
    any mailbox with trouble is burned for this run and cannot be reused;
    maintain run ledger at /Users/danielgoldberg/.codex/skills/email-custodian-agent/references/RUN_LEDGER.md;
    use only email + one-time-code auth on OpenAI routes; never follow Google/Apple/Microsoft/phone branches;
    run StackCP+Stackmail preflight before opening incognito auth windows;
    if Stackmail opens in incognito, burn mailbox and restart with a fresh mailbox;
    after opening Webmail, confirm Stackmail account label exactly matches target mailbox; mismatch burns the mailbox and restarts preflight;
    prefer direct Stackmail login URL with explicit mailbox+password over Options->Webmail when possible;
    enforce StackCP row lookup retry policy (full mailbox, clear/research, local-part); unresolved row burns mailbox;
    if auth shows invalid_state/session-state errors, close incognito, burn mailbox, and restart with a fresh mailbox;
    never use fixed tab indexes for critical actions; resolve tabs by URL and verify context before each step;
    assert active URL+heading before every typed input/click to prevent focus/context drift;
    do not mutate DOB fields via direct DOM assignment; strict 405 prevention on /email-verification:
    never use scripted submits (form.submit/requestSubmit/synthetic events/JS evaluate click/direct POST);
    submit only by trusted interaction with visible route action buttons; if 405 appears, do resend->new OTP->visible-button retry once, then restart one-time-code flow;
    confirm codex login status and token email matches target mailbox;
    abort immediately if prior-use signals indicate the mailbox already has an OpenAI/ChatGPT identity.
